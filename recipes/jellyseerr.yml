metadata:
  name: Jellyseerr
  version: latest
  description: Overseerr is a powerful application designed to streamline the process
    of managing your media library. It offers full Plex integration, allowing you
    to log in and manage user access with Plex, and syncs with your Plex library to
    show what titles you already have. The app also integrates with Sonarr and Radarr,
    with plans for more services in the future. Overseerr features an easy-to-use
    request system, letting users request individual seasons or movies through a clean,
    user-friendly interface. The app also boasts a simple request management UI, making
    it easy to approve recent requests without having to navigate through the app.
    It also offers a granular permission system and localization into other languages.
    The mobile-friendly design ensures you can approve requests on the go. Jellyseerr,
    a fork of Overseerr, extends these features to Jellyfin and Emby media servers,
    offering full integration with these platforms. It also supports movies, shows,
    mixed libraries, and allows for easy integration with your existing services.
    Jellyseerr also offers a customizable request system, a simple request management
    UI, a granular permission system, and support for various notification agents.
  category: media
  tags:
  - Media
  - Request Management
  - Integration
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: fallenbagel/jellyseerr:sha-42eec24
  port:
    type: integer
    title: Port HTTP
    default: 5055
links:
- label: Documentation
  url: https://github.com/Fallenbagel/jellyseerr/tree/develop/docs
- label: Github
  url: https://github.com/Fallenbagel/jellyseerr
instructions: none
install:
- docker:
    image: $IMAGE
    name: jellyseerr
    port: $PORT:5055
    volumes:
    - /app/config
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: none
