metadata:
  name: DumbAssets
  version: latest
  description: DumbAssets is a self-hosted asset management service that provides
    secure file storage, organization, and sharing capabilities. It features PIN protection,
    configurable access controls, and notification integration. Perfect for teams
    and organizations that need centralized asset management.
  category: asset-management
  tags:
  - Asset Management
  - File Storage
  - File Sharing
  - Web Interface
  - Security
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: dumbwareio/dumbassets:1.0.11
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Website
  url: https://www.dumbware.io/DumbAssets
- label: Documentation
  url: https://github.com/dumbwareio/dumbassets#readme
- label: GitHub
  url: https://github.com/dumbwareio/dumbassets
instructions: null
install:
- docker:
    image: $IMAGE
    name: dumbassets
    port: $PORT:3000
    volumes:
    - /app/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
