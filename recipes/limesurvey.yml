metadata:
  name: Limesurvey
  version: latest
  description: 'Welcome to LimeSurvey, the world''s #1 survey platform designed to
    provide you with the best online survey tool that''s fresh, quick, and anonymous.
    Whether you''re a student, professional, or enterprise, LimeSurvey allows you
    to design a survey and gather insightful data, all for free. With LimeSurvey,
    you can create a simple questionnaire or poll, or even a sophisticated survey
    with complex validation rules, conditional logic, and quota management. It''s
    the perfect alternative to Google Forms or Doodle. LimeSurvey is also the optimal
    online survey tool for research institutes, universities, and other educational
    establishments, offering free surveys, polls, and other open-source possibilities.
    With easy-to-use templates and an on-hand customer service team, LimeSurvey is
    your go-to solution for all your survey needs.'
  category: analytics
  tags:
  - Analytics
  - Business Apps
  - Educational
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: tiredofit/limesurvey:6-1.6.99
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://limesurvey.org/
- label: Documentation
  url: https://manual.limesurvey.org
- label: Github
  url: https://github.com/LimeSurvey/LimeSurvey
instructions: null
install:
- docker:
    image: $IMAGE
    name: limesurvey
    port: $PORT:80
    volumes:
    - /www/html/upload
    - /www/logs
    - /assets/custom
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  mysql:
    type: mysql
    version: latest
