metadata:
  name: Traccar
  version: latest
  description: Traccar is an open-source GPS tracking system designed for real-time
    tracking of vehicles, assets, and individuals. It supports a wide range of GPS
    devices and mobile apps, providing a secure, reliable, and highly customizable
    platform for tracking and managing your data. Traccar is ideal for fleet management,
    personal tracking, and asset monitoring.
  category: gps-tracking
  tags:
  - GPS Tracking
  - Fleet Management
  - Real-Time Tracking
  - Self-Hosted
  - Asset Monitoring
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: traccar/traccar:6.13.3
  port:
    type: integer
    title: Port HTTP
    default: 5000
links:
- label: Website
  url: https://www.traccar.org/
- label: Github
  url: https://github.com/traccar/traccar
instructions: null
install:
- docker:
    image: $IMAGE
    name: traccar
    port: $PORT:5000
    volumes:
    - /opt/traccar/logs
    - /opt/traccar/conf/traccar.xml
    extra_ports:
    - 5150:5150
    - 8082:8082
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
