# Recipe v2 — Reference format
# Every app in the catalog MUST follow this format.
# The recipe is not only a catalog card: it is an executable installation contract for agents.

metadata:
  name: "Example App"
  description: |
    Short but complete English description of what the application does.
    Use 2-3 full sentences. Do not truncate text.
  category: productivity          # Parent category from platform/src/lib/taxonomy.ts
  subcategory: project-management # Optional but recommended
  tags: [Productivity]
  version: "1.0.0"
  homepage: https://example.com
  icon: https://example.com/icon.svg
  license: MIT
  verified: false

# Declarative prerequisites used for catalog badges and basic validation.
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256 # MB
    disk: 1  # GB

# Docker payload used by srvly's deploy API.
install:
  docker:
    image: ghcr.io/example/app:1.0.0
    name: example-app
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/example-app/data:/data
    env:
      - key: NODE_ENV
        value: production
        description: "Runtime environment"

# Machine-readable plan consumed by the generated agent prompt.
# This is what prevents the agent from guessing how to install prerequisites.
agent_install:
  network: srvly-example-app
  preflight:
    - "Check whether the requested host port is free before deploying."
    - "Clean up failed containers with the same names before retrying."
  prerequisites:
    # Example for an app that needs Postgres. Remove if not needed.
    - type: postgres
      name: example-app-postgres
      image: postgres:16-alpine
      container: example-app-postgres
      database: example_app
      user: example_app
      password: generate
      volume: /opt/srvly/apps/example-app/postgres:/var/lib/postgresql/data
      port: 5432
      env:
        POSTGRES_DB: example_app
        POSTGRES_USER: example_app
        POSTGRES_PASSWORD: $GENERATED_PASSWORD
  app_env:
    DATABASE_HOST: example-app-postgres
    DATABASE_PORT: "5432"
    DATABASE_NAME: example_app
    DATABASE_USER: example_app
    DATABASE_PASSWORD: $GENERATED_POSTGRES_PASSWORD
  post_install:
    - "Run the healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60

# User/agent-customizable params. Keep params.image.default identical to install.docker.image.
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/example/app:1.0.0
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"

links:
  - label: Documentation
    url: https://example.com/docs
  - label: GitHub
    url: https://github.com/example/app

notes: |
  Add any app-specific caveats here. Do not include secrets.

# Parent categories allowed:
# media, dev-infra, communication, security, productivity,
# storage-backup, automation-iot, gaming, ai-llm, other
