metadata:
  name: Pterodactyl Panel
  version: latest
  description: Pterodactyl® is a free, open-source game server management panel that
    allows you to manage your game servers with ease and efficiency. It is built with
    PHP, React, and Go, and designed with a focus on security. Pterodactyl runs all
    game servers in isolated Docker containers, providing a secure environment for
    each game. It also offers a beautiful and intuitive user interface, making it
    easy for anyone to use. The platform supports a wide variety of games, including
    Minecraft, Rust, Terraria, Teamspeak, Mumble, Team Fortress 2, Counter Strike
    Global Offensive, Garry's Mod, ARK Survival Evolved, and many more. With Pterodactyl,
    you can host your games across the world without having to bloat each physical
    machine with additional dependencies. It's time to make game servers a first-class
    citizen on your platform with Pterodactyl.
  category: gaming
  tags:
  - Gaming
  - Developer Tools
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/pterodactyl/panel:v1.12.2
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://pterodactyl.io/
- label: Documentation
  url: https://pterodactyl.io/project/introduction.html
- label: Github
  url: https://github.com/pterodactyl/panel
instructions: After installing, open the console and run "php artisan p:user:make".
install:
- docker:
    image: $IMAGE
    name: pterodactyl-panel
    port: $PORT:80
    volumes:
    - /app/var/
    - /app/storage/logs
    - /etc/nginx/http.d/
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: After installing, open the console and run "php artisan p:user:make".
services:
  mysql:
    type: mysql
    version: latest
  redis:
    type: redis
    version: '7'
