metadata:
  name: Moocup
  version: latest
  description: Moocup is a visual editor designed to create stunning screenshots in
    seconds. It provides a simple and functional interface where you can drop your
    screenshot, apply beautiful base styles, customize it however you wish, and export
    professional-looking visuals instantly. Built for developers, designers, and content
    creators who need to showcase their work with polished screenshots for portfolios,
    documentation, presentations, or social media. The tool offers an intuitive drag-and-drop
    workflow with real-time visual editing, eliminating the need for complex design
    software or manual styling. With Moocup's self-hosted solution, your screenshots
    remain private and never leave your infrastructure, making it ideal for sensitive
    projects or proprietary applications. The browser-based editor requires zero installation
    and works seamlessly across devices with responsive design. Perfect for anyone
    who values simplicity and functionality but still wants to create eye-catching
    visuals that make their projects stand out without the overhead of heavyweight
    design tools or paid screenshot services.
  category: screenshots
  tags:
  - Screenshots
  - Visual Editor
  - Design Tool
  - Portfolio
  - Image Editor
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: jellydeck/moocup:1.0.48
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://moocup.jaydip.me
- label: GitHub
  url: https://github.com/jellydeck/moocup
- label: Docker Hub
  url: https://hub.docker.com/r/jellydeck/moocup
instructions: null
install:
- docker:
    image: $IMAGE
    name: moocup
    port: $PORT:80
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
