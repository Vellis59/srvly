metadata:
  name: Open Archiver
  version: latest
  description: Open Archiver is a secure, sovereign, and open-source platform for
    email archiving and eDiscovery. It provides universal ingestion from IMAP, Google
    Workspace, Microsoft 365, PST files, mbox files, and zipped .eml files. Emails
    are stored in standard .eml format with deduplication, compression, and optional
    AES-256 encryption at rest. Features include full-text search across emails and
    attachments (PDF, DOCX, etc.), thread discovery, file integrity verification,
    immutable audit trails, role-based access control, and pluggable storage backends
    (local or S3-compatible). Built with SvelteKit, Node.js, PostgreSQL, Meilisearch,
    and BullMQ.
  category: email
  tags:
  - Email
  - Archiving
  - eDiscovery
  - Compliance
  - Self-Hosted
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: logiclabshq/open-archiver:v0.5.0
  port:
    type: integer
    title: Port HTTP
    default: 3000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://openarchiver.com
- label: GitHub
  url: https://github.com/LogicLabs-OU/OpenArchiver
- label: Documentation
  url: https://docs.openarchiver.com
instructions: 'After deployment, open the app URL and complete /setup as the first
  user.

  Secrets (JWT, encryption keys, Meilisearch master key, Redis password) are

  generated by the template. Configure ingestion sources from the dashboard.

  '
install:
- docker:
    image: $IMAGE
    name: open-archiver
    port: $PORT:3000
    volumes:
    - /meili_data
    - /var/data/open-archiver
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: 'After deployment, open the app URL and complete /setup as the first user.

    Secrets (JWT, encryption keys, Meilisearch master key, Redis password) are

    generated by the template. Configure ingestion sources from the dashboard.

    '
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
