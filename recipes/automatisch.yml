metadata:
  name: Automatisch
  version: latest
  description: Automatisch is a powerful, self-hosted workflow automation tool designed
    for connecting your apps and automating repetitive tasks. With Automatisch, you
    can create workflows to sync data, send notifications, and perform various actions
    seamlessly across different services. This container is based on Docker Baseimage
    KasmVNC, providing additional environment variables and configurations for enhanced
    flexibility. It also supports the docker manifest for multi-platform awareness,
    ensuring the correct image for your architecture.
  category: workflow-automation
  tags:
  - Workflow Automation
  - Self-Hosted
  - Task Management
  - API Integrations
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: dockeriddonuts/automatisch:2.0
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Documentation
  url: https://automatisch.io/docs
- label: GitHub
  url: https://github.com/automatisch/automatisch
instructions: You can use `user@automatisch.io` email address and `sample` password
  to log in to Automatisch. Please do not forget to change your email and password
  from the settings page.
install:
- docker:
    image: $IMAGE
    name: automatisch
    port: $PORT:80
    volumes:
    - /automatisch/storage
    - /automatisch/storage
    extra_ports:
    - 443:443
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: You can use `user@automatisch.io` email address and `sample` password to
    log in to Automatisch. Please do not forget to change your email and password
    from the settings page.
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
