metadata:
  name: Morphic
  version: latest
  description: Morphic is an AI-powered search and answer engine that combines the
    power of multiple AI models with real-time web search capabilities. It provides
    intelligent answers to user queries by leveraging various AI providers including
    OpenAI, Anthropic, Google, and Groq, while using SearxNG for privacy-focused web
    search. Morphic offers a conversational interface that delivers comprehensive,
    well-sourced answers with citations and follow-up questions, making it an excellent
    alternative to traditional search engines.
  category: ai
  tags:
  - AI
  - Search Engine
  - Chat
  - OpenAI
  - Anthropic
  - Google
  - Groq
  - Redis
  - Next.js
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/miurla/morphic:e4fd78357afc685db17e6c27404b9728b3205624
  port:
    type: integer
    title: Port HTTP
    default: 3000
  version:
    type: string
    title: Version
    default: latest
links:
- label: GitHub
  url: https://github.com/miurla/morphic
- label: Documentation
  url: https://github.com/miurla/morphic#readme
- label: Demo
  url: https://morphic.sh
instructions: null
install:
- docker:
    image: $IMAGE
    name: morphic
    port: $PORT:3000
    volumes:
    - /data
    - /etc/searxng/settings.yml
    - /etc/searxng/limiter.toml
    extra_ports:
    - 8080:8080
    - 8888:8888
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  redis:
    type: redis
    version: '7'
