metadata:
  name: llana
  version: latest
  description: Llana is a lightweight no-code API wrapper that exposes a REST API
    for any database within minutes. Stop wasting time building endpoints, just connect
    your database and start playing. Open source, free to use, and no vendor lock-in.
  category: api
  tags:
  - API
  - No-Code
  - Database
  - Open Source
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: juicyllama/llana:v1.32
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://llana.io/
- label: GitHub
  url: https://github.com/juicyllama/llana
instructions: null
install:
- docker:
    image: $IMAGE
    name: llana
    port: $PORT:80
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
