metadata:
  name: Strapi
  version: latest
  description: Strapi is a leading open-source headless CMS that is fully customizable
    and built with 100% JavaScript. It allows you to manage any content, anywhere,
    providing you with the freedom to use your favorite tools and frameworks. With
    Strapi, you can build apps quickly, getting your backend done in minutes instead
    of weeks. You can easily build customizable content APIs and use them with a modern
    tech stack. Strapi also allows you to effortlessly create content structures that
    flex to your needs, write, edit, and manage any content types, and build apps
    and digital experiences without the distraction of CMS complexities. You can consume
    Strapi API from any client using REST or GraphQL, and deploy on Strapi Cloud or
    on any cloud platforms.
  category: cms
  tags:
  - CMS
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: strapi/strapi:3.6.8-alpine
  port:
    type: integer
    title: Port HTTP
    default: 1337
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://strapi.io/
- label: Documentation
  url: https://docs.strapi.io/developer-docs/latest/getting-started/introduction.html
- label: Github
  url: https://github.com/strapi
instructions: null
install:
- docker:
    image: $IMAGE
    name: strapi
    port: $PORT:1337
    volumes:
    - /srv/app
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
  mysql:
    type: mysql
    version: latest
