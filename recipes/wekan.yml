metadata:
  name: Wekan
  version: latest
  description: WeKan is an open-source, customizable, and privacy-focused Kanban app
    designed for efficient task management. It allows you to create multiple boards
    for different projects or tasks, with each board having columns to represent different
    stages of your work such as 'To Do', 'Doing', and 'Done'. You can add cards to
    each board to represent tasks, complete with titles, descriptions, and due dates.
    WeKan uses lists on a Kanban board to represent different stages of a workflow,
    helping you organize and track tasks. You can customize lists by changing their
    color or adding custom fields to capture more information about tasks. A card
    in WeKan represents a task on a Kanban board, including a title, description,
    due date, labels, and comments. As work progresses, you can move the card from
    one column to another. WeKan also offers several features to protect your data,
    including a self-hosting option, access controls, and open-source code for security
    auditing. It is designed with security in mind, and its features and options are
    built to help you protect your data and keep it secure.
  category: project-management
  tags:
  - Project Management
  - Open-Source
  - Task Management
  - Kanban
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/wekan/wekan:v7.93
  port:
    type: integer
    title: Port HTTP
    default: 8080
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://wekan.github.io/
- label: Docs
  url: https://github.com/wekan/wekan/wiki
- label: Github
  url: https://github.com/wekan/wekan
instructions: null
install:
- docker:
    image: $IMAGE
    name: wekan
    port: $PORT:8080
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
