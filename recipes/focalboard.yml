metadata:
  name: Focalboard
  version: latest
  description: Mattermost Boards is an open-source project management tool designed
    for technical teams. It centralizes, plans, and tracks all your work in one place,
    helping your organization maintain a single source of truth. This ensures your
    teams stay aligned to complete tasks, reach milestones, and achieve their goals.
    The app allows you to manage all your tasks on a Kanban, table, gallery, and calendar
    view, focusing on the highest priority items with board filters. It also offers
    real-time collaboration features, including card comments, @mention teammates,
    and board permissions to share your board with the entire team or specific individuals.
    Mattermost Boards comes with pre-built templates for quick setup or the option
    to create a fully custom board from scratch. It also includes features like unlimited
    boards, file sharing, customizable templates, project cards & tasks, archiving
    & back-up snapshots, and more. Mattermost Boards is an open-source alternative
    to tools like Asana, Trello, and Notion.
  category: project-management
  tags:
  - Project Management
  - Collaboration
  - Task Management
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: mattermost/focalboard:7.11.4
  port:
    type: integer
    title: Port HTTP
    default: 8000
links:
- label: Website
  url: https://focalboard.com
- label: Documentation
  url: https://docs.mattermost.com/guides/boards.html
- label: Github
  url: https://github.com/mattermost/focalboard
- label: Docker
  url: https://hub.docker.com/r/mattermost/focalboard
instructions: null
install:
- docker:
    image: $IMAGE
    name: focalboard
    port: $PORT:8000
    volumes:
    - /opt/focalboard/data
    - /opt/focalboard/config.json
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
  mysql:
    type: mysql
    version: latest
