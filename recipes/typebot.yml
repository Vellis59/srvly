metadata:
  name: Typebot
  version: latest
  description: Typebot is an innovative app designed to revolutionize the way you
    collect information. It allows you to build advanced chatbots visually, using
    powerful blocks to create unique chat experiences. You can embed these chatbots
    anywhere on your web or mobile apps and start collecting results instantly. Typebot
    is designed to replace your old school forms with chatbots, leading to an increase
    in customer satisfaction, retention, and a threefold increase in your conversion
    rate compared to traditional forms. With Typebot, you can easily drag and drop
    blocks to create your app, and even add custom code for your specific needs. It
    also offers native integration blocks and instructions on how to embed the chatbot
    on various platforms. One of the main advantages of Typebot is its real-time data
    collection feature, ensuring that you won't lose any valuable data. It also offers
    many more powerful features such as hidden fields, team collaboration, linking
    to sub chatbots, custom code, custom domains, and folder management. Typebot is
    loved by teams and creators from all around the world for its intelligent features
    and drag-and-drop simplicity.
  category: chat
  tags:
  - Chat
  - Forms
  - Customer Support
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ''
  port:
    type: integer
    title: Port HTTP
    default: 3000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://typebot.io
- label: Documentation
  url: https://docs.typebot.io/
- label: Github
  url: https://github.com/baptisteArno/typebot.io/
instructions: Please configure at least one OAuth provider for authentication.
install:
- docker:
    image: $IMAGE
    name: typebot
    port: $PORT:3000
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Please configure at least one OAuth provider for authentication.
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
