metadata:
  name: Vaultwarden
  version: latest
  description: Vaultwarden is an unofficial Bitwarden server implementation designed
    for self-hosted deployments. It is written in Rust and is compatible with the
    official Bitwarden clients. This application is ideal for individuals, families,
    and smaller organizations who find the official resource-heavy service undesirable.
    Vaultwarden supports a wide range of features including personal and organization
    vault support, password sharing and access control, file attachments, two-step
    login via email, Duo, YubiKey, and FIDO2 WebAuthn, and many more. It also supports
    live sync for desktop/browser clients/extensions and mobile clients (Android/iOS).
    However, it does not prioritize the development of features mainly useful to larger
    organizations such as single sign-on and directory syncing.
  category: password-manager
  tags:
  - Password Manager
  - Security
  - Self-hosted
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: vaultwarden/server:latest
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Documentation
  url: https://github.com/dani-garcia/vaultwarden/wiki
- label: Github
  url: https://github.com/dani-garcia/vaultwarden
- label: Enviroment Variables
  url: https://github.com/dani-garcia/vaultwarden/blob/main/.env.template
instructions: To access the administration interface, please go to /admin on your
  installation url. The admin token is in your "Environment" tab.
install:
- docker:
    image: $IMAGE
    name: vaultwarden
    port: $PORT:80
    volumes:
    - /data
    - /web-vault
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: To access the administration interface, please go to /admin on your installation
    url. The admin token is in your "Environment" tab.
