metadata:
  name: Owncloud
  version: latest
  description: ownCloud Infinite Scale 3.0 is a secure cloud platform designed for
    real-time content collaboration. It is trusted by over 200 million users worldwide
    and offers a revolutionary project folder concept, Spaces, to boost seamless digital
    collaboration for remote teams of all sizes. The platform also provides a suite
    of powerful integrations through Web Office, including OnlyOffice, Microsoft 365,
    Collabora Online, and Microsoft Office Online, enabling users to collaborate seamlessly
    and securely from any location and device. ownCloud Infinite Scale 3.0 is designed
    with state-of-the-art security standards and best practices, ensuring superior
    data protection and privacy. It allows organizations to control their data at
    all times, anywhere, and can be deployed on-premises, in a data center of choice,
    or in a hybrid setup. The platform also supports multi-factor authentication,
    encryption, and elaborate file lifecycle management for enhanced security. ownCloud
    Infinite Scale 3.0 is designed to increase productivity by enabling modern teams
    to store, share, and work on their data and documents through a single point of
    access.
  category: file-management
  tags:
  - File Management
  - Collaboration
  - Data Security
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: owncloud/server:10.16.2
  port:
    type: integer
    title: Port HTTP
    default: 8080
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://owncloud.com/
- label: Documentation
  url: https://doc.owncloud.com/
- label: Github
  url: https://github.com/owncloud/core
instructions: null
install:
- docker:
    image: $IMAGE
    name: owncloud
    port: $PORT:8080
    volumes:
    - /mnt/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
  mysql:
    type: mysql
    version: latest
  redis:
    type: redis
    version: '7'
