metadata:
  name: StreamPanel
  version: latest
  description: StreamPanel simplifies app deployment and management, streamlining
    your workflow and boosting productivity.
  category: cloud-computing
  tags:
  - Cloud Computing
  - App Deployment
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ''
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Github
  url: https://github.com/wish-oss/stream-panel
instructions: Make sure to update the EasyPanel, Google and Github environment variables.
install:
- docker:
    image: $IMAGE
    name: streampanel
    port: $PORT:80
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Make sure to update the EasyPanel, Google and Github environment variables.
services:
  postgres:
    type: postgres
    version: latest
