metadata:
  name: Ghost File Sharing
  version: latest
  description: Our app is a powerful tool designed to streamline your workflow and
    enhance productivity. It allows you to easily find code, projects, and people
    on GitHub, making it simpler than ever to collaborate and contribute to open-source
    projects. With this app, you can stay updated with product updates, company news,
    and more by subscribing to our newsletter. It also offers a range of features
    designed to ensure the security of your work, making it a reliable choice for
    enterprises. Whether you're a developer looking for a robust platform or a company
    seeking to leverage the power of open-source, our app is the perfect solution
    for you.
  category: code-hosting
  tags:
  - Code Hosting
  - Developer Tools
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/voxelin/ghost:stable
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: Github
  url: https://github.com/voxelin/gh0.st
instructions: null
install:
- docker:
    image: $IMAGE
    name: ghost-file-sharing
    port: $PORT:8080
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
