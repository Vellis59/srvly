metadata:
  name: Thumbor
  version: latest
  description: Thumbor is an intelligent imaging service designed to streamline and
    enhance your image processing tasks. It offers on-demand cropping, resizing, and
    flipping of images, ensuring the most important parts of your pictures are always
    preserved. Leveraging advanced face and feature detection algorithms, Thumbor
    smartly identifies key points in an image for optimal cropping and resizing. It
    also supports a variety of image filters for post-processing, which can be applied
    in a sequence for desired effects. Filters include brightness, contrast, grayscale,
    red-eye, and blur, among others. Thumbor also supports the WebP format, a superior
    image format that compresses better than jpeg and png, improving your website's
    performance. With Thumbor, you can store and load images from any location, and
    it's easy to implement a new loader or storage. It's a complete solution for your
    imaging needs, from uploading images to rendering them with smart face-recognition
    cropping.
  category: image-processing
  tags:
  - Image Processing
  - Open Source
  - Smart Imaging
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: thumbororg/thumbor:latest
  port:
    type: integer
    title: Port HTTP
    default: 8888
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://www.thumbor.org
- label: Documentation
  url: https://thumbor.readthedocs.io
- label: Github
  url: https://github.com/thumbor/thumbor
instructions: null
install:
- docker:
    image: $IMAGE
    name: thumbor
    port: $PORT:8888
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
