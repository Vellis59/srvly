metadata:
  name: xBackbone
  version: latest
  description: xBackbone is a versatile, self-hosted file and image sharing platform
    designed to manage and share content securely and efficiently. It features a clean
    and intuitive interface, supports multiple authentication options, and provides
    advanced file management capabilities. With xBackbone, you can maintain complete
    control over your shared content, ensuring privacy and flexibility.
  category: file-sharing
  tags:
  - File Sharing
  - Self-Hosted
  - Privacy
  - Analytics
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: linuxserver/xbackbone:3.8.1
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://xbackbone.app/
- label: Github
  url: https://github.com/SergiX44/XBackBone
instructions: Configure the Base URL and set up the database connection during installation.
install:
- docker:
    image: $IMAGE
    name: xbackbone
    port: $PORT:80
    volumes:
    - /config
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Configure the Base URL and set up the database connection during installation.
services:
  mysql:
    type: mysql
    version: latest
