metadata:
  name: Mstream
  version: latest
  description: mStream is a personal music streaming server that allows you to access
    your music collection from anywhere. It's like having your private cloud for music.
    With mStream, you can sync your collection between your devices for offline access.
    It offers high-quality streaming for audiophiles and FLAC enthusiasts, allowing
    you to stream your music uncompressed. mStream respects your privacy, it does
    not collect statistics on your listening habits. It's also beneficial for artists
    as buying music directly means your money goes directly to them. The server setup
    is quick and it runs on any operating system. It also has mobile apps for iOS
    & Android and allows you to stream your music in any browser. Other features include
    gapless playback, Milkdrop visualizer, playlist sharing, and drag and drop file
    uploading. All the code for mStream is open source.
  category: media
  tags:
  - Media
  - Music Streaming
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: lscr.io/linuxserver/mstream:6.6.0
  port:
    type: integer
    title: Port HTTP
    default: 3000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://mstream.io
- label: Github
  url: https://github.com/IrosTheBeggar/mStream
instructions: null
install:
- docker:
    image: $IMAGE
    name: mstream
    port: $PORT:3000
    volumes:
    - /config
    - /music
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
