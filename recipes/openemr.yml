metadata:
  name: OpenEMR
  version: latest
  description: OpenEMR is a powerful, open-source electronic medical records and practice
    management solution designed for efficient healthcare operations. It provides
    a comprehensive, user-friendly interface, supports modular functionality, and
    offers robust reporting and analytics for clinical and administrative tasks. With
    OpenEMR, healthcare providers can manage patient records, appointments, billing,
    and more. The application is accessible via your host on ports 80 and 443. This
    container is built on a lightweight Docker image, providing additional environment
    variables and configurations for enhanced flexibility. It also supports the docker
    manifest for multi-platform awareness, ensuring the correct image for your architecture.
  category: electronic-health-records
  tags:
  - Electronic Health Records
  - Practice Management
  - Open Source
  - Healthcare
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: openemr/openemr:8.0.1
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: Documentation
  url: https://www.open-emr.org/wiki/index.php/OpenEMR_Wiki_Home_Page
- label: Github
  url: https://github.com/openemr/openemr
instructions: null
install:
- docker:
    image: $IMAGE
    name: openemr
    port: $PORT:80
    volumes:
    - /var/www/localhost/htdocs/openemr/sites
    - /var/log
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  mysql:
    type: mysql
    version: latest
