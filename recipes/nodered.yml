metadata:
  name: Node-RED
  version: latest
  description: Node-RED is a unique programming tool designed for creating event-driven
    applications in a low-code environment. It allows you to connect hardware devices,
    APIs, and online services in innovative ways. The app features a browser-based
    editor that simplifies the process of creating flows using a wide array of nodes
    available in the palette. These flows can be deployed to its runtime with just
    a single click. Node-RED also allows you to create JavaScript functions within
    the editor using a rich text editor and save useful functions, templates, or flows
    for future use. Built on Node.js, Node-RED is lightweight and can run on low-cost
    hardware like Raspberry Pi or in the cloud. It also supports the import and export
    of flows in JSON format for easy sharing.
  category: developer-tools
  tags:
  - Developer Tools
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: nodered/node-red:4.1.8-22
  port:
    type: integer
    title: Port HTTP
    default: 8800
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://nodered.org/
- label: Documentation
  url: https://nodered.org/docs/
- label: Forum
  url: https://discourse.nodered.org/
- label: Github
  url: https://github.com/node-red
instructions: null
install:
- docker:
    image: $IMAGE
    name: nodered
    port: $PORT:8800
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
