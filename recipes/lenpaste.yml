metadata:
  name: Lenpaste
  version: latest
  description: Lenpaste is a web service that allows you to share notes anonymously.
    It is an open-source alternative to pastebin.com. The app supports multiple languages
    and uses cookies only to store settings. It can work without JavaScript and has
    its own API. Lenpaste allows you to set maximum length for the paste title and
    body, maximum lifetime of the paste, and rate limits for viewing and creating
    pastes. It also provides options to prohibit search engine crawlers from indexing
    the site and to set information about the server admin. Lenpaste is self-hosted
    and provides a list of public servers managed by various contributors.
  category: code-hosting
  tags:
  - Code Hosting
  - Documents
  - Notes
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: git.lcomrade.su/root/lenpaste:1.3
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Documentation
  url: https://git.lcomrade.su/root/lenpaste/src/branch/main/docs
- label: Gitea
  url: https://git.lcomrade.su/root/lenpaste
instructions: null
install:
- docker:
    image: $IMAGE
    name: lenpaste
    port: $PORT:80
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
