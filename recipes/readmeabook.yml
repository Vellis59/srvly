metadata:
  name: ReadMeABook
  version: latest
  description: ReadMeABook is a self-hosted audiobook request and automation platform—like
    Radarr/Sonarr + Overseerr for audiobooks. Integrates with Plex or Audiobookshelf,
    supports torrents (qBittorrent) and Usenet (SABnzbd), Prowlarr for search. Features
    multi-file chapter merging, e-book sidecars, AI recommendations (BookDate), and
    admin approval workflows. Includes PostgreSQL and Redis.
  category: audiobook
  tags:
  - Audiobook
  - Media
  - Plex
  - Automation
  - Open Source
  - Self-hosted
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/kikootwo/readmeabook:1.1.8
  port:
    type: integer
    title: Port HTTP
    default: 3030
  version:
    type: string
    title: Version
    default: latest
links:
- label: GitHub
  url: https://github.com/kikootwo/readmeabook
- label: Documentation
  url: https://github.com/kikootwo/readmeabook/tree/main/documentation
instructions: After deployment, access the web UI and run the setup wizard. Set PUBLIC_URL
  to your domain (e.g. `https://readmeabook.yourdomain.com`) for OAuth (Plex/OIDC).
  Mount downloads and media volumes for audiobook storage. Connect to Plex or Audiobookshelf,
  and configure qBittorrent/SABnzbd for downloads.
install:
- docker:
    image: $IMAGE
    name: readmeabook
    port: $PORT:3030
    volumes:
    - /app/config
    - /app/cache
    - /downloads
    - /media
    - /var/lib/postgresql/data
    - /var/lib/redis
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: After deployment, access the web UI and run the setup wizard. Set PUBLIC_URL
    to your domain (e.g. `https://readmeabook.yourdomain.com`) for OAuth (Plex/OIDC).
    Mount downloads and media volumes for audiobook storage. Connect to Plex or Audiobookshelf,
    and configure qBittorrent/SABnzbd for downloads.
services:
  postgres:
    type: postgres
    version: latest
