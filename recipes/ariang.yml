metadata:
  name: AriaNg
  version: latest
  description: AriaNg is a modern web frontend for aria2, a lightweight multi-protocol
    & multi-source command-line download utility. It provides a beautiful web interface
    for managing downloads.
  category: download-manager
  tags:
  - Download Manager
  - File Transfer
  - Self-hosted
  - Open Source
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: hurlenko/aria2-ariang:1.3.13
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: Website
  url: https://ariang.mayswind.net
- label: GitHub
  url: https://github.com/mayswind/AriaNg
- label: Docker Hub
  url: https://hub.docker.com/r/hurlenko/aria2-ariang
instructions: null
install:
- docker:
    image: $IMAGE
    name: ariang
    port: $PORT:8080
    volumes:
    - /aria2/data
    - /aria2/conf
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
