metadata:
  name: ByteStash
  version: latest
  description: ByteStash is a self-hosted snippet code storage system designed for
    developers and teams. It provides a secure, organized platform to store, manage,
    and share your code snippets. With support for multiple programming languages,
    syntax highlighting, tagging, and a robust search functionality, ByteStash streamlines
    code reuse and collaboration. The intuitive interface and powerful features ensure
    that your code is always at your fingertips, whether you're working solo or with
    a team.
  category: code-snippets
  tags:
  - Code Snippets
  - Development
  - Productivity
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/jordan-dalby/bytestash:1.5.11
  port:
    type: integer
    title: Port HTTP
    default: 5000
links:
- label: Documentation
  url: https://github.com/jordan-dalby/bytestash/wiki
- label: Github
  url: https://github.com/jordan-dalby/bytestash
instructions: null
install:
- docker:
    image: $IMAGE
    name: bytestash
    port: $PORT:5000
    volumes:
    - /data/snippets
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
