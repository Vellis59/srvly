metadata:
  name: Zusam
  version: latest
  description: Zusam is a free and open-source way to self-host private forums for
    friends and family. It's a simple, modern, and privacy-focused platform for group
    discussions.
  category: forum
  tags:
  - Forum
  - Discussion
  - Self-hosted
  - Open Source
  - Privacy
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: zusam/zusam:0.6.1
  port:
    type: integer
    title: Port HTTP
    default: 8080
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://zusam.org
- label: Documentation
  url: https://docs.zusam.org
- label: GitHub
  url: https://github.com/zusam/zusam
- label: Docker Hub
  url: https://hub.docker.com/r/zusam/zusam
instructions: null
install:
- docker:
    image: $IMAGE
    name: zusam
    port: $PORT:8080
    volumes:
    - /zusam/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
