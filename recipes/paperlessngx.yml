metadata:
  name: Paperless-ngx
  version: latest
  description: Paperless-ngx is a modern document management system designed to convert
    your physical documents into a searchable online archive, helping you maintain
    a clutter-free, paperless environment. It uses advanced OCR technology to add
    selectable text to image-only documents, and allows you to organize and index
    your scanned documents with tags, correspondents, types, and more. The app supports
    a variety of file formats including PDFs, images, plain text files, and Office
    documents. It also features a single-page application front end with a dashboard
    that displays basic statistics and allows document upload. With its full-text
    search functionality, you can easily find the documents you need, with results
    sorted by relevance to your search query. The app also includes email processing,
    enabling it to add documents from your email accounts. Moreover, Paperless-ngx
    is powered by machine learning, enabling it to learn from your documents and automatically
    assign tags, correspondents, and types to documents once you've stored a few documents
    in it. It is optimized for multi-core systems, allowing it to process multiple
    documents in parallel.
  category: documents
  tags:
  - Documents
  - Productivity
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: paperlessngx/paperless-ngx:2.20.15
  port:
    type: integer
    title: Port HTTP
    default: 8000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Documentation
  url: https://paperless-ngx.readthedocs.io/en/latest/
- label: Github
  url: https://github.com/paperless-ngx/paperless-ngx
instructions: Please use the following credentials to login. admin|password
install:
- docker:
    image: $IMAGE
    name: paperlessngx
    port: $PORT:8000
    volumes:
    - /usr/src/paperless/consume
    - /usr/src/paperless/data
    - /usr/src/paperless/export
    - /usr/src/paperless/media
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Please use the following credentials to login. admin|password
services:
  redis:
    type: redis
    version: '7'
