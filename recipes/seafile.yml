metadata:
  name: Seafile
  version: latest
  description: Seafile is a professional, open-source file synchronization and sharing
    platform with privacy protection and teamwork features. It provides secure file
    storage, synchronization, and sharing capabilities with end-to-end encryption,
    making it perfect for teams and organizations that need to collaborate on files
    while maintaining data security. Seafile supports file versioning, online editing,
    and mobile access across all platforms.
  category: file-sync
  tags:
  - File Sync
  - File Sharing
  - Collaboration
  - Self-Hosted
  - Encryption
  - Team Work
  - Document Management
  - Cloud Storage
  - WebDAV
  - Mobile Access
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: seafileltd/seafile-mc:13.0.21
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: GitHub
  url: https://github.com/haiwen/seafile
- label: Documentation
  url: https://manual.seafile.com/
- label: Website
  url: https://hub.docker.com/r/seafileltd/seafile-mc
instructions: Please go to this document https://ahsonshaikh616.medium.com/deploying-seafile-via-easypanel-feature-rich-file-sync-share-1d2df0a37345
install:
- docker:
    image: $IMAGE
    name: seafile
    port: $PORT:80
    volumes:
    - /shared
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Please go to this document https://ahsonshaikh616.medium.com/deploying-seafile-via-easypanel-feature-rich-file-sync-share-1d2df0a37345
services:
  mysql:
    type: mysql
    version: latest
