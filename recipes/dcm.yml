metadata:
  name: DCM
  version: latest
  description: DCM is a lightweight self-hosted web interface for managing and monitoring
    Docker containers. It provides a simple dashboard to view container status, start/stop
    operations, and inspect basic container details. Designed to be minimal and easy
    to deploy, DCM helps you keep an eye on your containers without exposing the full
    Docker API or using heavier management stacks. Ideal for small home labs or users
    who want a quick overview of their running services via a browser.
  category: docker
  tags:
  - Docker
  - Dashboard
  - Monitoring
  - Self-Hosted
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/ajnart/dcm:sha-6d86fd5
  port:
    type: integer
    title: Port HTTP
    default: 7576
links:
- label: GitHub
  url: https://github.com/ajnart/dcm
- label: Docker Hub
  url: https://hub.docker.com/r/ajnart/dcm
instructions: null
install:
- docker:
    image: $IMAGE
    name: dcm
    port: $PORT:7576
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
