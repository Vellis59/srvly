metadata:
  name: Restreamer
  version: latest
  description: datarhei Restreamer is a powerful video streaming platform designed
    to provide real-time live video streaming on websites and social media platforms.
    It eliminates the need for additional streaming provider costs for video hosting
    or software licensing. The app allows teams to live stream and restream everything
    from webcams to broadcasting, making streaming more efficient and user-friendly.
    It offers live streaming on websites without additional service providers or video
    hosting providers, and it's instantly available, free of charge, and without advertising.
    Users can share live videos publicly or privately with anyone, or use a secret
    link to give their audience access to private content. The app also provides a
    simple streaming server with self-installation on your server or Raspberry Pi.
    The fully documented API makes datarhei Restreamer easy to adapt to any project.
  category: media
  tags:
  - Media
  - Video Streaming
  - Live Streaming
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: datarhei/restreamer:2.12.0
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: Documentation
  url: https://docs.datarhei.com/restreamer/
- label: Github
  url: https://github.com/datarhei/restreamer
instructions: null
install:
- docker:
    image: $IMAGE
    name: restreamer
    port: $PORT:8080
    volumes:
    - /core/config
    - /core/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
