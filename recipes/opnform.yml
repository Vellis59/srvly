metadata:
  name: OpnForm
  version: latest
  description: OpnForm is an open-source form builder that allows you to create beautiful,
    customizable forms with ease. It provides an intuitive interface for building
    forms,  collecting submissions, and analyzing data.
  category: forms
  tags:
  - Forms
  - Web Apps
  - Productivity
  - Business Apps
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: jhumanj/opnform-client:1.13.2
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://opnform.com/
- label: Documentation
  url: https://docs.opnform.com/
- label: Github
  url: https://github.com/JhumanJ/OpnForm
instructions: Login using the credentials, admin@opnform.com/password.
install:
- docker:
    image: $IMAGE
    name: opnform
    port: $PORT:80
    volumes:
    - /etc/nginx/conf.d/opnform.template
    - /usr/share/nginx/html/storage
    - /usr/share/nginx/html/storage
    - /usr/share/nginx/html/storage
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Login using the credentials, admin@opnform.com/password.
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
