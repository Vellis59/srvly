metadata:
  name: Stremio
  version: latest
  description: Stremio is a modern media center application that provides a unified
    platform for streaming movies, TV shows, and live TV content. This template uses
    the community Docker image tsaridas/stremio-docker (server and web UI). The self-hosted
    setup lets you run your own Stremio server, giving you complete control over your
    media streaming experience. With support for various content sources and add-ons,
    Stremio aggregates content from multiple providers into a single interface. The
    application features automatic server URL configuration and CORS handling, making
    it easy to access from any device. With persistent storage for server data and
    configurations, Stremio ensures your settings and preferences are retained across
    container restarts. Perfect for media enthusiasts who want a centralized streaming
    solution, users looking for a self-hosted alternative to commercial streaming
    services, or anyone seeking a flexible media center that can aggregate content
    from multiple sources.
  category: media
  tags:
  - Media
  - Streaming
  - Movies
  - TV Shows
  - Self-Hosted
  - Media Center
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: tsaridas/stremio-docker:v1.2.16
  port:
    type: integer
    title: Port HTTP
    default: 8080
  version:
    type: string
    title: Version
    default: latest
links:
- label: GitHub
  url: https://github.com/tsaridas/stremio-docker
- label: Docker Hub
  url: https://hub.docker.com/r/tsaridas/stremio-docker
- label: Website
  url: https://www.stremio.com
- label: Blog
  url: https://blog.stremio.com
instructions: null
install:
- docker:
    image: $IMAGE
    name: stremio
    port: $PORT:8080
    volumes:
    - /root/.stremio-server
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
