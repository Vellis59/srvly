metadata:
  name: Bazarr
  version: latest
  description: Bazarr is a companion application to Sonarr and Radarr, designed to
    manage and download subtitles based on your specific needs. It allows you to define
    your preferences by TV show or movie, and Bazarr handles the rest. The app automatically
    searches for missing subtitles and downloads them as soon as they become available
    in your desired language. It also offers a manual search feature to find all matching
    subtitles, allowing you to choose the one you want and download it to your media
    directory. Bazarr also regularly searches for matching subtitles and upgrades
    the ones you previously downloaded if a better one is found. Please note that
    Bazarr does not scan the disk to detect series and movies, it only manages the
    series and movies that are indexed in Sonarr and Radarr.
  category: media
  tags:
  - Media
  - Subtitles
  - Download
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: lscr.io/linuxserver/bazarr:1.5.6
  port:
    type: integer
    title: Port HTTP
    default: 6767
links:
- label: Website
  url: https://bazarr.media/
- label: Documentation
  url: https://wiki.bazarr.media/
- label: Github
  url: https://github.com/morpheus65535/bazarr
instructions: null
install:
- docker:
    image: $IMAGE
    name: bazarr
    port: $PORT:6767
    volumes:
    - /config
    - /movies
    - /tv
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
