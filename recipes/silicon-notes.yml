metadata:
  name: Silicon Notes
  version: latest
  description: Silicon Notes is a lightweight, low-friction personal knowledge base
    designed to streamline your note-taking and information organization. The app
    allows you to edit your notes in plaintext using Markdown, with the added benefit
    of language syntax highlighting in the rendered HTML. It offers powerful full-text
    and page title search capabilities, making it easier than ever to find the information
    you need. The app also features bi-directional page relationships, allowing you
    to create a complex web of interconnected information. Silicon Notes also includes
    a table of contents in the left sidebar for easy navigation, and a mobile layout
    that makes it accessible on any device. The app's no-frills UI ensures a smooth
    and distraction-free user experience. Silicon Notes is built with a minimal tech
    stack, relying on a few smallish dependencies, making it a lightweight and efficient
    tool for your personal knowledge management.
  category: notes
  tags:
  - Notes
  - Documentation
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: bityard/silicon:0.1.5
  port:
    type: integer
    title: Port HTTP
    default: 5000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Github
  url: https://github.com/cu/silicon
instructions: null
install:
- docker:
    image: $IMAGE
    name: silicon-notes
    port: $PORT:5000
    volumes:
    - /home/silicon/instance
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
