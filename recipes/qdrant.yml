metadata:
  name: Qdrant
  version: latest
  description: Qdrant is a powerful vector database and vector similarity search engine
    designed to power the next generation of AI applications. It deploys as an API
    service, providing search for the nearest high-dimensional vectors. This allows
    embeddings or neural network encoders to be turned into full-fledged applications
    for matching, searching, recommending, and much more. Qdrant supports a large
    variety of data types and query conditions, including string matching, numerical
    ranges, geo-locations, and more. It is cloud-native and scales horizontally, ensuring
    efficient utilization of resources. With Qdrant, you can build and deploy semantic
    neural search on your data in minutes, understand user behavior in real time,
    and find similar images or detect duplicates with ease.
  category: data-science
  tags:
  - Data Science
  - Databases
  - Developer Tools
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: qdrant/qdrant:v1.17
  port:
    type: integer
    title: Port HTTP
    default: 6333
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://qdrant.tech/
- label: Documentation
  url: https://qdrant.tech/documentation/
- label: Github
  url: https://github.com/qdrant/qdrant
instructions: null
install:
- docker:
    image: $IMAGE
    name: qdrant
    port: $PORT:6333
    volumes:
    - /qdrant/storage
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
