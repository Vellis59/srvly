metadata:
  name: Gameyfin
  version: latest
  description: Gameyfin is a free and open-source application for managing your video
    game library. Track installed and wanted games, fetch metadata (e.g. IGDB, Steam),
    and use plugins for downloads and extra providers. It runs as a Kotlin / Spring
    Boot app with a web UI, PF4J plugins, and optional OIDC. Docker is the recommended
    install path; persist db, data, plugin data, logs, and mount at least one folder
    for your game files.
  category: games
  tags:
  - Games
  - Library
  - Self-Hosted
  - Metadata
  - Docker
  - IGDB
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/gameyfin/gameyfin:2.4.0
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: Website
  url: https://gameyfin.org
- label: Documentation
  url: https://gameyfin.org/installation/docker/
- label: GitHub
  url: https://github.com/gameyfin/gameyfin
- label: Container registry (GHCR)
  url: https://github.com/gameyfin/gameyfin/pkgs/container/gameyfin
instructions: 'APP_KEY is generated on deploy (32 random bytes, Base64). Do not change
  it

  after data exists or the app cannot decrypt secrets in the database; if you

  recreate the service, restore the same APP_KEY from a backup.

  Libraries: Put (or bind) your games under the library volume; inside

  Gameyfin, add libraries whose paths are under `/library`

  (https://gameyfin.org/installation/getting-started/).

  PUID / PGID default to 1000; set them to your host user/group if file

  permissions on mounted volumes are wrong.

  Optional: for the bundled torrent plugin, publish host ports 6969 and 6881

  on this service.

  '
install:
- docker:
    image: $IMAGE
    name: gameyfin
    port: $PORT:8080
    volumes:
    - /opt/gameyfin/db
    - /opt/gameyfin/data
    - /opt/gameyfin/plugindata
    - /opt/gameyfin/logs
    - /library
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: 'APP_KEY is generated on deploy (32 random bytes, Base64). Do not change
    it

    after data exists or the app cannot decrypt secrets in the database; if you

    recreate the service, restore the same APP_KEY from a backup.

    Libraries: Put (or bind) your games under the library volume; inside

    Gameyfin, add libraries whose paths are under `/library`

    (https://gameyfin.org/installation/getting-started/).

    PUID / PGID default to 1000; set them to your host user/group if file

    permissions on mounted volumes are wrong.

    Optional: for the bundled torrent plugin, publish host ports 6969 and 6881

    on this service.

    '
