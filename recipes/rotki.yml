metadata:
  name: Rotki
  version: latest
  description: Rotki is a comprehensive asset management and accounting application,
    specifically designed for crypto assets. The app is designed to help with tax
    reporting by importing, displaying, storing, and generating reports and statistics
    from cryptocurrency transaction data and other assets. It integrates with multiple
    exchanges, providing a centralized platform for managing your crypto assets. Rotki
    also offers the ability to generate profit/loss reports, making it easier to understand
    your financial standing. It's important to note that while Rotki aids in tax reporting,
    it does not provide tax or legal advice, and it's the user's responsibility to
    ensure the accuracy of the data provided to the service. The app is not intended
    for continuous monitoring of transaction data or for automatic transmission of
    your transaction data to any tax authority.
  category: finance
  tags:
  - Finance
  - Analytics
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: rotki/rotki:v1.42.1
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Documentation
  url: https://rotki.readthedocs.io/en/latest/
- label: Github
  url: https://github.com/rotki/rotki
- label: Website
  url: https://rotki.com/
instructions: null
install:
- docker:
    image: $IMAGE
    name: rotki
    port: $PORT:80
    volumes:
    - /data
    - /logs
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
