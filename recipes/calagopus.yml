metadata:
  name: Calagopus
  version: latest
  description: Calagopus is a modern open-source game server management panel built in Rust and React. It features a refreshed UI, an extensible plugin architecture, and high-performance reimplementation of game server management.
  category: gaming
  tags:
  - Gaming
  - Server Management
  - Rust
  - Self-Hosted
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image
    default: ghcr.io/calagopus/calagopus:latest
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: GitHub
  url: https://github.com/calagopus/calagopus
install:
- docker:
    image: $IMAGE
    name: calagopus
    port: $PORT:8080
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
