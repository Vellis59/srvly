metadata:
  name: Filerise
  version: latest
  description: Filerise is a modern file sharing and management platform that allows
    you to upload, organize, and share files securely. It provides a clean web interface
    for file management with features like user authentication, file uploads, metadata
    management, and configurable upload limits.
  category: file-management
  tags:
  - File Management
  - File Sharing
  - Web Interface
  - Self-Hosted
  - Storage
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: error311/filerise-docker:v3.12.0
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://filerise.net
- label: Documentation
  url: https://filerise.net/docs/
- label: Github
  url: https://github.com/error311/filerise
instructions: On first launch, you will be guided to create the initial admin user.
install:
- docker:
    image: $IMAGE
    name: filerise
    port: $PORT:80
    volumes:
    - /var/www/uploads
    - /var/www/users
    - /var/www/metadata
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: On first launch, you will be guided to create the initial admin user.
