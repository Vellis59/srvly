metadata:
  name: AllTube
  version: latest
  description: AllTube Download is an application designed to facilitate the downloading
    of videos from YouTube. It provides an HTML GUI for youtube-dl, a command-line
    program to download videos from YouTube and other video sites. The app allows
    users to download videos directly to their server, making it easy to access and
    manage their favorite content. AllTube supports various configurations and can
    be customized according to user preferences. It also offers a JSON API, which
    returns a JSON object generated by youtube-dl, providing detailed information
    about the video. The app is lightweight and efficient, making it a great choice
    for those who frequently download videos from YouTube.
  category: media
  tags:
  - Media
  - Video
  - Downloader
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: dnomd343/alltube:latest
  port:
    type: integer
    title: Port HTTP
    default: 24488
links:
- label: Github
  url: https://github.com/Rudloff/alltube
- label: Docker
  url: https://hub.docker.com/r/dnomd343/alltube
instructions: null
install:
- docker:
    image: $IMAGE
    name: alltube
    port: $PORT:24488
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
