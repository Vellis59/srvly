metadata:
  name: Planka
  version: latest
  description: Planka is a free, open-source Kanban board designed to streamline project
    management for workgroups. With Planka, you can create projects, boards, lists,
    cards, labels, and tasks, all in one place. It allows you to add card members,
    track time, set due dates, add attachments, and write comments. It also supports
    markdown in card descriptions and comments. The app provides real-time updates,
    ensuring all changes in cards or boards are instantly visible to your colleagues.
    You can customize your project background and filter tasks by members and labels.
    User notifications keep everyone in the loop about project updates. The app also
    supports multiple languages, making it a versatile tool for international teams.
  category: project-management
  tags:
  - Project Management
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: lscr.io/linuxserver/planka:2.1.1
  port:
    type: integer
    title: Port HTTP
    default: 1337
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://planka.app
- label: Documentation
  url: https://docs.planka.cloud
- label: Github
  url: https://github.com/plankanban/planka
instructions: Login with demo@demo.demo:demo
install:
- docker:
    image: $IMAGE
    name: planka
    port: $PORT:1337
    volumes:
    - /config
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Login with demo@demo.demo:demo
services:
  postgres:
    type: postgres
    version: latest
