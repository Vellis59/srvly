metadata:
  name: ITSM-NG
  version: latest
  description: ITSM-NG is a free and open-source IT Service Management (ITSM) solution
    designed to help organizations manage their IT services, assets, and support operations
    efficiently. Born from the GLPI project, ITSM-NG offers a comprehensive ITIL-aligned
    platform for incident management, problem management, change management, asset
    tracking, and service catalog. It features a modern interface, customizable workflows,
    automated ticket routing, SLA management, knowledge base, and extensive reporting
    capabilities. ITSM-NG supports multi-tenancy, LDAP/Active Directory integration,
    and provides a powerful plugin system for extending functionality. Perfect for
    IT teams seeking a professional, self-hosted solution for managing their IT operations
    and improving service delivery.
  category: itsm
  tags:
  - ITSM
  - Service Management
  - Helpdesk
  - Asset Management
  - ITIL
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: itsmng/itsm-ng:2.1.4
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://www.itsm-ng.org/
- label: Github
  url: https://github.com/itsmng/itsm-ng
- label: Docker Hub
  url: https://hub.docker.com/r/itsmng/itsm-ng
instructions: Default login credentials are itsm/itsm
install:
- docker:
    image: $IMAGE
    name: itsmng
    port: $PORT:80
    volumes:
    - /var/www/itsm-ng/config
    - /var/www/itsm-ng/plugins
    - /var/www/itsm-ng/files
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Default login credentials are itsm/itsm
services:
  mysql:
    type: mysql
    version: latest
