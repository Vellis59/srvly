metadata:
  name: Ackee
  version: latest
  description: Ackee is a self-hosted, Node.js based analytics tool designed for those
    who value privacy. It operates on your own server, analyzing the traffic of your
    websites and providing valuable statistics through a minimalistic interface. Ackee
    offers an overview of all your websites, allowing you to analyze their collective
    performance. It provides insights into views, referrers, durations, and more.
    You can easily add, edit, and delete your domains, with a new tracking code just
    a few clicks away. Ackee's minimal UI allows you to analyze your data without
    losing focus, and its multi-step anonymization process ensures your users' privacy.
    The app allows you to analyze as many domains and apps as you want, and its interface
    is designed to be fast and easy to navigate. Ackee also offers a centralized GraphQL
    API, perfect for collecting data from a variety of sources. It uses a multi-step
    process to keep tracked data anonymized while still providing helpful analytics.
  category: analytics
  tags:
  - Analytics
  - Privacy
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: electerious/ackee:3.6.0
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Website
  url: https://ackee.electerious.com/
- label: Documentation
  url: https://docs.ackee.electerious.com/
- label: Github
  url: https://github.com/electerious/Ackee
instructions: null
install:
- docker:
    image: $IMAGE
    name: ackee
    port: $PORT:3000
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
