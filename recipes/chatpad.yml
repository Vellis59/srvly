metadata:
  name: Chatpad
  version: latest
  description: Chatpad AI is a premium quality user interface for ChatGPT, designed
    to provide the ultimate chatting experience. It's not just another ChatGPT interface,
    but a broader vision to revolutionize the way users interact with ChatGPT. The
    app is free and open-source, with its source code readily available on GitHub
    for anyone interested. Privacy is a top priority in Chatpad AI, with no tracking,
    no cookies, and all data being stored locally. The app is crafted with love and
    care, ensuring the best possible experience for its users. It's available as a
    web app and a desktop app, providing flexibility and convenience. Chatpad AI is
    also self-hostable using Docker, giving users full control over their data and
    usage.
  category: chat
  tags:
  - Chat
  - Privacy
  - Productivity
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/deiucanta/chatpad
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://chatpad.ai
- label: Github
  url: https://github.com/deiucanta/chatpad
instructions: null
install:
- docker:
    image: $IMAGE
    name: chatpad
    port: $PORT:80
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
