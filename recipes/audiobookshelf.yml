metadata:
  name: Audiobookshelf
  version: latest
  description: Audiobookshelf is a self-hosted server designed to manage and play
    your audiobooks and podcasts. It works best when you have an organized directory
    structure, as it takes information from your folder names, including the author
    name, series name, book title, publish year, series sequence, and subtitle. The
    app uses the ID3 metadata tags in audio files to populate data, and it supports
    the same configuration options you would pass to a Docker container. Audiobookshelf
    is designed to be deployed on your own server using Easypanel, a modern server
    control panel. With Audiobookshelf, you can enjoy your favorite audiobooks and
    podcasts in a well-organized and easily accessible manner.
  category: media
  tags:
  - Media
  - Educational
  - Productivity
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/advplyr/audiobookshelf:2.33.2
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://www.audiobookshelf.org
- label: Documentation
  url: https://www.audiobookshelf.org/docs
- label: Github
  url: https://github.com/advplyr/audiobookshelf
instructions: Starter Host Path will be bind to "/audiobooks" inside the container.
  You can bind any other directories you want to use for your book and podcast collections.
install:
- docker:
    image: $IMAGE
    name: audiobookshelf
    port: $PORT:80
    volumes:
    - /config
    - /metadata
    - /audiobooks
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Starter Host Path will be bind to "/audiobooks" inside the container. You
    can bind any other directories you want to use for your book and podcast collections.
