metadata:
  name: Wg-easy
  version: latest
  description: WireGuard Easy is an all-in-one application designed to simplify the
    installation and management of WireGuard on any Linux host. With a user-friendly
    web interface, it allows you to list, create, edit, delete, enable, and disable
    clients with ease. You can also view a client's QR code and download a client's
    configuration file directly from the app. The app provides statistics on which
    clients are connected and features Tx/Rx charts for each connected client. It
    also supports Gravatar. WireGuard Easy requires a host with a kernel that supports
    WireGuard and Docker installed.
  category: network-tools
  tags:
  - Network Tools
  - Security
  - VPN
  - WireGuard
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/wg-easy/wg-easy:15.2.2
  port:
    type: integer
    title: Port HTTP
    default: 51820
  version:
    type: string
    title: Version
    default: latest
links:
- label: Github
  url: https://github.com/wg-easy/wg-easy
instructions: null
install:
- docker:
    image: $IMAGE
    name: wg-easy
    port: $PORT:51820
    volumes:
    - /etc/wireguard
    - /lib/modules
    extra_ports:
    - 51821:51821
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
