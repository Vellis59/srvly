metadata:
  name: Supabase
  version: latest
  description: Supabase is an open source Firebase alternative. Supabase is built
    on top of Postgres, and it's easy to set up and use. Supabase is also completely
    free to use, and it's completely open source.
  category: self-hosted
  tags: []
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ''
  port:
    type: integer
    title: Port HTTP
    default: 8000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://supabase.com/
- label: Documentation
  url: https://supabase.com/docs
- label: Github
  url: https://github.com/supabase/supabase
instructions: Username is `supabase` and password is `this_password_is_insecure_and_should_be_updated`.
  You can change these by editing the environment variables.
install:
- docker:
    image: $IMAGE
    name: supabase
    port: $PORT:8000
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Username is `supabase` and password is `this_password_is_insecure_and_should_be_updated`.
    You can change these by editing the environment variables.
