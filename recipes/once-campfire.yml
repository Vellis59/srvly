metadata:
  name: Once Campfire
  version: latest
  description: Once Campfire is a modern, open-source team communication platform
    built by Basecamp. It provides a simple and intuitive interface for team messaging,
    file sharing, and collaboration. Once Campfire offers real-time messaging, threaded
    conversations, file uploads, and search functionality in a clean, distraction-free
    environment. It's designed to help teams communicate effectively without the complexity
    of larger enterprise platforms.
  category: team-communication
  tags:
  - Team Communication
  - Messaging
  - Collaboration
  - Open Source
  - Basecamp
  - Real-Time
  - File Sharing
  - Self-Hosted
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/basecamp/once-campfire:sha-ba11a0a
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: GitHub
  url: https://github.com/basecamp/once-campfire
instructions: Setup the initial user and start using the app.
install:
- docker:
    image: $IMAGE
    name: once-campfire
    port: $PORT:80
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Setup the initial user and start using the app.
