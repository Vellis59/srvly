metadata:
  name: ezBookkeeping
  version: latest
  description: ezBookkeeping is a simple and easy-to-use personal bookkeeping application
    that helps you manage your personal finances. It provides features for tracking
    income, expenses, and account balances.
  category: finance
  tags:
  - Finance
  - Bookkeeping
  - Personal Finance
  - Budgeting
  - Open Source
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: mayswind/ezbookkeeping:SNAPSHOT-20260429
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: Github
  url: https://github.com/mayswind/ezbookkeeping
- label: Documentation
  url: https://github.com/mayswind/ezbookkeeping/wiki
instructions: null
install:
- docker:
    image: $IMAGE
    name: ezbookkeeping
    port: $PORT:8080
    volumes:
    - /ezbookkeeping/data
    - /ezbookkeeping/storage
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
