metadata:
  name: Dockhand
  version: latest
  description: Dockhand is a modern Docker container management and monitoring tool
    that provides an intuitive web interface for managing your Docker containers,
    images, volumes, and networks. With real-time container statistics, log viewing,
    and container lifecycle management, Dockhand simplifies Docker operations for
    both developers and system administrators. The application offers comprehensive
    container management capabilities including start, stop, restart, and removal
    operations, along with detailed container information and resource usage monitoring.
    Perfect for developers who need a visual interface for Docker management, system
    administrators monitoring container infrastructure, or teams looking for an alternative
    to command-line Docker tools.
  category: docker
  tags:
  - Docker
  - Container Management
  - Monitoring
  - DevOps
  - Self-Hosted
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: fnsys/dockhand:48a80675
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: GitHub
  url: https://github.com/fnsys/dockhand
- label: Website
  url: https://dockhand.pro
- label: Docker Hub
  url: https://hub.docker.com/r/fnsys/dockhand
instructions: 'After deployment, access Dockhand at your domain. The application requires

  access to the Docker socket to manage containers. Make sure you have the

  necessary permissions to access the Docker daemon.

  '
install:
- docker:
    image: $IMAGE
    name: dockhand
    port: $PORT:3000
    volumes:
    - /var/run/docker.sock
    - /app/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: 'After deployment, access Dockhand at your domain. The application requires

    access to the Docker socket to manage containers. Make sure you have the

    necessary permissions to access the Docker daemon.

    '
