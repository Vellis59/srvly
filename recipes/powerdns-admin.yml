metadata:
  name: PowerDNS-Admin
  version: latest
  description: PowerDNS-Admin is a comprehensive web interface for PowerDNS with a
    plethora of advanced features. It offers forward and reverse zone management,
    zone templating, and user management with role-based access control. The app also
    provides zone-specific access control and activity logging. It supports various
    authentication methods including Local User, SAML, LDAP, and OAuth with Google,
    GitHub, Azure, and OpenID. It also supports two-factor authentication (TOTP).
    PowerDNS-Admin is equipped with PDNS Service Configuration & Statistics Monitoring
    and supports the DynDNS 2 protocol. It makes IPv6 PTR record editing easy and
    provides an API for zone and record management. The app also fully supports IDN/Punycode.
    PowerDNS-Admin can be run in several ways, with Docker being the quickest.
  category: dns-management
  tags:
  - DNS Management
  - Web Interface
  - User Management
  - API
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ngoduykhanh/powerdns-admin:latest
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Github
  url: https://github.com/PowerDNS-Admin/PowerDNS-Admin
- label: Documentation
  url: https://github.com/PowerDNS-Admin/PowerDNS-Admin/wiki
instructions: null
install:
- docker:
    image: $IMAGE
    name: powerdns-admin
    port: $PORT:80
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
