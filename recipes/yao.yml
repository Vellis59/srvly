metadata:
  name: YAO
  version: latest
  description: YAO is a powerful open-source app engine designed to create web services
    and applications in a matter of minutes. It is versatile and suitable for a variety
    of use-cases including AI, IoT, Industrial Internet, Connected Vehicles, DevOps,
    Energy, and Finance. With YAO, you can create a database model, write an interface,
    and describe the interface using JSON, making it a truly codeless programming
    experience. It supports running on ARM devices and can be used in IoT, edge computing,
    and industrial internet. YAO also offers easy-to-use Business Intelligence components
    and functions, empowering businesses with more possibilities. It has many built-in
    processes and supports data processing in any form through data flow. The app
    also features a plug-in mechanism based on GRPC for function expansion using Nodejs,
    Python, and other languages. YAO also provides a built-in query engine and offers
    enterprise-level security with permission classification, separation of administrator
    and employee accounts, and API level permission control.
  category: no-code
  tags:
  - No-Code
  - Developer Tools
  - Business Apps
  - IoT
  - Data Science
  - ERP
  - CRM
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: yaoapp/yao:0.10.4-rc.1
  port:
    type: integer
    title: Port HTTP
    default: 5099
links:
- label: Website
  url: https://yaoapps.com/
- label: Documentation
  url: https://yaoapps.com/en-US/doc/
- label: Github
  url: https://github.com/YaoApp/yao
instructions: Use xiang@iqka.com:A123456p+ to login at /xiang/login/admin . Use amd64
  instead of arm64 if you use a non ARM based system.
install:
- docker:
    image: $IMAGE
    name: yao
    port: $PORT:5099
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Use xiang@iqka.com:A123456p+ to login at /xiang/login/admin . Use amd64 instead
    of arm64 if you use a non ARM based system.
services:
  mysql:
    type: mysql
    version: latest
