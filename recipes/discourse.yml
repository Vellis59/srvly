metadata:
  name: Discourse
  version: latest
  description: Discourse is a modern, open-source discussion platform that provides
    a clean, intuitive interface for community discussions. It's perfect for forums,
    mailing lists, chat rooms, and more.
  category: forum
  tags:
  - Forum
  - Discussion
  - Self-hosted
  - Open Source
  - Community
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: bitnami/discourse:3.4.5
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Website
  url: https://www.discourse.org
- label: Documentation
  url: https://docs.discourse.org
- label: GitHub
  url: https://github.com/discourse/discourse
- label: Docker Hub
  url: https://hub.docker.com/r/bitnami/discourse
instructions: Once clicked, please wait for the installation to complete, it will
  take time. It is also resource intensive, so make sure you have more than 8GB of
  RAM.
install:
- docker:
    image: $IMAGE
    name: discourse
    port: $PORT:3000
    volumes:
    - /bitnami/discourse
    - /bitnami/discourse
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Once clicked, please wait for the installation to complete, it will take
    time. It is also resource intensive, so make sure you have more than 8GB of RAM.
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
