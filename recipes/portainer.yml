metadata:
  name: Portainer
  version: latest
  description: Portainer is a powerful container management platform trusted by over
    a million users worldwide. It simplifies the deployment, configuration, troubleshooting,
    and securing of containers on Kubernetes, Docker, and Swarm across any data center,
    cloud, network edge, or IIOT device. Portainer is designed to accelerate container
    adoption and reduce deployment times, making it easier for teams with little to
    no knowledge of Kubernetes to work autonomously. It also aids in managing and
    updating deployments, setting up, maintaining, and troubleshooting container infrastructure,
    and ensuring security and compliance. Portainer supports hybrid and multi-cloud,
    multi-cluster, multi-device container management, making it a versatile tool for
    managing complex container ecosystems.
  category: container-management
  tags:
  - Container Management
  - Deployment
  - Troubleshooting
  - Lifecycle Management
  - Platform Management
  - Security & Compliance
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: portainer/portainer-ce:2.41.0
  port:
    type: integer
    title: Port HTTP
    default: 9000
links:
- label: Website
  url: https://www.portainer.io/
- label: Documentation
  url: https://docs.portainer.io/
- label: Github
  url: https://github.com/portainer/portainer#readme
instructions: null
install:
- docker:
    image: $IMAGE
    name: portainer
    port: $PORT:9000
    volumes:
    - /var/run/docker.sock
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
