metadata:
  name: EmailEngine
  version: latest
  description: EmailEngine is a powerful email automation and integration tool designed
    to simplify email processing for applications. It provides a seamless interface
    for managing IMAP and SMTP connections, allowing applications to send, receive,
    and process emails efficiently. With built-in webhook support and extensive API
    capabilities, EmailEngine enables developers to automate email workflows and integrate
    email functionality effortlessly. Whether handling transactional emails or managing
    large-scale email operations, EmailEngine offers a reliable and feature-rich solution.
  category: email-automation
  tags:
  - Email Automation
  - Webhooks
  - API Integration
  - Open Source
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: postalsys/emailengine:v2.63.3
  port:
    type: integer
    title: Port HTTP
    default: 2525
links:
- label: Website
  url: https://emailengine.app
- label: Documentation
  url: https://api.emailengine.app/
- label: Github
  url: https://github.com/postalsys/emailengine
instructions: Set the SMTP password for email submissions on the server.
install:
- docker:
    image: $IMAGE
    name: emailengine
    port: $PORT:2525
    volumes: []
    extra_ports:
    - 3000:3000
    - 9993:9993
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Set the SMTP password for email submissions on the server.
services:
  redis:
    type: redis
    version: '7'
