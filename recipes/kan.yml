metadata:
  name: Kan
  version: latest
  description: Kan is a self-hosted Kanban app (Trello-style) built with Next.js,
    tRPC, Better Auth, and PostgreSQL. It supports boards, workspaces, labels, comments,
    Trello import, and optional email, Redis, S3, and OAuth. The published web container
    does not apply database migrations on startup; upstream expects a separate migrate
    image (Drizzle) to run before the web process, matching their Docker Compose stack.
  category: project-management
  tags:
  - Project Management
  - Kanban
  - Task Tracking
  - Self-hosted
  - Next.js
  - PostgreSQL
  - Team Collaboration
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/kanbn/kan:0.5.6
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Website
  url: https://kan.bn
- label: Documentation
  url: https://docs.kan.bn/
- label: GitHub
  url: https://github.com/kanbn/kan
- label: Container registry (GHCR)
  url: https://github.com/kanbn/kan/pkgs/container/kan
instructions: 'Deploy order matches upstream: Postgres → migrate (kan-migrate, runs

  `drizzle-kit migrate` once) → web. If the web app errors on first boot,

  wait for the migrate service to finish successfully, then restart the web service.

  Secrets: BETTER_AUTH_SECRET is generated for you; keep it stable across

  restarts. Auth: With defaults, use sign-up on the login page unless you set

  NEXT_PUBLIC_DISABLE_SIGN_UP in env (see docs). Optional: Redis, SMTP, S3, and

  OAuth env vars are documented upstream.

  '
install:
- docker:
    image: $IMAGE
    name: kan
    port: $PORT:3000
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: 'Deploy order matches upstream: Postgres → migrate (kan-migrate, runs

    `drizzle-kit migrate` once) → web. If the web app errors on first boot,

    wait for the migrate service to finish successfully, then restart the web service.

    Secrets: BETTER_AUTH_SECRET is generated for you; keep it stable across

    restarts. Auth: With defaults, use sign-up on the login page unless you set

    NEXT_PUBLIC_DISABLE_SIGN_UP in env (see docs). Optional: Redis, SMTP, S3, and

    OAuth env vars are documented upstream.

    '
services:
  postgres:
    type: postgres
    version: latest
