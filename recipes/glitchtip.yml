metadata:
  name: GlitchTip
  version: latest
  description: GlitchTip is a simple, open-source error tracking application designed
    to collect, organize, and alert you about every error from your project in real
    time. It allows you to monitor your software's performance, track errors, and
    check your site's uptime all in one place. GlitchTip is compatible with Sentry
    client SDKs, offering a more straightforward operation. It provides a comprehensive
    error tracking system, reporting your website or application's exceptions, log
    messages, Content Security Policy violations, and more. With GlitchTip, you can
    also monitor your application's performance, identifying slow web requests, database
    calls, and other transactions. Additionally, it offers uptime monitoring, pinging
    your site and alerting you when it's not responding. GlitchTip is the perfect
    choice for those who value simplicity, affordability, and the freedom provided
    by open source.
  category: monitoring
  tags:
  - Monitoring
  - Developer Tools
  - Logging
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: glitchtip/glitchtip:v6.0.3
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://glitchtip.com/
- label: Gitlab
  url: https://gitlab.com/glitchtip
- label: Docker
  url: https://hub.docker.com/r/glitchtip/glitchtip
- label: Documentation
  url: https://glitchtip.com/documentation
instructions: To create an admin user, run the command ./manage.py createsuperuser
install:
- docker:
    image: $IMAGE
    name: glitchtip
    port: $PORT:80
    volumes:
    - /code/uploads
    - /code/uploads
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: To create an admin user, run the command ./manage.py createsuperuser
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
