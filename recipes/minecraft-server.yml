metadata:
  name: Minecraft Server
  version: latest
  description: The itzg/minecraft-server app is designed to provide a seamless Minecraft
    Server experience. It automatically downloads the latest stable version of the
    Minecraft server at startup, ensuring you're always up-to-date with the game's
    latest features and improvements. The app also allows you to run or upgrade to
    any specific version or the latest snapshot, giving you full control over your
    gaming experience. If you're using Minecraft clients on consoles, mobile, or native
    Windows, the app offers a dedicated Bedrock Server for optimal performance. The
    standard server port, 25565, will be exposed on your host machine for easy access
    and gameplay.
  category: gaming
  tags:
  - Gaming
  - Developer Tools
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: itzg/minecraft-server:2025.12.1
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: Github
  url: https://github.com/itzg/docker-minecraft-server
- label: Docker
  url: https://hub.docker.com/r/itzg/minecraft-server
instructions: null
install:
- docker:
    image: $IMAGE
    name: minecraft-server
    port: $PORT:80
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
