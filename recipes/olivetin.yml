metadata:
  name: OliveTin
  version: latest
  description: OliveTin is a web interface for running Linux shell commands. It provides
    a simple, elegant dashboard that lets you execute predefined commands with a single
    click. Perfect for system administrators, home automation enthusiasts, or anyone
    who wants to simplify repetitive tasks without memorizing complex command-line
    syntax. OliveTin is lightweight, secure, and highly customizable, allowing you
    to create buttons for anything from system maintenance to home automation controls.
  category: system-administration
  tags:
  - System Administration
  - Web Interface
  - Command Execution
  - Automation
  - Linux
  - Dashboard
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: jamesread/olivetin:3000.11.3
  port:
    type: integer
    title: Port HTTP
    default: 1337
links:
- label: GitHub
  url: https://github.com/OliveTin/OliveTin
- label: Documentation
  url: https://docs.olivetin.app
- label: Docker Hub
  url: https://hub.docker.com/r/jamesread/olivetin
instructions: null
install:
- docker:
    image: $IMAGE
    name: olivetin
    port: $PORT:1337
    volumes:
    - /config
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
