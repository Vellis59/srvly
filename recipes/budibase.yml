metadata:
  name: Budibase
  version: latest
  description: Budibase is an open-source platform designed to simplify the creation
    of internal tools, saving teams hundreds of hours in the process. With Budibase,
    you can generate powerful internal tools and forms in just a few seconds, without
    any coding experience required. The platform allows you to connect to an external
    database, pull data from a Rest API, import a CSV, or start from scratch with
    Budibase's built-in database. You can design your tools using drag-and-drop components
    and automate workflows with just a few clicks. Budibase is trusted by over 75,000
    teams and is designed to speed up your business operations. Whether you need to
    collect data securely, automate tasks, or streamline operations, Budibase has
    you covered.
  category: no-code
  tags:
  - No-Code
  - Internal tools
  - Forms
  - Workflows
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: budibase/apps:3.37.1
  port:
    type: integer
    title: Port HTTP
    default: 9000
links:
- label: Website
  url: https://budibase.com/
- label: Documentation
  url: https://docs.budibase.com/docs
- label: Github
  url: https://github.com/Budibase/budibase
instructions: Budibase takes a few minutes to get ready. Sit back, relax, and have
  a cup of tea!
install:
- docker:
    image: $IMAGE
    name: budibase
    port: $PORT:9000
    volumes:
    - /opt/couchdb/data
    - /data
    extra_ports:
    - 9001:9001
    - 10000:10000
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Budibase takes a few minutes to get ready. Sit back, relax, and have a cup
    of tea!
services:
  redis:
    type: redis
    version: '7'
