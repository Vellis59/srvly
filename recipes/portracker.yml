metadata:
  name: Portracker
  version: latest
  description: Portracker is a self-hosted port tracking and monitoring application
    that provides real-time visibility into port usage across your infrastructure.
    It automatically discovers and tracks ports used by services running on your system,
    including Docker containers, and provides a comprehensive dashboard for port management
    and conflict detection. Perfect for DevOps teams and system administrators who
    need to maintain organized port assignments.
  category: port-tracking
  tags:
  - Port Tracking
  - Infrastructure Monitoring
  - Self-Hosted
  - Docker Integration
  - DevOps
  - System Administration
  - Port Management
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: mostafawahied/portracker:1.3.7
  port:
    type: integer
    title: Port HTTP
    default: 4999
links:
- label: Github
  url: https://github.com/mostafawahied/portracker
instructions: null
install:
- docker:
    image: $IMAGE
    name: portracker
    port: $PORT:4999
    volumes:
    - /data
    - /var/run/docker.sock
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
