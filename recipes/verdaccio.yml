metadata:
  name: Verdaccio
  version: latest
  description: Verdaccio is a lightweight, private npm proxy registry built in Node.js,
    designed to simplify and enhance your development workflow. It provides a simple,
    zero-configuration-required local private NPM registry, eliminating the need for
    a full database to get started. Verdaccio comes equipped with its own compact
    database and the capability to proxy other registries, such as npmjs.org, while
    caching the downloaded modules for improved efficiency. It allows you to use all
    the benefits of the npm package system in your company without exposing all your
    code to the public. You can link multiple registries, fetch packages from multiple
    sources in a single project, and even publish locally modified versions of third-party
    packages. Verdaccio is compatible with popular npm clients like npm, yarn, and
    pnpm, and supports various plugins for extended storage capabilities.
  category: developer-tools
  tags:
  - Developer Tools
  - Package Manager
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: verdaccio/verdaccio:6.5.2
  port:
    type: integer
    title: Port HTTP
    default: 4873
links:
- label: Website
  url: https://verdaccio.org/
- label: Documentation
  url: https://verdaccio.org/docs/what-is-verdaccio
- label: Github
  url: https://github.com/verdaccio/verdaccio
instructions: null
install:
- docker:
    image: $IMAGE
    name: verdaccio
    port: $PORT:4873
    volumes:
    - /opt/verdaccio
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
