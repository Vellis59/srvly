metadata:
  name: Weblate
  version: latest
  description: Weblate is a powerful, web-based continuous localization system. It
    is designed to simplify the process of translating text from one language to another,
    making it an invaluable tool for projects and companies operating in multiple
    countries. With Weblate, users can easily translate using the platform, download
    and upload translations, and even integrate with version control systems for seamless
    workflow. The app supports a wide range of file formats, and it also provides
    a REST API and Python API for further flexibility. Weblate also offers features
    like automatic suggestions, translation memory, and various checks and fixups
    to ensure high-quality translations. Whether you're starting with internationalization
    or managing an established translators community, Weblate has the features to
    support your translation needs.
  category: localization
  tags:
  - Localization
  - Translation
  - Web-based
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: weblate/weblate:5.16.0.0
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: Documentation
  url: https://docs.weblate.org/en/latest/index.html
- label: Github
  url: https://github.com/WeblateOrg/weblate
instructions: Please use the following credentials to login. changeme@easypanel.io|changeme
install:
- docker:
    image: $IMAGE
    name: weblate
    port: $PORT:8080
    volumes:
    - /app/data
    - /app/cache
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Please use the following credentials to login. changeme@easypanel.io|changeme
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
