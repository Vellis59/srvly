metadata:
  name: Metaflow
  version: latest
  description: Metaflow is an open-source framework for building and managing real-life
    ML, AI, and data science projects. Originally developed at Netflix and now supported
    by Outerbounds, Metaflow streamlines the entire development lifecycle—from rapid
    prototyping in notebooks to reliable production deployments. It unifies code,
    data, and compute at every stage, enabling teams to iterate quickly and deliver
    robust AI/ML systems. Used by Amazon, Doordash, Goldman Sachs, and many others.
  category: machine-learning
  tags:
  - Machine Learning
  - AI
  - Data Science
  - MLOps
  - Self-Hosted
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ''
  port:
    type: integer
    title: Port HTTP
    default: 8080
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://metaflow.org/
- label: Documentation
  url: https://docs.metaflow.org/
- label: GitHub
  url: https://github.com/Netflix/metaflow
- label: Metaflow Service
  url: https://github.com/Netflix/metaflow-service
instructions: Deploy Metaflow metadata service to track your flows. Configure your
  Metaflow client with METAFLOW_SERVICE_URL pointing to your deployment URL and METAFLOW_DEFAULT_METADATA=service.
  Run flows with `python myflow.py run` and metadata will be stored. Allow ~30 seconds
  for the metadata service to start.
install:
- docker:
    image: $IMAGE
    name: metaflow
    port: $PORT:8080
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Deploy Metaflow metadata service to track your flows. Configure your Metaflow
    client with METAFLOW_SERVICE_URL pointing to your deployment URL and METAFLOW_DEFAULT_METADATA=service.
    Run flows with `python myflow.py run` and metadata will be stored. Allow ~30 seconds
    for the metadata service to start.
services:
  postgres:
    type: postgres
    version: latest
