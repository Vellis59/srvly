metadata:
  name: Mailpit
  version: latest
  description: Mailpit is a modern email testing tool designed for developers. It
    allows you to configure your application to use Mailpit for SMTP delivery, enabling
    you to view your outgoing emails in a user-friendly web UI. The app also offers
    the option to forward messages to real SMTP servers for delivery. With Mailpit,
    you can view messages in the web UI or retrieve them using the JSON API. It supports
    SMTP AUTH and PIPELINING and provides real-time updates using WebSocket. Mailpit
    also includes message search functionality, custom SMTP configurations, and HTTP
    basic authentication for its UI and API. It's lightweight, portable, and easy
    to deploy.
  category: email
  tags:
  - Email
  - Email Testing
  - SMTP Testing Server
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: axllent/mailpit:v1.29.7
  port:
    type: integer
    title: Port HTTP
    default: 1025
  version:
    type: string
    title: Version
    default: latest
links:
- label: Github
  url: https://github.com/axllent/mailpit
instructions: null
install:
- docker:
    image: $IMAGE
    name: mailpit
    port: $PORT:1025
    volumes:
    - /data
    extra_ports:
    - 8025:8025
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
