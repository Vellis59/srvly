metadata:
  name: Folding@Home
  version: latest
  description: Folding@Home is a distributed computing project that simulates protein
    folding and other molecular dynamics to help researchers understand how proteins
    work and how they can malfunction. By donating your unused computing power, you
    become a citizen scientist contributing to research on diseases like COVID-19,
    Alzheimer's, cancer, and many others. The project uses your computer to run simulations
    that help scientists develop new treatments and understand biological processes.
  category: science
  tags:
  - Science
  - Research
  - Distributed Computing
  - Medical Research
  - Protein Folding
  - Citizen Science
  - Volunteer Computing
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: lscr.io/linuxserver/foldingathome:8.5.5
  port:
    type: integer
    title: Port HTTP
    default: 7396
links:
- label: Website
  url: https://foldingathome.org/
- label: Documentation
  url: https://foldingathome.org/start-folding/
instructions: null
install:
- docker:
    image: $IMAGE
    name: foldingathome
    port: $PORT:7396
    volumes:
    - /config
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
