metadata:
  name: MotorAdmin
  version: latest
  description: MotorAdmin is a modern, open-source database administration tool that
    provides a user-friendly interface for managing and interacting with your databases.
    It offers features for data visualization, query building, and database management.
  category: database
  tags:
  - Database
  - Administration
  - Data Management
  - Visualization
  - Query Builder
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: motoradmin/motoradmin:0.4.21
  port:
    type: integer
    title: Port HTTP
    default: 3000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://www.getmotoradmin.com
- label: Github
  url: https://github.com/motor-admin/motor-admin
- label: Documentation
  url: https://docs.getmotoradmin.com/guide/
instructions: null
install:
- docker:
    image: $IMAGE
    name: motoradmin
    port: $PORT:3000
    volumes:
    - /app
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
