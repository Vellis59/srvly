metadata:
  name: Lavalink
  version: latest
  description: Lavalink is a standalone audio sending node designed to facilitate
    the process of sending audio without it ever reaching any of your shards. It is
    powered by Lavaplayer and Koe, and is currently being used in production by several
    popular bots. The app offers a range of features including Twitch/YouTube stream
    support, an event system, seeking, volume control, and a REST API for resolving
    Lavaplayer tracks and controlling players. It also provides statistics which are
    useful for load balancing. Lavalink is designed to have a minimal CPU/memory footprint,
    and it supports plugins. It is compatible with Java 17 LTS or newer, and it follows
    Semantic Versioning.
  category: developer-tools
  tags:
  - Developer Tools
  - Media
  - Music
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: fredboat/lavalink:c7eb5d3-alpine
  port:
    type: integer
    title: Port HTTP
    default: 2333
links:
- label: Documentation
  url: https://github.com/freyacodes/Lavalink/blob/master/README.md
- label: Github
  url: https://github.com/freyacodes/Lavalink
instructions: null
install:
- docker:
    image: $IMAGE
    name: lavalink
    port: $PORT:2333
    volumes:
    - /opt/Lavalink
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
