metadata:
  name: Bolt.Diy
  version: latest
  description: Bolt.Diy is an AI-powered agent and community for web development,
    enabling you to create, edit, and deploy full-stack applications without any local
    setup. It's like having a coding genie at your fingertips, transforming your web
    ideas into reality with just a few prompts. Bolt.Diy streamlines the development
    process with intelligent suggestions, automated workflows, and seamless deployment,
    making it the ultimate tool for modern web developers. The app is fully containerized
    and designed for accessibility across various platforms.
  category: ai
  tags:
  - AI
  - Web Development
  - Collaboration
  - Full-Stack
  - Deployment
  - Open Source
  - Community
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ''
  port:
    type: integer
    title: Port HTTP
    default: 5173
links:
- label: Github
  url: https://github.com/stackblitz-labs/bolt.diy
instructions: null
install:
- docker:
    image: $IMAGE
    name: boltdiy
    port: $PORT:5173
    volumes:
    - /app
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
