metadata:
  name: YakGPT
  version: latest
  description: YakGPT is a simple, locally running ChatGPT UI that makes your text
    generation faster and chatting even more engaging! This hands-free interface provides
    direct access to OpenAI's GPT models with advanced voice capabilities, including
    Speech-to-Text via Azure & OpenAI Whisper and Text-to-Speech via Azure & Eleven
    Labs. Run locally in your browser with no need to install applications, featuring
    faster performance than the official ChatGPT UI by connecting directly to the
    API. Perfect for users who want privacy, speed, and voice interaction with their
    AI assistant.
  category: ai-chat
  tags:
  - AI Chat
  - ChatGPT
  - OpenAI
  - Voice Interface
  - Speech-to-Text
  - Text-to-Speech
  - GPT-4
  - GPT-3.5
  - Hands-Free
  - Privacy-Focused
  - Local Storage
  - Next.js
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: yakgpt/yakgpt:latest
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: GitHub Repository
  url: https://github.com/yakGPT/yakGPT
- label: Live Demo
  url: https://yakgpt.vercel.app
instructions: null
install:
- docker:
    image: $IMAGE
    name: yakgpt
    port: $PORT:3000
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
