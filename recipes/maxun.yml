metadata:
  name: Maxun
  version: latest
  description: Maxun is a self-hosted data automation platform that combines a modern
    frontend with a backend capable of browser automation (Playwright), file storage
    via MinIO, and PostgreSQL persistence. It lets you run data collection and integration
    workflows with headless Chromium, store assets in S3-compatible storage, and manage
    everything from a web interface. Ideal for teams who need a self-hosted automation
    stack with database, object storage, and browser automation included.
  category: automation
  tags:
  - Automation
  - Playwright
  - PostgreSQL
  - MinIO
  - Self-Hosted
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ''
  port:
    type: integer
    title: Port HTTP
    default: 5173
  version:
    type: string
    title: Version
    default: latest
links:
- label: GitHub
  url: https://github.com/getmaxun
- label: Website
  url: https://www.maxun.dev/?ref=ghread
- label: Documentation
  url: https://docs.maxun.dev/?ref=ghread
instructions: null
install:
- docker:
    image: $IMAGE
    name: maxun
    port: $PORT:5173
    volumes:
    - /data
    - /var/lib/maxun
    - /ms-playwright
    - /app/vite.config.js
    extra_ports:
    - 8080:8080
    - 9000:9000
    - 9001:9001
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
