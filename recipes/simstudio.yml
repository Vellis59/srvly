metadata:
  name: SimStudio AI
  version: latest
  description: SimStudio AI is an advanced AI simulation platform that combines cutting-edge
    artificial intelligence with intuitive design tools. It provides a comprehensive
    environment for creating, running, and analyzing AI-powered simulations with support
    for various AI models and integrations. The platform features authentication,
    email notifications, and extensible AI provider support including local models
    via Ollama.
  category: ai
  tags:
  - AI
  - Simulation
  - Machine Learning
  - PostgreSQL
  - Vector Database
  - OAuth
  - Next.js
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/simstudioai/simstudio:v0.6.66
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Website
  url: https://simstudio.ai
- label: GitHub
  url: https://github.com/simstudioai/sim
- label: Documentation
  url: https://docs.simstudio.ai/introduction
instructions: Please provide the OAuth credentials for Google or GitHub or both.
install:
- docker:
    image: $IMAGE
    name: simstudio
    port: $PORT:3000
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Please provide the OAuth credentials for Google or GitHub or both.
services:
  postgres:
    type: postgres
    version: latest
