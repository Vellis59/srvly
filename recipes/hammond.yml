metadata:
  name: Hammond
  version: latest
  description: Hammond is a self-hosted vehicle management system designed to track
    fuel and other expenses related to your vehicles. It supports multiple users sharing
    multiple vehicles, making it an ideal solution for families, businesses, or any
    group with shared vehicles. With Hammond, you can manage multiple vehicles, track
    fuel and other expenses, and even save attachments against vehicles. The app also
    features quick entries, allowing you to take a photo of a receipt or pump screen
    for later entry. It provides vehicle-level and overall reporting, helping you
    keep a close eye on your vehicle expenses. Furthermore, Hammond allows you to
    import data from Clarkson or Fuelly, making the transition to this system seamless
    and straightforward.
  category: finance
  tags:
  - Finance
  - Productivity
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: akhilrex/hammond:1.0.0
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Documentation
  url: https://github.com/akhilrex/hammond/tree/master/docs
- label: Github
  url: https://github.com/akhilrex/hammond
instructions: null
install:
- docker:
    image: $IMAGE
    name: hammond
    port: $PORT:3000
    volumes:
    - /assets
    - /config
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
