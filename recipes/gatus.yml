metadata:
  name: Gatus
  version: latest
  description: Gatus is a self-hosted automated service health dashboard that monitors
    the uptime and performance of your services, APIs, and websites. The application
    provides a clean, modern web interface to visualize the health status of all your
    monitored endpoints in real-time. Gatus performs periodic health checks on configured
    endpoints, evaluating custom conditions like HTTP status codes, response body
    content, response times, and more. The dashboard displays detailed metrics including
    uptime percentages, average response times, and historical status data. With support
    for various alerting integrations including Discord, Slack, PagerDuty, and custom
    webhooks, Gatus can notify you immediately when services go down or fail health
    checks. The application supports complex condition evaluation using JSON path
    queries, pattern matching, and response time thresholds. Perfect for DevOps teams
    monitoring microservices infrastructure, system administrators tracking critical
    services, developers needing uptime monitoring for their applications, or anyone
    who wants a simple, self-hosted alternative to commercial monitoring services
    with complete control over their health checks and data.
  category: monitoring
  tags:
  - Monitoring
  - Health Check
  - Uptime
  - Dashboard
  - Self-Hosted
  - DevOps
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: twinproduction/gatus:v5.35.0
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: GitHub
  url: https://github.com/TwiN/gatus
- label: Docker Hub
  url: https://hub.docker.com/r/twinproduction/gatus
instructions: you can modify the config from the config.yaml file in the storage section.
install:
- docker:
    image: $IMAGE
    name: gatus
    port: $PORT:8080
    volumes:
    - /config/config.yaml
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: you can modify the config from the config.yaml file in the storage section.
