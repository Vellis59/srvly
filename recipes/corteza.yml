metadata:
  name: Corteza
  version: latest
  description: Corteza is a powerful, open-source low-code platform designed to streamline
    the process of app development, business process integration, and data harmonization.
    Built with a backend in Golang and a front end in Vue.js, Corteza allows you to
    easily build native web apps and expand your software ecosystem with complete
    control and flexibility. You can connect with any record data source, control
    everything you build, transform your data into a standardized JSON format, and
    build unlimited web applications and process workflows using block-based tools
    and Javascript automations. Corteza is cloud-native and deploys via Docker containers,
    providing a seamless and efficient app development experience. It is 100% free
    and open-source, ensuring that it will always be accessible to all.
  category: low-code-platform
  tags:
  - Low-Code Platform
  - App Development
  - Business Process
  - Integration
  - Data Harmonization
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: cortezaproject/corteza:2024.9.8
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://cortezaproject.org
- label: Documentation
  url: https://docs.cortezaproject.org
- label: Github
  url: https://github.com/cortezaproject/corteza
instructions: Create an account to login. The first account created will have administrator
  priviledges. Go to /admin for the admijnistration interface
install:
- docker:
    image: $IMAGE
    name: corteza
    port: $PORT:80
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Create an account to login. The first account created will have administrator
    priviledges. Go to /admin for the admijnistration interface
services:
  postgres:
    type: postgres
    version: latest
