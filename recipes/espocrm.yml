metadata:
  name: EspoCRM
  version: latest
  description: EspoCRM is a powerful web application designed to streamline your company's
    relationships. This versatile tool allows you to manage and evaluate all types
    of relationships, including people, companies, projects, and opportunities, all
    within an easy-to-use and intuitive interface. EspoCRM is trusted by over 50,000
    companies across 163 countries, and has been enhancing business operations for
    9 years. It is widely used across various sectors such as wholesale and retail
    trade, e-commerce, banking, call-centers, manufacturing, education, travel & tourism,
    real estate, healthcare, and insurance. EspoCRM is designed to skyrocket your
    sales, transform your marketing strategy, and deliver an exceptional customer
    experience. It is a free self-hosted and cloud CRM software that can be used simultaneously
    by many people. Increase your company’s profitability and build customer loyalty
    with EspoCRM, your open source sales tool.
  category: crm
  tags:
  - CRM
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: espocrm/espocrm:9.3.4
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://espocrm.com
- label: Demo
  url: https://demo.espocrm.com
- label: Documentation
  url: https://docs.espocrm.com
- label: Github
  url: https://github.com/espocrm
instructions: null
install:
- docker:
    image: $IMAGE
    name: espocrm
    port: $PORT:80
    volumes:
    - /var/www/html
    - /var/www/html
    - /var/www/html
    extra_ports:
    - 8080:8080
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
