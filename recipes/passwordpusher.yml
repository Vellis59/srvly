metadata:
  name: Password Pusher
  version: latest
  description: Password Pusher is an open-source, self-hosted application designed
    to securely share passwords and sensitive information via unique, time-sensitive
    URLs. It eliminates the need to send sensitive credentials through insecure channels
    like email or messaging apps. The app is lightweight, easy to deploy, and prioritizes
    user privacy and security. Password Pusher allows for fine-grained control over
    link expiration, including the number of views or days before a link expires.
    It ensures that shared passwords are destroyed after expiration, adding an extra
    layer of security. The app can be deployed on various platforms such as Docker
    or Kubernetes, making it highly flexible and accessible for individuals and organizations
    alike.
  category: security
  tags:
  - Security
  - Password Sharing
  - Privacy
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: pglombardo/pwpush:1.68
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://pwpush.com
- label: Documentation
  url: https://github.com/pglombardo/PasswordPusher/wiki
- label: Github
  url: https://github.com/pglombardo/PasswordPusher
instructions: null
install:
- docker:
    image: $IMAGE
    name: passwordpusher
    port: $PORT:80
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
