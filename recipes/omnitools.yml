metadata:
  name: Omni Tools
  version: latest
  description: Omni Tools is a comprehensive collection of web-based utilities and
    tools designed to simplify everyday tasks for developers, designers, and general
    users. It provides a unified interface for accessing dozens of useful tools including
    text converters, encoders/decoders, formatters, generators, calculators, image
    processors, and more. With no need for installation or external dependencies,
    Omni Tools offers instant access to commonly needed utilities without leaving
    your browser. The self-hosted solution ensures your data remains private and never
    leaves your infrastructure, making it ideal for handling sensitive information.
    All tools run entirely in the web interface with a clean, intuitive design that
    makes finding and using utilities effortless. Perfect for development teams, content
    creators, system administrators, and anyone who regularly needs quick access to
    conversion, formatting, encoding, or calculation tools without relying on multiple
    online services or installing separate applications.
  category: utilities
  tags:
  - Utilities
  - Developer Tools
  - Converters
  - Productivity
  - Tools
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: iib0011/omni-tools:0.6.0
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://omnitools.app
- label: GitHub
  url: https://github.com/iib0011/omni-tools
- label: Documentation
  url: https://github.com/iib0011/omni-tools#readme
- label: Releases
  url: https://github.com/iib0011/omni-tools/releases
- label: Docker Hub
  url: https://hub.docker.com/r/iib0011/omni-tools
instructions: null
install:
- docker:
    image: $IMAGE
    name: omnitools
    port: $PORT:80
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
