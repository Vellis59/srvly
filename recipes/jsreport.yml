metadata:
  name: JSReport
  version: latest
  description: JSReport is an open-source reporting platform designed for developers
    to generate, manage, and customize reports using JavaScript. It provides a powerful
    templating engine, flexible rendering, and a web-based studio for designing reports.
    JSReport supports multiple output formats, including PDF, Excel, HTML, and more,
    making it ideal for businesses and applications that require automated document
    generation. It can be self-hosted and integrated with various databases and applications
    for seamless reporting.
  category: reporting
  tags:
  - Reporting
  - PDF Generation
  - Data Visualization
  - Business Intelligence
  - Self-Hosting
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: jsreport/jsreport:4.13.0
  port:
    type: integer
    title: Port HTTP
    default: 5488
links:
- label: Website
  url: https://jsreport.net/
- label: Documentation
  url: https://jsreport.net/learn
instructions: null
install:
- docker:
    image: $IMAGE
    name: jsreport
    port: $PORT:5488
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
