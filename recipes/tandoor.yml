metadata:
  name: Tandoor
  version: latest
  description: Tandoor is an online recipe management app designed to help you manage
    and grow your recipe collection. It allows you to drop your collection of links
    and notes, and provides a platform for recipe management, storage, sharing, and
    collaborative cooking. Tandoor is equipped with a powerful fuzzy search engine
    that helps you find your recipes faster. You can search for keywords, ingredients
    and more. The app also allows you to import your favorite recipes from thousands
    of websites online, and if you already have a digital recipe collection, you can
    import your data from many other managers. Tandoor also provides the functionality
    to create shopping lists for your recipes, making meal planning and shopping a
    breeze. It's the perfect tool for cooking enthusiasts looking to digitize and
    share their cookbooks and recipes.
  category: recipe-management
  tags:
  - Recipe Management
  - Cooking
  - Meal Planning
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: vabene1111/recipes:1.5.35
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: Website
  url: https://tandoor.dev
- label: Documentation
  url: https://docs.tandoor.dev
- label: Github
  url: https://github.com/TandoorRecipes/recipes
instructions: null
install:
- docker:
    image: $IMAGE
    name: tandoor
    port: $PORT:8080
    volumes:
    - /opt/recipes/mediafiles
    - /opt/recipes/staticfiles
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
