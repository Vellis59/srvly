metadata:
  name: DumbKan
  version: latest
  description: DumbKan is a simple, self-hosted Kanban board application for project
    management and task organization. It provides a clean interface for creating boards,
    managing tasks, and collaborating on projects. Perfect for teams and individuals
    who need a lightweight project management solution.
  category: kanban
  tags:
  - Kanban
  - Project Management
  - Task Management
  - Collaboration
  - Web Interface
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: dumbwareio/dumbkan:nightly-20250303-051955
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Website
  url: https://www.dumbware.io/DumbKan
- label: Documentation
  url: https://github.com/dumbwareio/dumbkan#readme
- label: GitHub
  url: https://github.com/dumbwareio/dumbkan
instructions: null
install:
- docker:
    image: $IMAGE
    name: dumbkan
    port: $PORT:3000
    volumes:
    - /app/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
