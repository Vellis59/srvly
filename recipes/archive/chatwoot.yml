metadata:
  name: Chatwoot
  version: latest
  description: Chatwoot is a new age multi-channel customer experience platform designed
    for businesses of all sizes. It serves as an open-source customer engagement suite,
    providing an alternative to platforms like Intercom, Zendesk, and Salesforce Service
    Cloud. With Chatwoot, you can manage your agents' workload, track their performance
    through auto-updating reports, and work smarter with automations. The app allows
    you to perform key actions on multiple conversations at once and provides super
    quick responses to customer conversations, making your agents super productive.
    It also offers features to manage your email, Facebook, Instagram, Line, SMS,
    Telegram, and Twitter customer interactions directly from the platform. Additionally,
    Chatwoot provides detailed insights into your conversations and allows you to
    measure and track your CSAT score on autopilot.
  category: chat
  tags:
  - Chat
  - Customer Support
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: chatwoot/chatwoot:v4.13.0
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Documentation
  url: https://www.chatwoot.com/help-center
- label: Github
  url: https://github.com/chatwoot/
instructions: null
install:
- docker:
    image: $IMAGE
    name: chatwoot
    port: $PORT:3000
    volumes:
    - /data/storage
    - /app/storage
    - /app/storage
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
