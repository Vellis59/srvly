metadata:
  name: Shiori
  version: latest
  description: Shiori is a straightforward bookmarks manager, designed as a simple
    alternative to Pocket. It is written in the Go language and can be used as either
    a command line application or a web application. Shiori allows for basic bookmark
    management, including adding, editing, deleting, and searching bookmarks. It also
    supports importing and exporting bookmarks from and to Netscape Bookmark file
    and importing bookmarks from Pocket. The application features a clean command
    line interface and a user-friendly web interface. It is portable and supports
    sqlite3, PostgreSQL, and MySQL as its database. Shiori also creates an offline
    archive of the webpage where possible. The Shiori Web Extension is a simple extension
    for managing bookmarks using Shiori, intended to integrate Shiori with your favorite
    web browser, allowing you to save and remove bookmarks in Shiori without leaving
    your current page.
  category: bookmarks
  tags:
  - Bookmarks
  - Productivity
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/go-shiori/shiori:v1.8.0
  port:
    type: integer
    title: Port HTTP
    default: 8080
  version:
    type: string
    title: Version
    default: latest
links:
- label: Github
  url: https://github.com/go-shiori/shiori
- label: Web Extension
  url: https://github.com/go-shiori/shiori-web-ext
instructions: The default account is "shiori" with password "gopher". It is removed
  once another "owner" account is created.
install:
- docker:
    image: $IMAGE
    name: shiori
    port: $PORT:8080
    volumes:
    - /src/shiori
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: The default account is "shiori" with password "gopher". It is removed once
    another "owner" account is created.
services:
  postgres:
    type: postgres
    version: latest
