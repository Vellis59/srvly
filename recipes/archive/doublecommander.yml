metadata:
  name: Double Commander
  version: latest
  description: A cross-platform open-source file manager with two panels side by side.
    It is inspired by Total Commander and features a modern interface with extensive
    file management capabilities.
  category: file-manager
  tags:
  - File Manager
  - FTP Client
  - Self-hosted
  - Open Source
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: lscr.io/linuxserver/doublecommander:version-9bcf3fdc
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: GitHub
  url: https://github.com/doublecmd/doublecmd
- label: Docker Hub
  url: https://hub.docker.com/r/linuxserver/doublecommander
- label: Website
  url: https://doublecmd.sourceforge.io
instructions: null
install:
- docker:
    image: $IMAGE
    name: doublecommander
    port: $PORT:3000
    volumes:
    - /config
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
