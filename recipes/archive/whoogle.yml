metadata:
  name: Whoogle
  version: latest
  description: Whoogle is an open-source, privacy-focused search engine that serves
    as a proxy for Google Search. It allows users to access Google’s powerful search
    capabilities without being tracked, monitored, or bombarded with ads. Whoogle
    removes trackers, logs, and ads, ensuring that search queries and browsing activities
    remain private and anonymous. Users benefit from Google's accurate and comprehensive
    search results, while maintaining full control over their personal data. Its lightweight
    design makes it easy to deploy and use, often preferred by those seeking to balance
    search efficiency with enhanced privacy.
  category: search
  tags:
  - Search
  - Privacy
  - Open-Source
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: benbusby/whoogle-search:0.9.3
  port:
    type: integer
    title: Port HTTP
    default: 5000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Github
  url: https://github.com/benbusby/whoogle-search
instructions: null
install:
- docker:
    image: $IMAGE
    name: whoogle
    port: $PORT:5000
    volumes:
    - /config
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
