metadata:
  name: Grimmory
  version: latest
  description: Grimmory is a self-hosted digital library for serious readers. It lets you organize, read, and manage books across multiple formats including EPUB, MOBI, AZW3, PDF, CBZ, and audiobook formats.
  category: media
  tags:
  - Books
  - Reading
  - Media
  - Self-Hosted
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image
    default: ghcr.io/grimmory/grimmory:latest
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: GitHub
  url: https://github.com/grimmory/grimmory
install:
- docker:
    image: $IMAGE
    name: grimmory
    port: $PORT:8080
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
