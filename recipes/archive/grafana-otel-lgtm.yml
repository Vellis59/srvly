metadata:
  name: Grafana OTEL LGTM
  version: latest
  description: Grafana OTEL LGTM is an all-in-one OpenTelemetry backend bundled into
    a single Docker image. It includes the OpenTelemetry Collector, Prometheus for
    metrics, Grafana Loki for logs, Grafana Tempo for traces, Grafana Pyroscope for
    application profiles, and Grafana for unified visualization. The collector automatically
    routes telemetry signals to the correct backend — metrics to Prometheus, logs
    to Loki, traces to Tempo, and profiles to Pyroscope. It works out of the box with
    OpenTelemetry's default settings, so applications instrumented with any OpenTelemetry
    SDK can send data immediately. Optional eBPF auto-instrumentation (OBI) can generate
    traces and RED metrics for HTTP/gRPC services with zero code changes.
  category: observability
  tags:
  - Observability
  - OpenTelemetry
  - Grafana
  - Prometheus
  - Monitoring
  - Logging
  - Tracing
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: grafana/otel-lgtm:0.27.0
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Website
  url: https://grafana.com/
- label: GitHub
  url: https://github.com/grafana/docker-otel-lgtm
- label: Documentation
  url: https://grafana.com/docs/opentelemetry/docker-lgtm
- label: Docker Hub
  url: https://hub.docker.com/r/grafana/otel-lgtm
instructions: "After deployment, access the Grafana dashboard via the service domain.\
  \ \nLog in with the default credentials: username \"admin\", password\n\"admin\"\
  . All data sources (Prometheus, Loki, Tempo, Pyroscope) are\npre-configured. Point\
  \ your OpenTelemetry-instrumented applications to the\nOTLP endpoints — port 4317\
  \ for gRPC and port 4318 for HTTP. No additional\nconfiguration is needed; the image\
  \ works with OpenTelemetry defaults.\n"
install:
- docker:
    image: $IMAGE
    name: grafana-otel-lgtm
    port: $PORT:3000
    volumes:
    - /data
    extra_ports:
    - 4317:4317
    - 4318:4318
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: "After deployment, access the Grafana dashboard via the service domain. \n\
    Log in with the default credentials: username \"admin\", password\n\"admin\".\
    \ All data sources (Prometheus, Loki, Tempo, Pyroscope) are\npre-configured. Point\
    \ your OpenTelemetry-instrumented applications to the\nOTLP endpoints — port 4317\
    \ for gRPC and port 4318 for HTTP. No additional\nconfiguration is needed; the\
    \ image works with OpenTelemetry defaults.\n"
