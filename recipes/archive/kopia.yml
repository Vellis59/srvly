metadata:
  name: Kopia
  version: latest
  description: Kopia is a robust open-source backup and restore tool designed to provide
    fast and secure backups of your important data. It allows you to create encrypted
    snapshots of your files and directories, which can be stored on the cloud storage
    of your choice, network-attached storage, server, or locally on your machine.
    Kopia supports a wide range of storage locations including Amazon S3, Azure Blob
    Storage, Backblaze B2, Google Cloud Storage, and many more. It also supports both
    CLI and GUI versions, making it accessible for both advanced and regular users.
    Kopia's unique features include compression, deduplication, end-to-end 'zero knowledge'
    encryption, and error correction, ensuring your data is safe, secure, and easily
    retrievable.
  category: backup
  tags:
  - Backup
  - Data Management
  - Security
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: kopia/kopia:20260502.0.42513
  port:
    type: integer
    title: Port HTTP
    default: 51515
links:
- label: Website
  url: https://kopia.io/
- label: Docs
  url: https://kopia.io/docs/
- label: Github
  url: https://github.com/kopia/kopia/
instructions: null
install:
- docker:
    image: $IMAGE
    name: kopia
    port: $PORT:51515
    volumes:
    - /app/config
    - /app/cache
    - /app/logs
    - /data
    - /repository
    - /tmp
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
