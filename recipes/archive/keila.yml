metadata:
  name: Keila
  version: latest
  description: Keila is a reliable and easy-to-use email newsletter tool that helps
    you grow your contact lists and send data-driven campaigns effortlessly. With
    Keila, you can import your existing contacts simply by uploading a CSV file. The
    app offers complete freedom to add custom data and tags to your contacts, which
    can be used to filter contacts and as merge fields in campaigns. Keila also features
    powerful segmentation, allowing you to create smart subsets of your contact lists.
    The app respects the privacy of your contacts and ensures that your data remains
    yours. Keila provides live statistics for your newsletters, including open and
    click rates, and allows you to integrate your email newsletter with other applications
    using its powerful API. Keila is proudly Open Source, made in Germany, and hosted
    in the EU, ensuring strict European privacy standards.
  category: email
  tags:
  - Email
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: pentacent/keila:0.20
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://keila.io
- label: Documentation
  url: https://keila.io/docs
- label: Github
  url: https://github.com/pentacent/keila
instructions: Login with changeme@easypanel.io:password123 - change this from the
  administraton panel
install:
- docker:
    image: $IMAGE
    name: keila
    port: $PORT:80
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Login with changeme@easypanel.io:password123 - change this from the administraton
    panel
services:
  postgres:
    type: postgres
    version: latest
