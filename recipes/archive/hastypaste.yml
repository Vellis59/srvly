metadata:
  name: Hasty Paste
  version: latest
  description: Hasty Paste is a fast and minimalistic app designed for quickly pasting
    and sharing text. It is primarily used for sharing debug logs and similar content
    to aid developers in providing tech support. The app is publicly accessible with
    no authentication required. It generates random IDs for each paste, with an optional
    'long' ID to reduce the chances of brute force attacks. Users can also add expiring
    pastes. The app features a dark theme and optional syntax highlighting. It is
    designed to use minimal resources and does not require JavaScript. Hasty Paste
    also allows users to choose their file system and offers a custom flat-file system.
    The app is named 'Hasty Paste' to reflect its speed and ease of use.
  category: documents
  tags:
  - Documents
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/enchant97/hasty-paste:2.3.1
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Documentation
  url: https://enchantedcode.co.uk/hasty-paste/
- label: Github
  url: https://github.com/enchant97/hasty-paste
instructions: Hasty Paste takes a minute or two on first launch.
install:
- docker:
    image: $IMAGE
    name: hastypaste
    port: $PORT:80
    volumes:
    - /app/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Hasty Paste takes a minute or two on first launch.
services:
  redis:
    type: redis
    version: '7'
