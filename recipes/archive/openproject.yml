metadata:
  name: OpenProject
  version: latest
  description: OpenProject is an open-source project management software designed
    to facilitate efficient project management in a secure environment. It caters
    to various project management styles including classic, agile, or hybrid. The
    software allows you to take control of your data with the highest standards in
    data security and privacy. OpenProject can be installed on-premises in your own
    infrastructure, ensuring full control and 100% data ownership. It offers a variety
    of security features such as https encryption of your data, password security,
    two-factor authentication, and more. OpenProject supports agile project management
    and methodologies such as Scrum and Kanban, allowing teams to deliver better and
    faster. It also features a team planner to visually assign tasks to team members,
    helping to plan activities and gain perspective on the team's workload. OpenProject
    is also a powerful tool for project planning and scheduling, enabling teams to
    collaboratively create and visualize project plans, analyze required activities,
    and create a detailed plan for project deliverables.
  category: project-management
  tags:
  - Project Management
  - Open Source
  - Data Security
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: openproject/community:13.4.1
  port:
    type: integer
    title: Port HTTP
    default: 3000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://openproject.org/
- label: Docs
  url: https://openproject.org/docs/
- label: Github
  url: https://github.com/opf/openproject
- label: Docker
  url: https://hub.docker.com/r/openproject/community
instructions: The default login credentials are admin:admin
install:
- docker:
    image: $IMAGE
    name: openproject
    port: $PORT:3000
    volumes:
    - /var/openproject/assets
    - /var/openproject/pgdata
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: The default login credentials are admin:admin
