metadata:
  name: Lago
  version: latest
  description: Lago is an open-source metered billing and usage-based pricing platform
    that helps businesses implement complex pricing models with precision and transparency.
    Built for modern SaaS companies, Lago provides real-time usage tracking, flexible
    pricing configurations, automated invoicing, and comprehensive billing analytics.
    Perfect for businesses that need to implement usage-based pricing, hybrid pricing
    models, or complex billing scenarios with features like prepaid credits, graduated
    pricing, and multi-dimensional metering.
  category: billing
  tags:
  - Billing
  - Metered Billing
  - Usage-Based Pricing
  - SaaS
  - Invoicing
  - Payment Processing
  - Analytics
  - API
  - Open Source
  - Revenue Management
  - Subscription Management
  - Financial Technology
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: getlago/api:v1.31.0
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Github
  url: https://github.com/getlago/lago
- label: Website
  url: https://getlago.com
- label: Documentation
  url: https://docs.getlago.com
instructions: You have to generate a RSA private key "openssl genrsa 2048 | base64"
  and provide it to the service, otherwise the service will not work. You can contact
  Easypanel support if you need help.
install:
- docker:
    image: $IMAGE
    name: lago
    port: $PORT:80
    volumes:
    - /app/storage
    - /app/storage
    extra_ports:
    - 3000:3000
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: You have to generate a RSA private key "openssl genrsa 2048 | base64" and
    provide it to the service, otherwise the service will not work. You can contact
    Easypanel support if you need help.
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
