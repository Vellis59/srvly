metadata:
  name: Faraday
  version: latest
  description: Faraday is a powerful open-source vulnerability management platform
    designed to streamline security assessments and pentesting workflows. It provides
    centralized visibility, real-time collaboration, and automation capabilities to
    help security teams manage vulnerabilities efficiently. Faraday supports integration
    with multiple security tools, offering a unified interface to collect, analyze,
    and report findings. With its scalable architecture and robust API, Faraday enables
    teams to enhance their security operations while maintaining compliance and improving
    response times.
  category: vulnerability-management
  tags:
  - Vulnerability Management
  - Pentesting
  - Security Operations
  - Open Source
  - Cybersecurity
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: faradaysec/faraday:5.20.0
  port:
    type: integer
    title: Port HTTP
    default: 5985
links:
- label: Website
  url: https://www.faradaysec.com/
- label: Documentation
  url: https://docs.faradaysec.com/
- label: Github
  url: https://github.com/infobyte/faraday
instructions: Username is faraday; check for the password in the Overview Console
  logs.
install:
- docker:
    image: $IMAGE
    name: faraday
    port: $PORT:5985
    volumes:
    - /home/faraday/.faraday
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Username is faraday; check for the password in the Overview Console logs.
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
