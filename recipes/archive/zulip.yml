metadata:
  name: Zulip
  version: latest
  description: Zulip is a powerful team collaboration platform that combines the immediacy of chat with the organization of email. It features topic-based threading for efficient team communication.
  category: messaging
  tags:
  - Chat
  - Collaboration
  - Messaging
  - Team
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image
    default: zulip/docker-zulip:latest
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: Website
  url: https://zulip.com/
- label: GitHub
  url: https://github.com/zulip/zulip
install:
- docker:
    image: $IMAGE
    name: zulip
    port: $PORT:8080
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
