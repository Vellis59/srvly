metadata:
  name: MailCrab
  version: latest
  description: MailCrab is an email test server designed for development purposes.
    It is an accept-all SMTP server that provides a web interface for viewing and
    inspecting all incoming emails. You can view formatted mail, download attachments,
    view headers, or view the complete raw mail contents. The app runs on all amd64
    and arm64 platforms using docker. The backend server and the frontend of the app
    are both written in Rust. The backend receives email over an unencrypted connection
    on a configurable port, and all email is stored in memory while the application
    is running. The frontend initially performs a call to receive all existing email
    metadata and then subscribes for new messages using the websocket connection.
    When opening a message, the endpoint is used to retrieve the complete message
    body and raw email. The backend also accepts a few commands over the websocket,
    to mark a message as opened, to delete a single message or delete all messages.
  category: email
  tags:
  - Email
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: marlonb/mailcrab:v1.6.5
  port:
    type: integer
    title: Port HTTP
    default: 1025
  version:
    type: string
    title: Version
    default: latest
links:
- label: Github
  url: https://github.com/tweedegolf/mailcrab
instructions: null
install:
- docker:
    image: $IMAGE
    name: mailcrab
    port: $PORT:1025
    volumes: []
    extra_ports:
    - 1080:1080
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
