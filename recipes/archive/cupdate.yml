metadata:
  name: Cupdate
  version: latest
  description: Cupdate is a self-hosted web application for monitoring and managing
    Docker container updates. It provides a centralized dashboard to track available
    updates for your running containers, view container versions, and manage update
    notifications. By connecting to the Docker daemon via the Docker socket, Cupdate
    scans all running containers and checks for newer image versions available in
    container registries. The web interface displays an overview of your container
    infrastructure with update status, image tags, registry information, and visual
    indicators for outdated containers. Cupdate features automatic update checking
    on a configurable schedule, support for multiple container registries, detailed
    container information with links to documentation and registries, and the ability
    to manage container logos and metadata. With its lightweight architecture and
    persistent storage using BoltDB and SQLite, Cupdate offers an efficient solution
    for staying informed about container updates without requiring complex automation
    or CI/CD pipelines. Perfect for home lab administrators managing multiple Docker
    containers, DevOps teams maintaining staging environments, system administrators
    tracking container versions across servers, or anyone who wants visibility into
    their Docker infrastructure's update status without manually checking each container.
  category: docker
  tags:
  - Docker
  - Container Management
  - Update Monitoring
  - System Administration
  - DevOps
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/alexgustafsson/cupdate:0.24.5
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: Website
  url: https://alexgustafsson.github.io/cupdate
- label: GitHub
  url: https://github.com/alexgustafsson/cupdate
instructions: null
install:
- docker:
    image: $IMAGE
    name: cupdate
    port: $PORT:8080
    volumes:
    - /var/run/docker.sock
    - /var/run/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
