metadata:
  name: Kokoro
  version: latest
  description: Kokoro is a powerful, browser-based AI voice generator that lets you
    create natural-sounding voices without installing anything. Use it directly in
    your browser or self-host it for your own applications with OpenAI API compatibility!
  category: ai
  tags:
  - AI
  - Voice Generation
  - Browser-Based
  - OpenAI API
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/eduardolat/kokoro-web:0.1.3
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Github
  url: https://github.com/eduardolat/kokoro-web
instructions: null
install:
- docker:
    image: $IMAGE
    name: kokoro
    port: $PORT:80
    volumes:
    - /kokoro/cache
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
