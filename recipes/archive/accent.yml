metadata:
  name: Accent
  version: latest
  description: Accent is a free and open-source web-based collaboration platform for
    translation and localization projects. It provides a clean interface for translators
    to work together on various file formats including JSON, YAML, Properties, Gettext
    PO, and many more. Accent supports real-time collaboration, version control integration,
    and automated workflows to streamline the translation process. It features role-based
    access control, translation memory, and comprehensive reporting tools to help
    manage translation projects efficiently.
  category: self-hosted
  tags: []
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: mirego/accent:v1.29.0
  port:
    type: integer
    title: Port HTTP
    default: 4000
links:
- label: Website
  url: https://www.accent.reviews
- label: Documentation
  url: https://www.accent.reviews/guides/getting-started
- label: GitHub
  url: https://github.com/mirego/accent
instructions: null
install:
- docker:
    image: $IMAGE
    name: accent
    port: $PORT:4000
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
