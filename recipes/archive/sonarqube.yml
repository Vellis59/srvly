metadata:
  name: SonarQube Community
  version: latest
  description: SonarQube Community is an open-source platform for continuous inspection
    of code quality, designed to detect bugs, vulnerabilities, and code smells across
    multiple programming languages. It integrates with various CI/CD pipelines, providing
    valuable insights into code health and maintainability. SonarQube helps teams
    ensure that their code meets quality standards and aligns with security requirements,
    promoting efficient software development practices. The Community version is feature-rich
    and free to use, making it an ideal choice for developers and organizations focused
    on improving code quality without incurring costs.
  category: developer-tools
  tags:
  - Developer Tools
  - Code Quality
  - Security
  - Continuous Integration
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: sonarqube:26.4.0.121862-community
  port:
    type: integer
    title: Port HTTP
    default: 9000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://www.sonarqube.org/
- label: Documentation
  url: https://docs.sonarqube.org/latest/
- label: GitHub
  url: https://github.com/SonarSource/sonarqube
instructions: Default login; username=admin, password=admin
install:
- docker:
    image: $IMAGE
    name: sonarqube
    port: $PORT:9000
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Default login; username=admin, password=admin
services:
  postgres:
    type: postgres
    version: latest
