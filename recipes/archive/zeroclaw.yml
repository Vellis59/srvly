metadata:
  name: ZeroClaw
  version: latest
  description: ZeroClaw is a fast, small, and fully autonomous AI personal assistant infrastructure built in 100% Rust. Connect any LLM provider and deploy anywhere.
  category: ai
  tags:
  - AI
  - Assistant
  - Rust
  - Self-Hosted
  - Agents
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image
    default: ghcr.io/zeroclaw/zeroclaw:latest
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: GitHub
  url: https://github.com/zeroclaw/zeroclaw
install:
- docker:
    image: $IMAGE
    name: zeroclaw
    port: $PORT:8080
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
