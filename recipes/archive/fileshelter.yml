metadata:
  name: FileShelter
  version: latest
  description: A simple and secure file sharing application that allows users to upload
    and share files with a clean web interface. Files are stored on the server and
    can be accessed through unique URLs.
  category: file-sharing
  tags:
  - File Sharing
  - Self-hosted
  - Open Source
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: epoupon/fileshelter:6.4.0
  port:
    type: integer
    title: Port HTTP
    default: 5091
links:
- label: GitHub
  url: https://github.com/epoupon/fileshelter
- label: Docker Hub
  url: https://hub.docker.com/r/epoupon/fileshelter
- label: Website
  url: https://fileshelter-demo.poupon.dev
instructions: null
install:
- docker:
    image: $IMAGE
    name: fileshelter
    port: $PORT:5091
    volumes:
    - /var/fileshelter
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
