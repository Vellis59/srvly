metadata:
  name: Commento
  version: latest
  description: Commento is a comments widget designed to enhance the interaction on
    your website. It allows your readers to contribute to the discussion by upvoting
    comments that add value and downvoting those that don't. The widget supports markdown
    formatting, enabling bold, italics, external links, quotes, bullet points, code,
    and more. Commento also provides moderation tools to manage the conversation,
    allowing you to lock heated threads, remove off-topic comments, and enforce timeouts.
    It features a spam detection system, saving you the hassle of dealing with spammers.
    The widget supports nested replies, making discussions easier to follow. Importantly,
    Commento does not require your readers to sign up, reducing friction and encouraging
    more interaction. You can easily customize the look of the widget to match your
    website's aesthetics.
  category: comments
  tags:
  - Comments
  - Discussion
  - Website
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: registry.gitlab.com/commento/commento:v1.8.0
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: Website
  url: https://commento.io/
- label: Documentation
  url: https://commento.io/
- label: Gitlab
  url: https://gitlab.com/commento/commento
instructions: null
install:
- docker:
    image: $IMAGE
    name: commento
    port: $PORT:8080
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
