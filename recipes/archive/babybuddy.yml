metadata:
  name: BabyBuddy
  version: latest
  description: BabyBuddy is a comprehensive, user-friendly platform designed to help
    parents and caregivers manage essential details about their child’s growth and
    development. It provides tools for tracking feedings, sleep schedules, diaper
    changes, and milestones, making parenting a more organized and informed journey.
    With BabyBuddy, you can access detailed insights into your child's habits, progress,
    and overall well-being. The app offers customization options to fit individual
    family needs and supports data export for secure backup or sharing with healthcare
    professionals. BabyBuddy is lightweight, easy to deploy, and designed with a focus
    on privacy, ensuring your family’s data is safe and accessible only to you.
  category: parenting
  tags:
  - Parenting
  - Tracking
  - Child Development
  - Family Management
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: linuxserver/babybuddy:2.8.0
  port:
    type: integer
    title: Port HTTP
    default: 8000
links:
- label: Website
  url: https://babybuddy.app
- label: Documentation
  url: https://docs.babybuddy.app
- label: GitHub
  url: https://github.com/babybuddy/babybuddy
instructions: Login username=admin,password=admin
install:
- docker:
    image: $IMAGE
    name: babybuddy
    port: $PORT:8000
    volumes:
    - /config
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Login username=admin,password=admin
