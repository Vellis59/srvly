metadata:
  name: Universal Media Server
  version: latest
  description: Universal Media Server (UMS) is a DLNA-compliant media server that
    can share videos, audio, and images to any DLNA-capable device, including smart
    TVs, game consoles, mobile devices, and other computers. It supports a wide range
    of formats and offers extensive customization options for transcoding and streaming.
  category: media-server
  tags:
  - Media Server
  - DLNA
  - Streaming
  - Transcoding
  - Home Media
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: universalmediaserver/ums:14.12.0
  port:
    type: integer
    title: Port HTTP
    default: 9001
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://www.universalmediaserver.com/
- label: GitHub
  url: https://github.com/UniversalMediaServer/UniversalMediaServer
- label: Docker Hub
  url: https://hub.docker.com/r/universalmediaserver/ums
instructions: Mount your media library to the `ums-media` volume at `/root/media`,
  then open Universal Media Server from your Easypanel domain and complete the initial
  library scan and device discovery setup.
install:
- docker:
    image: $IMAGE
    name: universalmediaserver
    port: $PORT:9001
    volumes:
    - /root/media
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Mount your media library to the `ums-media` volume at `/root/media`, then
    open Universal Media Server from your Easypanel domain and complete the initial
    library scan and device discovery setup.
