metadata:
  name: Docker Registry
  version: latest
  description: Docker Registry 2.0 is a powerful application designed to store and
    distribute Docker images. This app is an implementation of the Docker Registry
    HTTP API V2, compatible with Docker 1.6 and later versions. It provides a secure
    and scalable base for building a large scale registry solution or running a simple
    private registry. Docker Registry 2.0 is a core library for many registry operators
    including Docker Hub, GitHub Container Registry, GitLab Container Registry, and
    DigitalOcean Container Registry. It is also used by the CNCF Harbor Project and
    VMware Harbor Registry. The app allows users to efficiently store, manage, package,
    and exchange content, providing a professional grade and extensible content distribution
    system.
  category: developer-tools
  tags:
  - Developer Tools
  - Databases
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: registry:3.1.0
  port:
    type: integer
    title: Port HTTP
    default: 5000
links:
- label: Website
  url: https://hub.docker.com/_/registry
- label: Github
  url: https://github.com/distribution/distribution
instructions: The Registry doesn't have a UI. To interact with the registry you should
  use the Docker CLI.
install:
- docker:
    image: $IMAGE
    name: docker-registry
    port: $PORT:5000
    volumes:
    - /var/lib/registry
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: The Registry doesn't have a UI. To interact with the registry you should
    use the Docker CLI.
