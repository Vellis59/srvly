metadata:
  name: Zipline
  version: latest
  description: Zipline is the next generation ShareX/File upload server, designed
    to make file sharing and management a breeze. With a user-friendly dashboard packed
    with features, Zipline allows you to upload any file type, view your files in
    a gallery, and even shorten URLs for easy sharing. The app also provides a way
    to organize your files with folders for easy access and management. Zipline also
    offers features like image compression, video thumbnail generation, and password
    protection for your uploads. With Zipline, you can quickly set up your own instance
    and configure it to your needs. It also offers an extensive API for a more fine-grained
    control over your instance. Zipline is not just a file upload server, it's a comprehensive
    tool for managing and sharing your files with ease and efficiency.
  category: file-management
  tags:
  - File Management
  - Dashboard
  - URL Shortening
  - Image Compression
  - API
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/diced/zipline:4.5.3
  port:
    type: integer
    title: Port HTTP
    default: 3000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://zipline.diced.tech/
- label: Github
  url: https://github.com/diced/zipline
- label: Documentation
  url: https://zipline.diced.tech/docs/get-started
instructions: After installing Zipline for the first time, you may login to the dashboard
  with the username "administrator" and the password "password".
install:
- docker:
    image: $IMAGE
    name: zipline
    port: $PORT:3000
    volumes:
    - /zipline/uploads
    - /zipline/public
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: After installing Zipline for the first time, you may login to the dashboard
    with the username "administrator" and the password "password".
services:
  postgres:
    type: postgres
    version: latest
