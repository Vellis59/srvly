metadata:
  name: Wakapi
  version: latest
  description: Wakapi is a powerful open-source tool designed to help you track and
    analyze your coding time. It allows you to monitor the time you've spent coding
    on various projects, in different programming languages, and more. It's perfect
    for those who love statistics and want to gain insights into their coding habits.
    Wakapi provides fancy statistics and plots, public leaderboards, cool badges for
    readmes, and weekly email reports. It's built by developers for developers, ensuring
    it meets your needs perfectly. With Wakapi, you can easily keep track of your
    coding time and improve your productivity.
  category: developer-tools
  tags:
  - Developer Tools
  - Analytics
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: n1try/wakapi:2.17.3
  port:
    type: integer
    title: Port HTTP
    default: 3000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://wakapi.dev/
- label: Github
  url: https://github.com/muety/wakapi
instructions: null
install:
- docker:
    image: $IMAGE
    name: wakatime
    port: $PORT:3000
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
