metadata:
  name: FlareSolverr
  version: latest
  description: FlareSolverr is a proxy server designed to help bots and scripts bypass
    web protections like Cloudflare's anti-bot page. It acts as an intermediary that
    can execute JavaScript and handle cookies and sessions, making it appear as if
    requests are coming from a real web browser. This tool is particularly useful
    for web scraping and automated data collection tasks where access to JavaScript-heavy
    websites is required. FlareSolverr supports multiple platforms and can be integrated
    into existing scraping setups to solve CAPTCHAs and manage browser sessions efficiently.
  category: web-scraping
  tags:
  - Web Scraping
  - Proxy Server
  - Anti-bot Bypass
  - CAPTCHA Solving
  - Cloudflare Bypass
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/flaresolverr/flaresolverr:v3.4.6
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://github.com/FlareSolverr/FlareSolverr
- label: Documentation
  url: https://github.com/FlareSolverr/FlareSolverr/wiki
- label: Github
  url: https://github.com/FlareSolverr/FlareSolverr
instructions: null
install:
- docker:
    image: $IMAGE
    name: flaresolverr
    port: $PORT:80
    volumes:
    - /config
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
