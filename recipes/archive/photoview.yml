metadata:
  name: Photoview
  version: latest
  description: Photoview is a user-friendly photo gallery designed for photographers.
    It allows you to easily navigate through directories filled with high-resolution
    photos and videos. The app syncs with your file system, automatically organizing
    your media based on the file structure. Directories become albums filled with
    the photos and videos found within them. Photoview also automatically rescans
    for new media, keeping your gallery updated. Multiple users can be configured,
    each with their own directory of photos and videos, and each user's media is kept
    private with a username and password. Albums and individual photos or videos can
    be shared through public or password-protected links. Photoview also analyzes
    photos for EXIF metadata, displaying this information next to the photo and using
    it to present photos on a map. The app also has a mobile version for iOS, allowing
    you to quickly access your media library from your phone. Photoview supports RAW
    images, automatically extracts metadata from images and videos, and optimizes
    videos for the web. It also generates thumbnails automatically and ensures that
    your media is secure and private.
  category: gallery
  tags:
  - Gallery
  - Media
  - Photography
  - Photos
  - Self-Hosted
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: photoview/photoview:2.4.0
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://photoview.github.io/
- label: Github
  url: https://github.com/photoview/photoview
- label: Demo
  url: https://photos.qpqp.dk/
instructions: 'After deployment, you need to mount your photos directory to the /photos
  path.

  This can be done using bind mounts in Easypanel''s advanced settings.

  On first access, you will be prompted to create an admin user and configure

  the photo source path (use /photos as the path).

  '
install:
- docker:
    image: $IMAGE
    name: photoview
    port: $PORT:80
    volumes:
    - /home/photoview/media-cache
    - /home/photoview/database
    - /photos
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: 'After deployment, you need to mount your photos directory to the /photos
    path.

    This can be done using bind mounts in Easypanel''s advanced settings.

    On first access, you will be prompted to create an admin user and configure

    the photo source path (use /photos as the path).

    '
services:
  postgres:
    type: postgres
    version: latest
  mysql:
    type: mysql
    version: latest
