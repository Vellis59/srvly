metadata:
  name: Logseq
  version: latest
  description: Logseq is a powerful tool designed to enhance your note-taking and
    task management experience. It allows you to connect your notes, increasing your
    understanding and productivity. With features like PDF Annotations, Flashcards,
    and Whiteboards, it caters to a wide range of users including students, academics,
    writers, project managers, and developers. Logseq helps you capture, structure,
    and review your class notes with ease using the Linked References, Queries, and
    Search features. It also aids in memorizing facts and insights using the Flashcards
    feature. You can organize your thoughts and ideas, and quickly turn them into
    outlines using Block References. The app also offers tips and tricks to improve
    your note-taking skills, whether you're a beginner, intermediate, or expert. With
    Logseq, you can create your own processes, generate tables of relevant information,
    and always find what you're looking for. It also helps you stay on top of your
    relationships, conversations, and meetings, making it a safe space for your thoughts.
    Logseq is designed to store your interests, questions, ideas, favorite quotes,
    reminders, reading and meeting notes easily and future-proof. It also offers real-time,
    encrypted file syncing so you'll always have your notes backed up and securely
    available on any device. The Whiteboards feature provides a new canvas for your
    thoughts, allowing you to connect, associate and understand in new ways.
  category: notes
  tags:
  - Notes
  - Productivity
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/logseq/logseq-webapp
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://logseq.com
- label: Documentation
  url: https://docs.logseq.com
- label: Github
  url: https://github.com/logseq/logseq
instructions: null
install:
- docker:
    image: $IMAGE
    name: logseq
    port: $PORT:80
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
