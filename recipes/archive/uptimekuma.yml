metadata:
  name: UptimeKuma
  version: latest
  description: Uptime Kuma is a self-hosted monitoring tool designed to keep track
    of your website's uptime. It provides a comprehensive monitoring solution for
    HTTP(s), TCP, HTTP(s) Keyword, HTTP(s) Json Query, Ping, DNS Record, Push, Steam
    Game Server, and Docker Containers. The tool features a user-friendly, reactive,
    and fast UI/UX. It offers notifications via various platforms including Telegram,
    Discord, Gotify, Slack, Pushover, and Email (SMTP), among others. Uptime Kuma
    supports multi-language interfaces and multiple status pages, allowing users to
    map status pages to specific domains. It also provides ping charts, certificate
    info, proxy support, and 2FA support for enhanced security. This tool is perfect
    for those who want to ensure their website is always up and running.
  category: monitoring
  tags:
  - Monitoring
  - Self-hosted
  - Uptime
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: louislam/uptime-kuma:2.3.2
  port:
    type: integer
    title: Port HTTP
    default: 3001
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://uptime.kuma.pet
- label: Documentation
  url: https://github.com/louislam/uptime-kuma/wiki
- label: Github
  url: https://github.com/louislam/uptime-kuma
instructions: null
install:
- docker:
    image: $IMAGE
    name: uptimekuma
    port: $PORT:3001
    volumes:
    - /app/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
