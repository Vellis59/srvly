metadata:
  name: Langfuse
  version: latest
  description: Langfuse is a powerful, self-hosted observability platform designed
    for AI applications. It simplifies monitoring, debugging, and optimizing your
    AI workflows with detailed insights, customizable metrics, and flexible integrations.
    Langfuse provides a clean and intuitive interface, robust API access, and plugin
    support to extend its functionality. It ensures privacy and compliance by allowing
    you to maintain full control over your data with a self-hosted solution. The application
    is accessible via your host and supports multi-platform awareness, ensuring compatibility
    with various architectures.
  category: observability
  tags:
  - Observability
  - Self-Hosted
  - AI Monitoring
  - Analytics
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: langfuse/langfuse:3.174.1
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Documentation
  url: https://langfuse.com/docs
- label: Github
  url: https://github.com/langfuse/langfuse
instructions: null
install:
- docker:
    image: $IMAGE
    name: langfuse
    port: $PORT:80
    volumes:
    - /var/lib/clickhouse
    - /var/log/clickhouse-server
    - /data
    extra_ports:
    - 9000:9000
    - 9001:9001
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
