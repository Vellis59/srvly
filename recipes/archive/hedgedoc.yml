metadata:
  name: HedgeDoc
  version: latest
  description: HedgeDoc, previously known as CodiMD, is an open-source, web-based,
    self-hosted, collaborative markdown editor. It allows you to collaborate on notes,
    graphs, and presentations in real-time. Simply share your note-link with your
    co-workers and they can join in the collaboration. The editor runs directly in
    your browser, allowing you to stay in control of your data by keeping it on your
    server. HedgeDoc also offers a presentation mode for building and presenting slides
    in markdown, and supports a variety of graphs, diagrams, and embedded content.
    It features an easy-to-use permission system for managing note permissions, and
    keeps track of changes to your notes through revisions, even allowing you to revert
    to older versions. Despite its extensive features, HedgeDoc has low system requirements
    and can run smoothly even on a Raspberry Pi.
  category: documents
  tags:
  - Documents
  - Collaboration
  - Note-taking
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: quay.io/hedgedoc/hedgedoc:1.10.8
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Website
  url: https://hedgedoc.org/
- label: Documentation
  url: https://docs.hedgedoc.org/
- label: Github
  url: https://git.hedgedoc.org/
instructions: null
install:
- docker:
    image: $IMAGE
    name: hedgedoc
    port: $PORT:3000
    volumes:
    - /hedgedoc/public/uploads
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
