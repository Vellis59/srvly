metadata:
  name: Grafana
  version: latest
  description: Grafana is a powerful, open-source platform designed to provide comprehensive
    metrics, logs, and trace data visualization. It allows users to query, visualize,
    and alert on their data, offering high-scale distributed tracing and scalable,
    performant metrics. The app also includes features for incident response and management,
    performance testing, and on-call management. Grafana can connect to various data
    sources and applications, providing operational dashboards for your data anywhere.
    It also offers a free forever plan, allowing users to monitor their data with
    10,000 series metrics, 50 GB of logs, 50 GB of traces, and 500 VUh of k6 testing.
    Grafana is a versatile tool for anyone looking to gain insights from their data.
  category: monitoring
  tags:
  - Monitoring
  - Logs
  - Metrics
  - Traces
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: grafana/grafana-oss:13.0.1
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Website
  url: https://grafana.com
- label: Documentation
  url: https://grafana.com/docs
- label: Github
  url: https://github.com/grafana/grafana
instructions: Login with admin:admin
install:
- docker:
    image: $IMAGE
    name: grafana
    port: $PORT:3000
    volumes:
    - /var/lib/grafana
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Login with admin:admin
