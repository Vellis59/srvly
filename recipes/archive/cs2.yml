metadata:
  name: Counter-Strike 2 Dedicated Server
  version: latest
  description: Counter-Strike 2 Dedicated Server allows you to host your own CS2 game
    server with full control over configuration and settings. This self-hosted gaming
    solution provides a professional-grade server environment for competitive matches,
    casual gameplay, or private practice sessions. The server supports various game
    modes including casual, competitive, and deathmatch, with extensive customization
    options for maps, player limits, server rules, and bot configurations. Features
    include RCON remote administration, CSTV for broadcasting matches, workshop map
    support, and comprehensive logging. Perfect for gaming communities, esports teams,
    or anyone wanting to run their own CS2 server with dedicated resources and low
    latency.
  category: gaming
  tags:
  - Gaming
  - Game Server
  - Counter-Strike
  - FPS
  - Multiplayer
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: joedwards32/cs2:4.0.1
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Steam Game Server Account Management
  url: https://steamcommunity.com/dev/managegameservers
- label: Docker Hub
  url: https://hub.docker.com/r/joedwards32/cs2
- label: CS2 Dedicated Servers Wiki
  url: https://developer.valvesoftware.com/wiki/Counter-Strike_2/Dedicated_Servers
- label: Github
  url: https://github.com/joedwards32/CS2
instructions: IMPORTANT - You must obtain a Game Server Token from https://steamcommunity.com/dev/managegameservers
  before your server can be listed publicly.
install:
- docker:
    image: $IMAGE
    name: cs2
    port: $PORT:80
    volumes:
    - /home/steam/cs2-dedicated/
    extra_ports:
    - 27015:27015
    - 27020:27020
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: IMPORTANT - You must obtain a Game Server Token from https://steamcommunity.com/dev/managegameservers
    before your server can be listed publicly.
