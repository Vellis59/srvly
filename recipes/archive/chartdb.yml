metadata:
  name: ChartDB
  version: latest
  description: ChartDB is an open-source, web-based database diagramming editor that
    enables you to visualize and manage database schemas through interactive diagrams.
    Create entity-relationship diagrams (ERDs) instantly by connecting to your databases
    and automatically generating visual representations of your schema. The application
    supports instant schema visualization using a single query and offers AI-powered
    features through OpenAI integration for intelligent SQL export and schema management.
    ChartDB provides an intuitive interface for understanding complex database structures,
    making it perfect for developers, database administrators, and teams who need
    to document and communicate database designs. With its modern web-based approach,
    you can access your database diagrams from anywhere and collaborate effectively
    on database architecture without installing desktop software.
  category: database
  tags:
  - Database
  - Diagram
  - ERD
  - Visualization
  - Schema
  - Self-Hosted
  - AI
  - Design Tool
  - Documentation
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/chartdb/chartdb:1.20.1
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://chartdb.io
- label: GitHub
  url: https://github.com/chartdb/chartdb
instructions: null
install:
- docker:
    image: $IMAGE
    name: chartdb
    port: $PORT:80
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
