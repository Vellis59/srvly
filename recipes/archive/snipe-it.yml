metadata:
  name: Snipe-IT
  version: latest
  description: Snipe-IT is a powerful, open-source IT asset management system designed
    to help organizations efficiently manage and track their IT assets. From laptops
    to licenses, Snipe-IT provides a centralized platform to store, monitor, and manage
    asset information securely. Unlike traditional asset management systems, Snipe-IT
    is modern, intuitive, and built for ease of use. It features detailed reporting,
    asset auditing, and check-in/check-out functionality, ensuring accountability
    and accuracy for IT teams. Snipe-IT also supports role-based user management and
    integrates seamlessly with LDAP and SMTP for user authentication and notifications.
    Whether you're managing 10 or 10,000 assets, Snipe-IT offers the tools you need
    to stay organized and improve IT workflow. With robust API support, it can integrate
    with third-party systems for automation and enhanced reporting. Ideal for businesses
    of all sizes, Snipe-IT makes IT asset management easy and effective.
  category: asset-management
  tags:
  - Asset Management
  - Open Source
  - Auditing
  - Reporting
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: snipe/snipe-it:v8.4.1
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: Documentation
  url: https://snipe-it.readme.io/
- label: GitHub
  url: https://github.com/snipe/snipe-it
instructions: null
install:
- docker:
    image: $IMAGE
    name: snipe-it
    port: $PORT:80
    volumes:
    - /var/lib/snipeit
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  mysql:
    type: mysql
    version: latest
