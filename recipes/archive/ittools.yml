metadata:
  name: It Tools
  version: latest
  description: IT-Tools is a comprehensive suite of handy tools designed to assist
    developers in their day-to-day tasks. It includes a wide range of features such
    as Crypto Token generator, Hash text Bcrypt, UUIDs v4 generator, Encrypt/Decrypt
    text, BIP39 passphrase generator, and many more. The app also offers various converters
    like Date-time converter, Integer base converter, Roman numeral converter, and
    Base64 string encoder/decoder among others. It provides a platform for developers
    to generate QR codes, SVG placeholders, and even record videos from their camera.
    With additional features like Git cheatsheet, Random port generator, Crontab generator,
    and JSON prettify and format, IT-Tools is a one-stop solution for all developer
    needs.
  category: developer-tools
  tags:
  - Developer Tools
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: corentinth/it-tools:2024.10.22-7ca5933
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://it-tools.tech
- label: Github
  url: https://github.com/CorentinTh/it-tools
instructions: null
install:
- docker:
    image: $IMAGE
    name: ittools
    port: $PORT:80
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
