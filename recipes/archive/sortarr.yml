metadata:
  name: Sortarr
  version: latest
  description: Sortarr is a read-only analytics and organization tool for Sonarr and
    Radarr media libraries. It provides a data-driven management layer that helps
    you identify missing media, mismatches, and optimization opportunities using real
    playback data from providers like Tautulli, Jellystat, or Plex. Sortarr supports
    multiple Sonarr and Radarr instances, presents a unified PowerBI-like spreadsheet
    interface with actionable insights, and never modifies, moves, or renames your
    media files. All operations are strictly read-only and safe.
  category: media
  tags:
  - Media
  - Sonarr
  - Radarr
  - Analytics
  - Self-Hosted
  - Plex
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/jaredharper1/sortarr:0.8.7
  port:
    type: integer
    title: Port HTTP
    default: 8787
  version:
    type: string
    title: Version
    default: latest
links:
- label: GitHub
  url: https://github.com/Jaredharper1/Sortarr
- label: Documentation
  url: https://github.com/Jaredharper1/Sortarr/wiki
instructions: On first launch, add your Sonarr/Radarr instances, a history provider
  (Tautulli, Jellystat, or Plex), and a playback provider (Plex). Test connections,
  save configuration, and Sortarr will begin analyzing your libraries immediately.
install:
- docker:
    image: $IMAGE
    name: sortarr
    port: $PORT:8787
    volumes:
    - /config
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: On first launch, add your Sonarr/Radarr instances, a history provider (Tautulli,
    Jellystat, or Plex), and a playback provider (Plex). Test connections, save configuration,
    and Sortarr will begin analyzing your libraries immediately.
