metadata:
  name: SolidInvoice
  version: latest
  description: SolidInvoice is a self-hosted invoicing and billing platform built with Symfony and Vue.js. Create and send professional invoices and quotes, track payments, manage clients and contacts, and accept online payments.
  category: finance
  tags:
  - Finance
  - Invoicing
  - Billing
  - Business
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image
    default: solidinvoice/solidinvoice:latest
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: Website
  url: https://solidinvoice.co/
- label: GitHub
  url: https://github.com/SolidInvoice/SolidInvoice
install:
- docker:
    image: $IMAGE
    name: solidinvoice
    port: $PORT:8080
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
