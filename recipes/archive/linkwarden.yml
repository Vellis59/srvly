metadata:
  name: LinkWarden
  version: latest
  description: LinkWarden is a powerful, self-hosted service designed for managing
    and archiving bookmarks. It provides an intuitive interface for organizing and
    accessing your saved links, supports advanced features for enhanced productivity,
    and offers detailed link preservation options. With LinkWarden, you can maintain
    control over your bookmarks and ensure they remain accessible.
  category: bookmark-manager
  tags:
  - Bookmark Manager
  - Self-Hosted
  - Productivity
  - Archiving
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/linkwarden/linkwarden:v2.14.1
  port:
    type: integer
    title: Port HTTP
    default: 3000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Documentation
  url: https://linkwarden.app/docs
- label: Github
  url: https://github.com/linkwarden/linkwarden
instructions: Configure Environment Variables as per your needs.
install:
- docker:
    image: $IMAGE
    name: linkwarden
    port: $PORT:3000
    volumes:
    - /data/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Configure Environment Variables as per your needs.
services:
  postgres:
    type: postgres
    version: latest
