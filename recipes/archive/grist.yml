metadata:
  name: Grist
  version: latest
  description: Grist is an open-source, customizable data management platform that
    combines the power of a spreadsheet with the structure of a database. Designed
    for teams and individuals who need to organize, analyze, and share information,
    Grist offers a flexible and collaborative environment for data management. It
    supports relational data linking, allowing users to create complex, connected
    data tables, and provides tools for custom views, formulas, and dashboards. Grist’s
    user-friendly interface empowers users to build powerful applications without
    requiring extensive coding knowledge.
  category: data-management
  tags:
  - Data Management
  - Spreadsheet
  - Database
  - Collaboration
  - No-Code
  - Customizable Dashboards
  - Data Security
  - API Integration
  - Templates
  - Data Import/Export
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: gristlabs/grist:1.7.13
  port:
    type: integer
    title: Port HTTP
    default: 8484
links:
- label: Website
  url: https://www.getgrist.com
- label: Documentation
  url: https://support.getgrist.com
- label: GitHub
  url: https://github.com/gristlabs/grist-core
instructions: null
install:
- docker:
    image: $IMAGE
    name: grist
    port: $PORT:8484
    volumes:
    - /persist
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
