metadata:
  name: Owncast
  version: latest
  description: Owncast is a free and open-source live video and web chat server that
    works seamlessly with your existing broadcasting software. It gives you complete
    control and ownership over your stream, allowing you to create the content you
    want. The app comes with a frictionless built-in chat feature that enables your
    viewers to engage and be a part of the action. You can include custom emotes and
    build chat bots to encourage viewer engagement. Owncast also allows your live
    stream to reach a wider audience on The Fediverse, including platforms like Mastodon
    and other Fediverse services. It's a self-hosted and independent solution for
    live streaming, offering a high level of performance comparable to proprietary
    platforms.
  category: chat
  tags:
  - Chat
  - Media
  - Self-hosted
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: gabekangas/owncast:0.2.5
  port:
    type: integer
    title: Port HTTP
    default: 8080
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://owncast.online/
- label: Documentation
  url: https://owncast.online/docs
- label: Github
  url: https://github.com/owncast/owncast
instructions: null
install:
- docker:
    image: $IMAGE
    name: owncast
    port: $PORT:8080
    volumes:
    - /app/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
