metadata:
  name: Apache Superset
  version: latest
  description: Apache Superset is a modern, enterprise-ready business intelligence
    web application. It's fast, lightweight, intuitive, and loaded with options that
    make it easy for users of all skill sets to explore and visualize their data,
    from simple line charts to highly detailed geospatial charts.
  category: business-intelligence
  tags:
  - Business Intelligence
  - Data Visualization
  - Analytics
  - Dashboard
  - SQL
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: apache/superset:6.0.0
  port:
    type: integer
    title: Port HTTP
    default: 8088
links:
- label: Github
  url: https://github.com/apache/superset
- label: Documentation
  url: https://superset.apache.org/docs/intro
- label: Guide
  url: https://www.restack.io/docs/superset-knowledge-apache-superset-default-login
instructions: Migrate database with "superset db upgrade", adjust roles and permissions
  with "superset init", create admin user with "superset fab create-admin". Follow
  the guide for further references.
install:
- docker:
    image: $IMAGE
    name: apache-superset
    port: $PORT:8088
    volumes:
    - /app/superset_home
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Migrate database with "superset db upgrade", adjust roles and permissions
    with "superset init", create admin user with "superset fab create-admin". Follow
    the guide for further references.
