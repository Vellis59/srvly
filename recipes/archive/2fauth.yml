metadata:
  name: 2FAuth
  version: latest
  description: 2FAuth is a web based self-hosted alternative to One Time Passcode
    (OTP) generators like Google Authenticator, designed for both mobile and desktop.
  category: developer-tools
  tags:
  - Developer Tools
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: 2fauth/2fauth:6.1.3
  port:
    type: integer
    title: Port HTTP
    default: 8000
links:
- label: Website
  url: https://2fauth.app/
- label: Documentation
  url: https://docs.2fauth.app/
- label: Github
  url: https://github.com/Bubka/2FAuth
instructions: null
install:
- docker:
    image: $IMAGE
    name: 2fauth
    port: $PORT:8000
    volumes:
    - /2fauth
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
  mysql:
    type: mysql
    version: latest
  redis:
    type: redis
    version: '7'
