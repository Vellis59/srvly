metadata:
  name: AnonUpload
  version: latest
  description: AnonUpload is a secure, anonymous file sharing application that does
    not require a database. It is built with privacy as a priority, ensuring that
    the direct filename used is not displayed. This PHP file uploader is designed
    to work anywhere, be it Nginx, Apache, Lightspeed, or any other platform. AnonUpload
    supports a wide range of file types including jpeg, jpg, gif, png, zip, xls, doc,
    mp3, mp4, mpeg, wav, avi, rar, 7z, txt and more. It also provides size verification
    for uploaded files, allowing for a maximum upload size of 10GB and no minimum
    size. The application also includes a download time feature, which sets a waiting
    time before a file can be downloaded.
  category: file-management
  tags:
  - File Management
  - Privacy
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/supernova3339/anonfiles:1
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Github
  url: https://github.com/supernova3339/anonupload
- label: Enviroment Variables
  url: https://github.com/Supernova3339/anonupload/blob/main/env.md
instructions: visit /admin for the administration interface
install:
- docker:
    image: $IMAGE
    name: anonupload
    port: $PORT:80
    volumes:
    - /var/www/html/files
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: visit /admin for the administration interface
