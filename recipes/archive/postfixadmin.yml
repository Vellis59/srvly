metadata:
  name: PostfixAdmin
  version: latest
  description: PostfixAdmin is a robust, web-based administration interface for managing
    mail servers using Postfix. It allows you to easily manage virtual domains, mailboxes,
    and aliases through an intuitive and flexible interface. PostfixAdmin supports
    advanced features like quota management, domain statistics, and DKIM integration,
    making it an ideal tool for administrators of self-hosted email solutions.
  category: email-administration
  tags:
  - Email Administration
  - Self-Hosted
  - Mail Server
  - Postfix
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: postfixadmin:4.0.1-apache
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: Documentation
  url: https://postfix-configuration.readthedocs.io/en/latest/postfixadmin/
- label: GitHub
  url: https://github.com/postfixadmin/postfixadmin
instructions: To create an admin user, run the following commands in the PostfixAdmin
  container "chmod +x /var/www/html/scripts/postfixadmin-cli" and "/var/www/html/scripts/postfixadmin-cli
  admin add". This will create a new admin user for accessing the PostfixAdmin interface.
install:
- docker:
    image: $IMAGE
    name: postfixadmin
    port: $PORT:80
    volumes:
    - /var/www/html/
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: To create an admin user, run the following commands in the PostfixAdmin container
    "chmod +x /var/www/html/scripts/postfixadmin-cli" and "/var/www/html/scripts/postfixadmin-cli
    admin add". This will create a new admin user for accessing the PostfixAdmin interface.
services:
  mysql:
    type: mysql
    version: latest
