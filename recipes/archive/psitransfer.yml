metadata:
  name: PsiTransfer
  version: latest
  description: PsiTransfer is a simple, open-source, self-hosted file sharing solution
    designed to provide an alternative to paid services like Dropbox and WeTransfer.
    The app allows for the sharing of many and very large files with ease, thanks
    to its support for streams. It also offers resumable uploads and downloads, ensuring
    you never lose progress. With PsiTransfer, you can set an expiry time for your
    upload bucket, and even offer one-time downloads. The app also supports downloading
    all files as a zip or tar.gz archive, and provides a modal-style file preview.
    For added security, PsiTransfer offers a password-protected download list. The
    app is lightweight and mobile-friendly, making it easy to use on any device. It
    also allows for explicit named bucket IDs with a query param sid=<myBucketID>.
  category: file-management
  tags:
  - File Management
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: psitrax/psitransfer:v2.4.3
  port:
    type: integer
    title: Port HTTP
    default: 3000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Documentation
  url: https://github.com/psi-4ward/psitransfer/tree/master/docs
- label: Github
  url: https://github.com/psi-4ward/psitransfer
instructions: null
install:
- docker:
    image: $IMAGE
    name: psitransfer
    port: $PORT:3000
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
