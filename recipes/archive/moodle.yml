metadata:
  name: Moodle
  version: latest
  description: Moodle is a robust, scalable, and open-source learning management system
    (LMS) designed to provide educators and learners with a customizable platform
    to create and deliver personalized learning experiences. With Moodle, you can
    manage courses, track progress, and collaborate using a variety of tools like
    forums, assignments, and quizzes. It supports integrations with numerous third-party
    tools and plugins to enhance functionality. Moodle focuses on accessibility, ensuring
    an inclusive experience for all users. It is widely used in academic institutions,
    businesses, and non-profits globally to deliver quality online education. Moodle
    is a free, open-source project distributed under the GNU General Public License.
  category: lms
  tags:
  - LMS
  - Education
  - Open Source
  - Accessibility
  - Learning Management
  - Customization
  - E-learning
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: bitnamilegacy/moodle:5.0.2
  port:
    type: integer
    title: Port HTTP
    default: 8080
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://moodle.org/
- label: Documentation
  url: https://docs.moodle.org/
- label: Github
  url: https://github.com/moodle
instructions: Moodle takes time to install. Default credentails; username=user, password=bitnami
install:
- docker:
    image: $IMAGE
    name: moodle
    port: $PORT:8080
    volumes:
    - /bitnami/mariadb
    - /bitnami/moodle
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Moodle takes time to install. Default credentails; username=user, password=bitnami
services:
  mysql:
    type: mysql
    version: latest
