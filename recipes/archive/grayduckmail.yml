metadata:
  name: Gray Duck Mail
  version: latest
  description: Gray Duck Mail is a user-friendly email discussion list application
    that offers an alternative to traditional email discussion group software. It
    is designed to be simple to set up and manage, making the process of running an
    email discussion list effortless. Gray Duck Mail is perfect for managing mailing
    lists between small to medium size groups, such as neighborhoods, schools, workplaces,
    and families. With Gray Duck Mail, you can send one email and automatically keep
    everyone in the loop. The application monitors a remote mail server for messages
    and processes them by relaying the message to all list members. It also automatically
    handles user subscriptions, unsubscription requests, and email bounces. Gray Duck
    Mail works with any external email host that allows for POP3/SMTP connections
    and message forwarding or aliasing. It relies totally on an external mail provider,
    allowing you to use an existing web host or email account.
  category: email
  tags:
  - Email
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: wagesj45/gray-duck-mail
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://grayduckmail.com
- label: Github
  url: https://github.com/wagesj45/gray-duck-mail
instructions: null
install:
- docker:
    image: $IMAGE
    name: grayduckmail
    port: $PORT:80
    volumes:
    - /database
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
