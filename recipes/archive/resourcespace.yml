metadata:
  name: ResourceSpace
  version: latest
  description: ResourceSpace is an open-source Digital Asset Management (DAM) system
    that helps organizations manage, organize, and share their digital assets efficiently.
    It provides a web-based interface for managing files, images, videos, and other
    digital resources with features like metadata management, version control, and
    access control.
  category: dam
  tags:
  - DAM
  - Asset Management
  - File Management
  - Web Interface
  - Database
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: creecros/resourcespace-docker:v9.2
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://www.resourcespace.com/
- label: Documentation
  url: https://www.resourcespace.com/documentation
- label: GitHub
  url: https://github.com/ResourceSpace/ResourceSpace
instructions: null
install:
- docker:
    image: $IMAGE
    name: resourcespace
    port: $PORT:80
    volumes:
    - /var/www/html/include
    - /var/www/html/filestore
    - /srv/storage/testdir
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  mysql:
    type: mysql
    version: latest
