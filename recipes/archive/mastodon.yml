metadata:
  name: Mastodon
  version: latest
  description: Mastodon is a unique social networking app that puts control back in
    your hands. It allows you to curate your own home feed, free from algorithms or
    ads, ensuring you see only what matters most to you. The app supports a wide range
    of content types, including audio, video, and picture posts, polls, content warnings,
    and more, enabling you to express yourself freely online. Mastodon is decentralized
    and open-source, meaning each server is a completely independent entity, yet able
    to interoperate with others to form a global social network. The app respects
    your agency, never serving ads or pushing profiles, and is built on open web protocols,
    allowing it to interact with any other platform that implements ActivityPub. With
    Mastodon, you have the power to manage your audience, moderate content, and create
    a social media experience that truly reflects you.
  category: social-networking
  tags:
  - Social Networking
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/mastodon/mastodon:v4.5.9
  port:
    type: integer
    title: Port HTTP
    default: 3000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://joinmastodon.org
- label: Docs
  url: https://docs.joinmastodon.org
- label: Github
  url: https://github.com/mastodon/mastodon
instructions: To create an admin account, type "tootctl accounts create username --email
  user@example.com --confirmed --role Owner" on the console.
install:
- docker:
    image: $IMAGE
    name: mastodon
    port: $PORT:3000
    volumes:
    - /mastodon/public
    - /mastodon/public
    extra_ports:
    - 4000:4000
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: To create an admin account, type "tootctl accounts create username --email
    user@example.com --confirmed --role Owner" on the console.
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
