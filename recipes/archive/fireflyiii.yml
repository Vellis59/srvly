metadata:
  name: Firefly III
  version: latest
  description: Firefly III is a self-hosted financial manager. It helps you keep track of expenses, income, budgets and everything in between. It supports transactions, budgets, categories, tags, bills, and reports.
  category: finance
  tags:
  - Finance
  - Budgeting
  - Accounting
  - Self-Hosted
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image
    default: fireflyiii/core:latest
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: Website
  url: https://www.firefly-iii.org/
- label: GitHub
  url: https://github.com/firefly-iii/firefly-iii
install:
- docker:
    image: $IMAGE
    name: fireflyiii
    port: $PORT:8080
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
