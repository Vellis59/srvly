metadata:
  name: MetaTrader5
  version: latest
  description: MetaTrader 5 (MT5) is a powerful, multi-functional trading platform
    designed for financial institutions, brokers, and individual traders. It supports
    trading in various financial markets, including Forex, stocks, futures, and CFDs.
    MT5 offers advanced charting tools, technical indicators, and automated trading
    capabilities through Expert Advisors (EAs). With a focus on speed, reliability,
    and flexibility, MT5 enables seamless market analysis, efficient trade execution,
    and comprehensive risk management. The platform supports multi-asset trading,
    backtesting, and a robust API for custom integrations.
  category: trading
  tags:
  - Trading
  - Financial Markets
  - Automated Trading
  - Forex
  - Stocks
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: gmag11/metatrader5_vnc:2.3
  port:
    type: integer
    title: Port HTTP
    default: 3000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://www.metatrader5.com/en
- label: Documentation
  url: https://www.metatrader5.com/en/terminal/help
- label: Github
  url: https://github.com/gmag11/MetaTrader5-Docker-Image
- label: Docker Guide
  url: https://hub.docker.com/r/gmag11/metatrader5_vnc
instructions: null
install:
- docker:
    image: $IMAGE
    name: metatrader5
    port: $PORT:3000
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
