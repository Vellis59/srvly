metadata:
  name: AdGuard Home
  version: latest
  description: AdGuard Ad Blocker is a comprehensive solution designed to enhance
    your online browsing experience by eliminating all kinds of ads, from annoying
    banners and pop-ups to intrusive video ads. It not only removes these distractions
    but also maintains the functionality and appearance of the websites you visit.
    The app also offers privacy protection, shielding your data from web analytics
    and online trackers. In addition, AdGuard ensures browsing security by protecting
    against phishing and malicious sites. It also includes a parental control feature,
    providing a safe online environment for children by blocking inappropriate and
    adult content. The app is designed to work across all browsers and apps, offering
    a seamless ad-free experience. Moreover, it saves traffic and speeds up page loading
    by filtering ads before they reach your device. AdGuard is more than just an ad
    blocker; it's a tool that enhances your online safety and browsing speed.
  category: privacy
  tags:
  - Privacy
  - Security
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: adguard/adguardhome:v0.107.74
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Website
  url: https://adguard.com
- label: Github
  url: https://github.com/AdguardTeam/AdGuardHome
- label: Docker
  url: https://hub.docker.com/r/adguard/adguardhome
instructions: During the setup phase, if the instance, does not start, you have to
  disable the service using port 53 on your host server, so adguard can bind the port
  53. Then setup the admin account on port 3000, then change it to port 80. To use
  the DHCP feature, you must also open ports 67/udp 68/tcp-udp.
install:
- docker:
    image: $IMAGE
    name: adguardhome
    port: $PORT:3000
    volumes:
    - /opt/adguardhome/work
    - /opt/adguardhome/conf
    extra_ports:
    - '53:53'
    - 784:784
    - 853:853
    - 5443:5443
    - 8853:8853
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: During the setup phase, if the instance, does not start, you have to disable
    the service using port 53 on your host server, so adguard can bind the port 53.
    Then setup the admin account on port 3000, then change it to port 80. To use the
    DHCP feature, you must also open ports 67/udp 68/tcp-udp.
