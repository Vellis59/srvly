metadata:
  name: LibreTranslate
  version: latest
  description: LibreTranslate is a free and open-source machine translation app that
    is entirely self-hosted. Unlike other translation apps, it does not rely on proprietary
    providers such as Google or Azure to perform translations. Instead, its translation
    engine is powered by the open-source Argos Translate library. LibreTranslate can
    translate text between different languages, auto-detect the language of the input
    text, and even handle HTML content. It provides a simple and intuitive interface
    for users to input the text they want to translate, select the source and target
    languages, and get the translated text. With LibreTranslate, you can enjoy a reliable,
    accurate, and privacy-friendly translation service right at your fingertips.
  category: translation
  tags:
  - Translation
  - API
  - Open Source
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: libretranslate/libretranslate:v1.9.5
  port:
    type: integer
    title: Port HTTP
    default: 5000
  version:
    type: string
    title: Version
    default: latest
links:
- label: Documentation
  url: https://github.com/LibreTranslate/LibreTranslate/blob/master/README.md
- label: Github
  url: https://github.com/LibreTranslate/LibreTranslate
instructions: null
install:
- docker:
    image: $IMAGE
    name: libretranslate
    port: $PORT:5000
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
