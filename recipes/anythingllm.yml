metadata:
  name: Anything-LLM
  version: latest
  description: Anything-LLM is an open-source, AI-powered platform that enables users
    to leverage Large Language Models (LLMs) for creating, managing, and querying
    custom knowledge bases. It provides seamless integration with OpenAI services,
    offering a robust, flexible, and extensible environment for LLM-driven applications.
    Ideal for developers and organizations, Anything-LLM streamlines the deployment
    of intelligent AI solutions.
  category: large-language-models
  tags:
  - Large Language Models
  - Knowledge Base
  - OpenAI Integration
  - Customizable
  - Open Source
  - AI-Powered
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: mintplexlabs/anythingllm:1.12
  port:
    type: integer
    title: Port HTTP
    default: 3001
links:
- label: Website
  url: https://anythingllm.com/
- label: Compose Docs
  url: https://docs.anythingllm.com/installation-docker/local-docker
- label: Documentation
  url: https://docs.anythingllm.com/
- label: Github
  url: https://github.com/mintplex-labs/anything-llm
instructions: null
install:
- docker:
    image: $IMAGE
    name: anythingllm
    port: $PORT:3001
    volumes:
    - /app/server/storage
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
