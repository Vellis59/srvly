metadata:
  name: NodeBB
  version: latest
  description: NodeBB is a next-generation forum software that is powerful, mobile-ready,
    and easy to use. It is designed to provide a modern platform for your audience,
    fostering engagement and retaining customers. With NodeBB, you can enjoy a perfect
    experience on every device and screen, thanks to its mobile-first software. It
    offers built-in localization support with over 50 languages actively translated,
    making it a truly global platform. NodeBB is also search optimized with human-readable
    URLs, semantic HTML with embedded microdata, and more. It allows for social media
    integration, bringing more visitors to your community by sharing content to Facebook,
    Google, and Twitter. NodeBB also offers real-time interaction with instant notifications,
    streaming posts, and real-time chats. It comes with a native analytics dashboard
    so you can know what content your users enjoy most. Whether you're a self-starter,
    a growing business, or a large corporation, NodeBB has a plan that works best
    for you.
  category: forums
  tags:
  - Forums
  - Communication
  - Mobile-first
  - Real-time
  - Analytics
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: nodebb/docker:2.8.11
  port:
    type: integer
    title: Port HTTP
    default: 4567
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://nodebb.org/
- label: Documentation
  url: https://docs.nodebb.org/
- label: Github
  url: https://github.com/NodeBB/NodeBB
- label: Demo
  url: https://try.nodebb.org/
instructions: null
install:
- docker:
    image: $IMAGE
    name: nodebb
    port: $PORT:4567
    volumes:
    - /usr/src/app
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
