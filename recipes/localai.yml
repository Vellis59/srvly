metadata:
  name: LocalAI
  version: latest
  description: LocalAI is a drop-in replacement REST API that's compatible with OpenAI
    API specifications for local inferencing. It allows you to run LLMs, generate
    images, audio (and not only) locally or on-premises with consumer grade hardware,
    supporting multiple model families and not requiring GPU.
  category: ai
  tags:
  - AI
  - LLM
  - OpenAI
  - Local Inference
  - Machine Learning
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: localai/localai:v2.29.0-aio-cpu
  port:
    type: integer
    title: Port HTTP
    default: 8080
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://localai.io/
- label: Documentation
  url: https://localai.io/docs/
- label: Github
  url: https://github.com/mudler/LocalAI
instructions: null
install:
- docker:
    image: $IMAGE
    name: localai
    port: $PORT:8080
    volumes:
    - /build/models
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
