metadata:
  name: Shaarli
  version: latest
  description: Shaarli is a personal, minimalist, super-fast, and database-free bookmarking
    service. It allows you to manage and share the links you discover, making it an
    ideal tool for those who frequently come across interesting content on the web.
    With Shaarli, you can share, comment, and save links, use it as a minimal blog
    or writing platform, or even as a read-it-later/todo list. It also serves as a
    notepad for drafting and saving articles, posts, or ideas, and a knowledge base
    for keeping notes, documentation, and code snippets. You can edit, view, and search
    your links, organize them with tags, and even generate ATOM and RSS feeds. Shaarli
    is self-hosted, meaning you install it on your own server, ensuring your data
    remains yours. It's an excellent alternative to commercial services, and it's
    free and open-source.
  category: bookmarks
  tags:
  - Bookmarks
  - Documentation
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/shaarli/shaarli:v0.16.1
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: Documentation
  url: https://demo.shaarli.org/doc/html/index.html
- label: Github
  url: https://github.com/shaarli/Shaarli
instructions: null
install:
- docker:
    image: $IMAGE
    name: shaarli
    port: $PORT:80
    volumes:
    - /var/www/shaarli/cache
    - /var/www/shaarli/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
