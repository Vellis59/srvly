metadata:
  name: Ntfy
  version: latest
  description: ntfy, pronounced as 'notify', is a simple, HTTP-based pub-sub notification
    service that allows you to send push notifications to your phone or desktop from
    any computer. It operates via scripts using simple HTTP PUT or POST requests.
    This makes it a handy tool for notifying yourself when scripts fail or when long-running
    commands complete. To use ntfy, you simply need to install the app on your phone,
    subscribe to a topic of your choice, and start sending messages to your topic.
    The app is available on Google Play, F-Droid, and the App Store. ntfy is open-source
    and free to use, but also offers paid plans for those who wish to support its
    development.
  category: notifications
  tags:
  - Notifications
  - Push Notifications
  - Mobile Notifications
  - Desktop Notifications
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: binwiederhier/ntfy:v2.22
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Documentation
  url: https://docs.ntfy.sh
- label: Github
  url: https://github.com/binwiederhier/ntfy
instructions: null
install:
- docker:
    image: $IMAGE
    name: ntfy
    port: $PORT:80
    volumes:
    - /var/cache/ntfy
    - /etc/ntfy
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
