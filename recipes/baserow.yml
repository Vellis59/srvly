metadata:
  name: Baserow
  version: latest
  description: Baserow is an open-source, no-code database tool that allows you to
    create your own online database without any technical experience. It is a user-friendly
    alternative to Airtable, offering the power of a developer right from your browser.
    Baserow is perfect for organizing your projects, ideas, or business processes,
    allowing you to structure everything according to your needs. It is a flexible
    software that can be tailored to your needs, ensuring clear and accessible data
    for all your team members. With Baserow, you can easily integrate with other software,
    collaborate in real-time, and enjoy unlimited rows for your data. It is also developer-friendly,
    allowing for the creation of custom plugins. Baserow offers a free plan for those
    who want to try it out, as well as premium and advanced plans for users with more
    advanced needs.
  category: no-code
  tags:
  - No-Code
  - Databases
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: baserow/baserow:1.34.2
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://baserow.io/
- label: Gitlab
  url: https://gitlab.com/bramw/baserow
instructions: It may take several minutes for Baserow to boot up.
install:
- docker:
    image: $IMAGE
    name: baserow
    port: $PORT:80
    volumes:
    - /baserow/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: It may take several minutes for Baserow to boot up.
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
