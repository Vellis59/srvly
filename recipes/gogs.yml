metadata:
  name: Gogs
  version: latest
  description: Gogs is a self-hosted Git service designed to be simple, stable, and
    extensible. It allows you to set up your own Git service in the most painless
    way possible. The app is built with Go, enabling it to run on all platforms that
    Go supports, including Linux, macOS, Windows, and ARM-based systems. Gogs is lightweight
    and has low minimal requirements, making it possible to run even on an inexpensive
    Raspberry Pi. It offers a range of features including user dashboard, access to
    repositories via SSH, HTTP and HTTPS protocols, repository and organization management,
    and more. Gogs is 100% open source and free of charge, with all source code available
    under the MIT License.
  category: code-hosting
  tags:
  - Code Hosting
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: gogs/gogs:0.14.2
  port:
    type: integer
    title: Port HTTP
    default: 22
links:
- label: Website
  url: https://gogs.io/
- label: Documentation
  url: https://gogs.io/docs
- label: Github
  url: https://github.com/gogs/gogs
instructions: null
install:
- docker:
    image: $IMAGE
    name: gogs
    port: $PORT:22
    volumes:
    - /data
    - /backup
    extra_ports:
    - 3000:3000
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
