metadata:
  name: Matomo
  version: latest
  description: Matomo is a powerful web analytics platform that allows you to take
    full control of your data. As a leading global web analytics solution, it is trusted
    on over 1 million websites across more than 190 countries. Matomo provides an
    ethical alternative to other analytics platforms, ensuring the protection of your
    data and your customers' privacy. With Matomo, you have 100% data ownership, meaning
    you know exactly where your data is stored and what's happening to it. The platform
    offers a comprehensive range of features that provide actionable insights and
    a complete picture of your customers. It allows you to securely track personal
    data in accordance with privacy laws, and offers 100% accurate reporting for impactful
    decision-making. Matomo can be customised and extended to meet your every need,
    and it comes with no data limitations, allowing for an unlimited number of websites,
    users, and segments.
  category: analytics
  tags:
  - Analytics
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: matomo:5.7.1
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://matomo.org/
- label: Documentation
  url: https://matomo.org/guide/installation-maintenance/matomo-on-premise-self-hosted/
- label: Github
  url: https://github.com/matomo-org/matomo
instructions: null
install:
- docker:
    image: $IMAGE
    name: matomo
    port: $PORT:80
    volumes:
    - /var/www/html
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  mysql:
    type: mysql
    version: latest
