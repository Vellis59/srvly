metadata:
  name: Shynet
  version: latest
  description: Shynet is a powerful, open-source analytics tool designed to provide
    you with clear, comprehensive insights about your website's traffic and user behavior.
    Unlike traditional analytics platforms, Shynet respects user privacy and does
    not track individual users across websites. Instead, it focuses on providing aggregate
    data and trends, helping you understand how users interact with your website as
    a whole. Shynet offers a range of features including real-time analytics, session
    tracking, and primary key integration. It also supports single-page applications,
    ensuring you get accurate data even when users navigate between pages within your
    application. With Shynet, you can easily create and manage multiple services,
    each with its own unique tracking script. The app also offers an API, allowing
    you to access all the information displayed on the dashboard programmatically.
    Whether you're a small business owner, a web developer, or a data analyst, Shynet
    provides you with the tools you need to make informed decisions about your website.
  category: analytics
  tags:
  - Analytics
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: milesmcc/shynet:v0.13.1
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: Documentation
  url: https://github.com/milesmcc/shynet/blob/master/GUIDE.md
- label: Github
  url: https://github.com/milesmcc/shynet/
instructions: Open a console session and run ./manage.py createsuperuser to create
  your administrator account
install:
- docker:
    image: $IMAGE
    name: shynet
    port: $PORT:8080
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Open a console session and run ./manage.py createsuperuser to create your
    administrator account
services:
  postgres:
    type: postgres
    version: latest
