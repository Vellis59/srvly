metadata:
  name: Sourcegraph
  version: latest
  description: Sourcegraph is a universal code search and intelligence platform designed
    to help developers find, explore, and understand code across all repositories.
    It enables teams to improve productivity and code quality by providing a centralized
    interface for searching, navigating, and understanding codebases. Sourcegraph
    supports multiple version control systems, languages, and integrations, making
    it a powerful tool for developers, DevOps, and enterprises. With features like
    code insights, precise code navigation, and batch changes, Sourcegraph enhances
    collaboration and streamlines development workflows.
  category: code-search
  tags:
  - Code Search
  - Developer Tools
  - Productivity
  - Open Source
  - Collaboration
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: sourcegraph/server:6.12.5040
  port:
    type: integer
    title: Port HTTP
    default: 3370
links:
- label: Github
  url: https://github.com/sourcegraph
- label: Documentation
  url: https://docs.sourcegraph.com
- label: Demo
  url: https://sourcegraph.com
instructions: Once the server is ready (logo is displayed in the terminal), navigate
  to the hostname or IP address on port 7080. Create the admin account, then you'll
  be guided through setting up Sourcegraph for code searching and navigation.
install:
- docker:
    image: $IMAGE
    name: sourcegraph
    port: $PORT:3370
    volumes:
    - /etc/sourcegraph
    - /var/opt/sourcegraph
    extra_ports:
    - 7080:7080
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Once the server is ready (logo is displayed in the terminal), navigate to
    the hostname or IP address on port 7080. Create the admin account, then you'll
    be guided through setting up Sourcegraph for code searching and navigation.
