metadata:
  name: Bytebin
  version: latest
  description: Bytebin is a fast, lightweight, and simple pastebin service for sharing
    text and code snippets. Built with performance in mind, it provides an easy way
    to store and share content through unique URLs. Bytebin is designed to be minimalistic
    and efficient, making it perfect for developers who need a straightforward solution
    for sharing code, logs, or text data with automatic expiration and configurable
    storage limits.
  category: pastebin
  tags:
  - Pastebin
  - Code Sharing
  - Text Storage
  - API
  - Developer Tools
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/lucko/bytebin:latest
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: GitHub
  url: https://github.com/lucko/bytebin
- label: Documentation
  url: https://github.com/lucko/bytebin#readme
instructions: Bytebin exposes a simple HTTP API on port 8080. After deployment, open
  GET /health for a quick health check, POST /post with your content in the request
  body to create a paste. Data is persisted in /opt/bytebin/content and /opt/bytebin/db,
  so existing keys survive restarts and upgrades. Adjust BYTEBIN_MISC_KEYLENGTH and
  BYTEBIN_CONTENT_MAXSIZE if you need longer keys or larger payload limits.
install:
- docker:
    image: $IMAGE
    name: bytebin
    port: $PORT:8080
    volumes:
    - /opt/bytebin/content
    - /opt/bytebin/db
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Bytebin exposes a simple HTTP API on port 8080. After deployment, open GET
    /health for a quick health check, POST /post with your content in the request
    body to create a paste. Data is persisted in /opt/bytebin/content and /opt/bytebin/db,
    so existing keys survive restarts and upgrades. Adjust BYTEBIN_MISC_KEYLENGTH
    and BYTEBIN_CONTENT_MAXSIZE if you need longer keys or larger payload limits.
