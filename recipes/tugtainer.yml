metadata:
  name: Tugtainer
  version: latest
  description: Tugtainer is a self-hosted Docker container management application
    that provides a web-based interface for managing Docker containers and images.
    Built with modern architecture, Tugtainer offers comprehensive container management
    capabilities including container lifecycle management, image management, and network
    configuration. The system uses a secure socket proxy service to safely access
    the Docker socket, providing an additional layer of security. Perfect for developers
    and system administrators looking for a self-hosted alternative to manage Docker
    containers with a user-friendly interface.
  category: docker
  tags:
  - Docker
  - Container Management
  - Self-Hosted
  - Management
  - DevOps
  - Infrastructure
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/quenary/tugtainer:v1.29.1
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: GitHub
  url: https://github.com/quenary/tugtainer
instructions: null
install:
- docker:
    image: $IMAGE
    name: tugtainer
    port: $PORT:80
    volumes:
    - /var/run/docker.sock
    - /tugtainer
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
