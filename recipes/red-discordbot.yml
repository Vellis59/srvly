metadata:
  name: Red-DiscordBot
  version: latest
  description: Red-DiscordBot is a fully modular bot for Discord, designed to be easy
    to use and highly customizable. It features a robust command system, extensive
    documentation, and a large collection of community-created cogs (modules). The
    bot supports features like moderation, music playback, games, utility functions,
    and much more. With its modular design, users can easily add or remove functionality
    by loading and unloading cogs, making it perfect for both small and large Discord
    communities.
  category: discord
  tags:
  - Discord
  - Bot
  - Automation
  - Community
  - Chat
  - Dashboard
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: phasecorex/red-discordbot:audio-py311
  port:
    type: integer
    title: Port HTTP
    default: 80
  version:
    type: string
    title: Version
    default: latest
links:
- label: GitHub
  url: https://github.com/Cog-Creators/Red-DiscordBot
- label: Documentation
  url: https://docs.discord.red/
- label: Docker Hub
  url: https://hub.docker.com/r/phasecorex/red-discordbot
instructions: null
install:
- docker:
    image: $IMAGE
    name: red-discordbot
    port: $PORT:80
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
