metadata:
  name: Unsend
  version: latest
  description: Unsend is a self-hosted, alternative email-sending platform that provides
    a reliable and cost-effective way to send emails using Amazon SES. With a powerful
    dashboard, Unsend allows users to manage contacts, send bulk emails (such as newsletters
    and product updates), and handle subscriptions seamlessly. Future updates aim
    to support additional communication channels, including SMS, push notifications,
    and WhatsApp.
  category: email
  tags:
  - Email
  - Self-Hosted
  - Amazon SES
  - Bulk Email
  - Productivity
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/unsend-dev/unsend:v1.5.5
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Documentation
  url: https://unsend.dev/
- label: Github
  url: https://github.com/unsend-dev/unsend/tree/main
instructions: You can use Minio for S3 Compatibility and provide AWS like credentials
  for it.
install:
- docker:
    image: $IMAGE
    name: unsend
    port: $PORT:3000
    volumes:
    - /data
    - /data
    extra_ports:
    - 9000:9000
    - 9001:9001
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: You can use Minio for S3 Compatibility and provide AWS like credentials for
    it.
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
