metadata:
  name: Domain Locker
  version: latest
  description: Domain Locker is a self-hosted domain portfolio management and monitoring
    application designed to help you keep track of all your registered domains. It
    provides centralized management for domain registrations, expiration dates, renewal
    reminders, DNS records, SSL certificates, and hosting information. Domain Locker
    features automated WHOIS lookups, expiration notifications via email, domain health
    checks, and comprehensive reporting. With scheduled updates and monitoring, you'll
    never miss a domain renewal deadline again. The application includes automatic
    daily checks for domain updates and sends timely expiration reminders. Perfect
    for domain investors, web developers, agencies, and anyone managing multiple domain
    portfolios who needs a reliable system to track and monitor their digital assets.
  category: domain-management
  tags:
  - Domain Management
  - Domain Monitoring
  - WHOIS
  - DNS
  - Domain Portfolio
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: lissy93/domain-locker:0.1.4
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Github
  url: https://github.com/Lissy93/domain-locker
- label: Website
  url: https://domain-locker.com
- label: Documentation
  url: https://domain-locker.com/about
instructions: null
install:
- docker:
    image: $IMAGE
    name: domainlocker
    port: $PORT:3000
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
