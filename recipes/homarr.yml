metadata:
  name: Homarr
  version: latest
  description: Homarr is a powerful dashboard designed to simplify the management
    of your server. It provides a sleek, modern interface that brings all your apps
    and services together in one place, allowing you to access and control everything
    with ease. Homarr seamlessly integrates with the apps you've added, offering valuable
    insights and complete control. You can add your self-hosted applications or favorite
    websites to your dashboard and organize them as you like. Homarr supports integration
    with many popular applications to enhance your user experience. It is customizable,
    accessible, and supports 23 languages. With Homarr, you can control and monitor
    your network directly, use integrations to display data and control apps, and
    even create your own dashboard using a comprehensible and easy-to-use visual editor.
    Homarr is open-source and allows commercial usage. It features a quick search
    function to easily navigate through your apps and supported integrations.
  category: dashboard
  tags:
  - Dashboard
  - Homepage
  - Self-hosted
  - Widgets
  - Bookmarks
  - Monitoring
  - Customizable
  - Web App
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/homarr-labs/homarr:v1.59.3
  port:
    type: integer
    title: Port HTTP
    default: 7574
links:
- label: Website
  url: https://homarr.dev
- label: GitHub
  url: https://github.com/homarr-labs/homarr
- label: Documentation
  url: https://homarr.dev/docs/getting-started/
- label: Easypanel Documentation
  url: https://homarr.dev/docs/getting-started/installation/easy-panel
instructions: On first launch, Homarr will display an onboarding wizard. Create your
  admin account to get started.
install:
- docker:
    image: $IMAGE
    name: homarr
    port: $PORT:7574
    volumes:
    - /appdata
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: On first launch, Homarr will display an onboarding wizard. Create your admin
    account to get started.
