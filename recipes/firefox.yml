metadata:
  name: Firefox
  version: latest
  description: Firefox Browser, also known as Mozilla Firefox or simply Firefox, is
    a free and open-source web browser developed by the Mozilla Foundation and its
    subsidiary, the Mozilla Corporation. This app allows you to deploy and run Firefox
    in a containerized environment, providing a secure and isolated space for your
    browsing activities. Firefox uses the Gecko layout engine to render web pages,
    implementing current and anticipated web standards. The app supports multiple
    architectures and can be accessed via HTTP or HTTPS. It also offers additional
    environment variables and run configurations to enable or disable specific functionalities.
    This containerized version of Firefox is capable of delivering a true lossless
    image at a high framerate to your web browser, providing an optimal browsing experience.
  category: web-browsers
  tags:
  - Web Browsers
  - Internet
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: lscr.io/linuxserver/firefox:1150.0.1
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Documentation
  url: https://docs.linuxserver.io/images/docker-firefox
- label: Github
  url: https://github.com/linuxserver/docker-firefox
instructions: use abc:abc to login. To access the login interface, add ?login=true
  to your URL.
install:
- docker:
    image: $IMAGE
    name: firefox
    port: $PORT:3000
    volumes:
    - /config
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: use abc:abc to login. To access the login interface, add ?login=true to your
    URL.
