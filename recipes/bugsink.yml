metadata:
  name: Bugsink
  version: latest
  description: Bugsink is a self-hosted error tracking system compatible with Sentry
    SDKs.
  category: error-tracking
  tags:
  - Error Tracking
  - Self-Hosted
  - Monitoring
  - Sentry Compatible
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: bugsink/bugsink:2.1.3
  port:
    type: integer
    title: Port HTTP
    default: 8000
links:
- label: Website
  url: https://www.bugsink.com/
- label: Github
  url: https://github.com/bugsink/bugsink
- label: Documentation
  url: https://www.bugsink.com/docs/
instructions: null
install:
- docker:
    image: $IMAGE
    name: bugsink
    port: $PORT:8000
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  mysql:
    type: mysql
    version: latest
