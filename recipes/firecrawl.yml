metadata:
  name: Firecrawl
  version: latest
  description: Firecrawl is an API service that takes a URL, crawls it, and converts
    it into clean markdown or structured data. It crawls all accessible subpages and
    gives you clean data for each. No sitemap required. Featuring advanced scraping,
    crawling, and data extraction capabilities with LLM-ready formats, anti-bot mechanisms,
    dynamic content handling, and powerful customization options. Perfect for AI applications,
    data extraction, and web automation.
  category: web-scraping
  tags:
  - Web Scraping
  - Data Extraction
  - AI
  - LLM
  - Crawler
  - API
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/firecrawl/firecrawl:latest
  port:
    type: integer
    title: Port HTTP
    default: 3002
links:
- label: Website
  url: https://firecrawl.dev/
- label: GitHub
  url: https://github.com/firecrawl/firecrawl
- label: Documentation
  url: https://docs.firecrawl.dev/
instructions: 'After deployment, access Firecrawl at the main domain on port 3002.
  The API

  runs in standalone mode with Redis, RabbitMQ, and NuQ Postgres. Use a fresh

  deployment so the nuq-postgres image can run its init script and create the

  nuq schema. If you see "relation nuq.queue_scrape does not exist", delete the

  nuq-postgres volume and redeploy to re-run the schema setup.

  '
install:
- docker:
    image: $IMAGE
    name: firecrawl
    port: $PORT:3002
    volumes:
    - /app/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: 'After deployment, access Firecrawl at the main domain on port 3002. The
    API

    runs in standalone mode with Redis, RabbitMQ, and NuQ Postgres. Use a fresh

    deployment so the nuq-postgres image can run its init script and create the

    nuq schema. If you see "relation nuq.queue_scrape does not exist", delete the

    nuq-postgres volume and redeploy to re-run the schema setup.

    '
services:
  postgres:
    type: postgres
    version: latest
  redis:
    type: redis
    version: '7'
