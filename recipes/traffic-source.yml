metadata:
  name: Traffic Source
  version: latest
  description: Traffic Source is an open-source, self-hosted web analytics platform
    for tracking pageviews, referrers, UTM attribution, visitor journeys, and conversions.
    It is cookie-free by default, supports multi-site tracking, and stores data locally
    in SQLite so you keep full ownership. It also includes affiliate tracking and
    Stripe conversion syncing.
  category: analytics
  tags:
  - Analytics
  - Web Analytics
  - Privacy
  - Self-Hosted
  - Marketing
  - Attribution
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ''
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Website
  url: https://trafficsource.app
- label: GitHub
  url: https://github.com/mddanishyusuf/traffic-source
- label: Documentation
  url: https://github.com/mddanishyusuf/traffic-source#readme
instructions: 'After deploy, open the app and create the first user (registration
  is only

  available for the first account). Then create a site and add the tracking

  script snippet from your instance to your website. For geo data, place the

  app behind Cloudflare proxy as documented upstream.

  '
install:
- docker:
    image: $IMAGE
    name: traffic-source
    port: $PORT:3000
    volumes:
    - /app/data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: 'After deploy, open the app and create the first user (registration is only

    available for the first account). Then create a site and add the tracking

    script snippet from your instance to your website. For geo data, place the

    app behind Cloudflare proxy as documented upstream.

    '
