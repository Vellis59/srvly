metadata:
  name: Claper
  version: latest
  description: Claper is an interactive presentation platform that transforms passive
    presentations into engaging, real-time experiences.  With Claper, presenters can
    create interactive presentations that allow audience members to participate through
    live polls,  Q&A sessions, reactions, and more. The platform offers seamless integration
    with popular presentation tools and provides  real-time analytics to help presenters
    understand audience engagement. Claper supports various presentation formats,  file
    uploads, and customizable branding options, making it perfect for conferences,
    webinars, educational sessions,  and corporate meetings.
  category: presentation
  tags:
  - Presentation
  - Interactive
  - Collaboration
  - Analytics
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/claperco/claper:2.4.0
  port:
    type: integer
    title: Port HTTP
    default: 4000
links:
- label: Website
  url: https://claper.co/
- label: Documentation
  url: https://docs.claper.co/
- label: Github
  url: https://github.com/ClaperCo/Claper
instructions: Click Login on the top right corner and register a new account.
install:
- docker:
    image: $IMAGE
    name: claper
    port: $PORT:4000
    volumes:
    - /app/uploads
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: Click Login on the top right corner and register a new account.
services:
  postgres:
    type: postgres
    version: latest
