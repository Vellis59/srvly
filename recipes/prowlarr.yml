metadata:
  name: Prowlarr
  version: latest
  description: Prowlarr is a powerful indexer manager and proxy designed to integrate
    with various PVR applications. It is built on the popular arr .net/reactjs base
    stack, offering a seamless experience for users. Prowlarr supports the management
    of both Torrent Trackers and Usenet Indexers, eliminating the need for per app
    Indexer setup. It works in harmony with LazyLibrarian, Lidarr, Mylar3, Radarr,
    Readarr, and Sonarr, providing comprehensive management of your indexers. The
    app includes features such as Usenet support for 24 indexers natively, Torrent
    support for over 500 trackers, support for custom YML definitions, Indexer Sync
    to various apps, manual searching of Trackers & Indexers, and much more. Prowlarr
    also provides Indexer health and status notifications and supports multiple releases
    pushing directly to your download clients.
  category: indexer-manager
  tags:
  - Indexer Manager
  - Proxy
  - PVR Apps
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: linuxserver/prowlarr:1.37.0
  port:
    type: integer
    title: Port HTTP
    default: 9696
links:
- label: Website
  url: https://prowlarr.com/
- label: Documentation
  url: https://wiki.servarr.com/prowlarr
- label: Github
  url: https://github.com/Prowlarr/Prowlarr/
instructions: null
install:
- docker:
    image: $IMAGE
    name: prowlarr
    port: $PORT:9696
    volumes:
    - /config
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
