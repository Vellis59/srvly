metadata:
  name: Appwrite
  version: latest
  description: Appwrite is an open-source backend as a service server that abstracts
    and simplifies complex and repetitive development tasks behind a very simple to
    use REST API.
  category: self-hosted
  tags: []
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: ''
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://appwrite.io
- label: Documentation
  url: https://appwrite.io/docs
- label: Github
  url: https://github.com/appwrite/appwrite
instructions: null
install:
- docker:
    image: $IMAGE
    name: appwrite
    port: $PORT:80
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
