metadata:
  name: PortNote
  version: latest
  description: PortNote is a self-hosted port tracking application that helps you
    keep track of used ports across your servers and VMs. Stop juggling spreadsheets
    and guessing which service uses which port — PortNote gives you a clear, organized
    view of your entire port landscape. Add your servers via a sleek web interface,
    assign and document port usage across all systems, and avoid conflicts before
    they happen.
  category: port-tracking
  tags:
  - Port Tracking
  - Infrastructure Management
  - Self-Hosted
  - Web Interface
  - PostgreSQL
  - JWT Authentication
  - DevOps
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ''
  port:
    type: integer
    title: Port HTTP
    default: 3000
links:
- label: Github
  url: https://github.com/crocofied/PortNote
instructions: null
install:
- docker:
    image: $IMAGE
    name: portnote
    port: $PORT:3000
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
