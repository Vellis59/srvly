metadata:
  name: Mattermost
  version: latest
  description: Mattermost is a secure collaboration platform designed to enhance the
    efficiency and productivity of technical and operational teams. It offers a range
    of features including team messaging, custom integrations, audio and screen sharing,
    and workflow automation. Mattermost is designed to improve time to response by
    90%, decrease incident resolution time, and increase information availability
    by executing complex workflows faster and at a higher quality. It also helps in
    avoiding costly outages and downtime by decreasing the frequency and severity
    of system failures. The platform is built for enterprise scalability and can be
    deployed in air gapped networks and BYOD environments. It is also cloud neutral
    and offers self-host deployment options. Mattermost is open source and can be
    customized to fit your workflow with robust integrations or by building your own
    with its App Framework, Plugins, and open APIs.
  category: chat
  tags:
  - Chat
  - Collaboration
  - Security
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: mattermost/mattermost-team-edition:11.7.1
  port:
    type: integer
    title: Port HTTP
    default: 8065
  version:
    type: string
    title: Version
    default: latest
links:
- label: Website
  url: https://mattermost.com/
- label: Github
  url: https://github.com/mattermost/
instructions: null
install:
- docker:
    image: $IMAGE
    name: mattermost
    port: $PORT:8065
    volumes:
    - /mattermost/data
    - /mattermost/logs
    - /mattermost/config
    - /mattermost/plugins
    - /mattermost/client/plugins
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
