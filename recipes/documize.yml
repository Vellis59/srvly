metadata:
  name: Documize
  version: latest
  description: Documize Zerabase is a powerful business tool designed to manage product
    delivery and insight discovery. It serves as a Product Engineering Hub, unifying
    product plans, assets, documents, app analytics, and customer conversations. This
    remarkable offline-first desktop software becomes your product headquarters, centralizing
    content and information for everyone to see and act upon, making it a game-changer
    for product teams. On the other hand, the Community feature of Documize offers
    a simple, delightful way to capture and share knowledge management. It covers
    processes, guidelines, manuals, and everything in-between, allowing you to document
    your business with ease. It's designed for both technical and non-technical users,
    organizing content through labels, spaces, and categories. The Community+ edition
    offers advanced capabilities such as content approval workflows, content organization,
    version management, lifecycle management, feedback capture, PDF export, analytics,
    reporting, and more.
  category: documentation
  tags:
  - Documentation
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - postgres
params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/easypanel-community/docker-documize:5.13
  port:
    type: integer
    title: Port HTTP
    default: 80
links:
- label: Website
  url: https://documize.com
- label: Documentation
  url: https://docs.documize.com/docs
- label: Github
  url: https://github.com/documize/community
instructions: null
install:
- docker:
    image: $IMAGE
    name: documize
    port: $PORT:80
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
services:
  postgres:
    type: postgres
    version: latest
