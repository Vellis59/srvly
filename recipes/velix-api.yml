metadata:
  name: Velix API
  version: latest
  description: Velix is a self-hosted WhatsApp API built in Go. Connect multiple WhatsApp numbers, send and receive messages via REST, get real-time webhooks, and integrate with n8n and Chatwoot out of the box.
  category: messaging
  tags:
  - WhatsApp
  - Messaging
  - API
  - Self-Hosted
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image
    default: ghcr.io/velix-api/velix-api:latest
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: GitHub
  url: https://github.com/velix-api/velix-api
install:
- docker:
    image: $IMAGE
    name: velix-api
    port: $PORT:8080
    volumes:
    - /data
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
