metadata:
  name: Shlink
  version: latest
  description: Shlink is an open-source URL shortener that allows you to create a
    short URL for your website. It provides a simple and intuitive interface that
    allows you to create a short URL for your website.
  category: url-shortener
  tags:
  - URL Shortener
  - Analytics
  - Developer Tools
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
  - mysql
params:
  image:
    type: string
    title: Image Docker
    default: shlinkio/shlink:5.0.2
  port:
    type: integer
    title: Port HTTP
    default: 8080
links:
- label: Website
  url: https://shlink.io/
- label: Documentation
  url: https://shlink.io/documentation/
- label: Github
  url: https://github.com/shlinkio/shlink
instructions: To use this service we need a license key. Create an Account for GeoLite2,
  Generate a license key, and add it.
install:
- docker:
    image: $IMAGE
    name: shlink
    port: $PORT:8080
    volumes: []
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: To use this service we need a license key. Create an Account for GeoLite2,
    Generate a license key, and add it.
services:
  mysql:
    type: mysql
    version: latest
