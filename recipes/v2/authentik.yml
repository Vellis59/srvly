metadata:
  name: "Authentik"
  description: |
    Authentik is a versatile identity provider and single sign-on (SSO) solution that supports all major authentication protocols.
    It provides LDAP, OAuth2, OIDC, SAML, and SCIM support, with a flexible policy engine, flows, and self-service account management.
    It is a powerful self-hosted alternative to Okta, Keycloak, or Azure AD for centralized identity management.
  category: security
  subcategory: auth-sso
  tags: [Authentication, SSO, Identity Provider, OAuth, LDAP]
  version: "latest"
  homepage: https://goauthentik.io
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/authentik.svg
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: true
    mysql: false
    redis: true
    mongodb: false
  ports: [9090]
  resources:
    ram: 1024
    disk: 5

install:
  docker:
    image: ghcr.io/goauthentik/server:latest
    name: authentik
    port: "9090:9000"
    volumes:
      - /opt/srvly/apps/authentik/media:/media
      - /opt/srvly/apps/authentik/custom-templates:/templates
    env:
      - key: AUTHENTIK_REDIS__HOST
        value: authentik-redis
      - key: AUTHENTIK_POSTGRESQL__HOST
        value: authentik-postgres
      - key: AUTHENTIK_POSTGRESQL__NAME
        value: authentik
      - key: AUTHENTIK_POSTGRESQL__USER
        value: authentik
      - key: AUTHENTIK_POSTGRESQL__PASSWORD
        value: "***"
      - key: AUTHENTIK_SECRET_KEY
        value: "***"

agent_install:
  network: srvly-authentik
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed authentik, authentik-postgres, or authentik-redis containers before retrying."
  prerequisites:
    - type: postgres
      name: authentik-postgres
      image: postgres:16-alpine
      container: authentik-postgres
      database: authentik
      user: authentik
      password: generate
      volume: /opt/srvly/apps/authentik/postgres:/var/lib/postgresql/data
      port: 5432
      env:
        POSTGRES_DB: authentik
        POSTGRES_USER: authentik
        POSTGRES_PASSWORD: $GENERATED_PASSWORD
    - type: redis
      name: authentik-redis
      image: redis:7-alpine
      container: authentik-redis
      volume: /opt/srvly/apps/authentik/redis:/data
      port: 6379
  app_env:
    AUTHENTIK_REDIS__HOST: "authentik-redis"
    AUTHENTIK_POSTGRESQL__HOST: "authentik-postgres"
    AUTHENTIK_POSTGRESQL__NAME: "authentik"
    AUTHENTIK_POSTGRESQL__USER: "authentik"
    AUTHENTIK_POSTGRESQL__PASSWORD: "***"
    AUTHENTIK_SECRET_KEY: "***"
  post_install:
    - "Create the Docker network before all containers and attach Postgres, Redis, and the app to it."
    - "Start Postgres and Redis first before starting the app."
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 9090
  path: /-/health/ready
  expected: [200]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/goauthentik/server:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 9090
    description: "Host port for the Authentik web UI"

links:
  - label: Website
    url: https://goauthentik.io
  - label: GitHub
    url: https://github.com/goauthentik/authentik
  - label: Documentation
    url: https://docs.goauthentik.io

notes: |
  Authentik requires PostgreSQL and Redis. First-run setup creates the admin account through the web UI.
