metadata:
  name: "Drizzle Gateway"
  description: |
    Drizzle Gateway is a lightweight API gateway for managing, routing, and securing microservices APIs with a GraphQL-compatible interface.
    It provides rate limiting, authentication, request transformation, and service discovery for distributed applications.
    It is a practical tool for microservices architectures requiring a lightweight API gateway layer.
  category: dev-infra
  subcategory: api-backend
  tags: [API Gateway, Microservices, GraphQL, Routing]
  version: "latest"
  homepage: https://gateway.drizzle.run
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=D
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3063]
  resources:
    ram: 256
    disk: 1

install:
  docker:
    image: ghcr.io/drizzle-team/gateway:latest
    name: drizzlegateway
    port: "3063:3000"

agent_install:
  network: srvly-drizzlegateway
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed drizzlegateway container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 3063
  path: /health
  expected: [200]
  timeout: 30

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/drizzle-team/gateway:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 3000
    description: "Host port"
links:
  - label: GitHub
    url: https://github.com/drizzle-team/drizzle-gateway
  - label: Documentation
    url: https://github.com/drizzle-team/drizzle-gateway#readme
notes: |
  Drizzle Gateway connects to existing services and databases for API routing and management.
