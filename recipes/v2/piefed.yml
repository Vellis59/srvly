metadata:
  name: "PieFed"
  description: |
    Federated link aggregator and discussion platform. Lemmy-compatible alternative for community discussions and content sharing.
  category: communication
  subcategory: social
  tags: [Social, Fediverse, Links]
  version: "latest"
  homepage: https://join.piefed.social
  icon: https://www.google.com/s2/favicons?domain=join.piefed.social&sz=64
  license: AGPL-3.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/piefed/piefed:latest
    name: piefed
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/piefed/data:/data
    env: []
agent_install:
  network: srvly-piefed
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed piefed container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/piefed/piefed:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://join.piefed.social
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
