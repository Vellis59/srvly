metadata:
  name: "Stirling PDF"
  description: |
    Powerful PDF manipulation tool. Merge, split, compress, convert, OCR, and edit PDF files through a clean web interface.
  category: productivity
  subcategory: documents
  tags: [PDF, Documents, OCR]
  version: "latest"
  homepage: https://www.stirlingpdf.com/
  icon: https://www.google.com/s2/favicons?domain=www.stirlingpdf.com&sz=64
  license: GPL-3.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/stirlingtools/stirling-pdf:latest
    name: stirlingpdf
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/stirlingpdf/data:/data
    env: []
agent_install:
  network: srvly-stirlingpdf
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed stirlingpdf container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/stirlingtools/stirling-pdf:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://www.stirlingpdf.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
