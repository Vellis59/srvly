metadata:
  name: "Emby"
  description: |
    Emby is a media server that organizes, streams, and transcodes movies, TV shows, music, and photos to any device.
    It supports hardware transcoding, user profiles, parental controls, live TV, DVR, plugins, and comprehensive client apps.
    It is a mature media server platform and the commercial predecessor to Jellyfin.
  category: media
  subcategory: video
  tags: [Media Server, Streaming, Video, Music]
  version: "latest"
  homepage: https://emby.media
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/emby.svg
  license: Proprietary
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8099]
  resources:
    ram: 1024
    disk: 5

install:
  docker:
    image: lscr.io/linuxserver/emby:latest
    name: emby
    port: "8099:8096"
    volumes:
      - /opt/srvly/apps/emby/config:/config
      - /opt/srvly/apps/emby/media:/media
    env:
      - key: PUID
        value: "1000"
      - key: PGID
        value: "1000"
      - key: TZ
        value: "Europe/Paris"

agent_install:
  network: srvly-emby
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed emby container before retrying."
  prerequisites: []
  app_env:
    PUID: "1000"
    PGID: "1000"
    TZ: "Europe/Paris"
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8099
  path: /
  expected: [200, 301, 302]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: lscr.io/linuxserver/emby:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8099
    description: "Host port for the Emby web UI"
links:
  - label: Website
    url: https://emby.media
  - label: GitHub
    url: https://github.com/MediaBrowser/Emby
  - label: Documentation
    url: https://emby.media/support
notes: |
  Emby stores its configuration in the config volume. Place media files in the /media volume.
