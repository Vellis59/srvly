metadata:
  name: "PostHog"
  description: |
    Product analytics, session recording, feature flags, and A/B testing. Alternative to Mixpanel, Amplitude, Heap, and HotJar.
  category: productivity
  subcategory: reporting
  tags: [Analytics, Product, Events]
  version: "latest"
  homepage: https://posthog.com
  icon: https://www.google.com/s2/favicons?domain=posthog.com&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/posthog/posthog:latest
    name: posthog
    port: "8000:8000"
    volumes:
      - /opt/srvly/apps/posthog/data:/data
    env: []
agent_install:
  network: srvly-posthog
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed posthog container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/posthog/posthog:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://posthog.com
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
