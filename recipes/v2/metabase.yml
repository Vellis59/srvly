metadata:
  name: "Metabase"
  description: |
    Easy business intelligence and analytics. Connect databases, create dashboards, and ask questions without SQL. Alternative to Tableau and Looker.
  category: productivity
  subcategory: reporting
  tags: [Analytics, BI, Dashboards]
  version: "latest"
  homepage: https://metabase.com/
  icon: https://www.google.com/s2/favicons?domain=metabase.com&sz=64
  license: AGPL-3.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: metabase/metabase:latest
    name: metabase
    port: "3000:3000"
    volumes:
      - /opt/srvly/apps/metabase/data:/data
    env: []
agent_install:
  network: srvly-metabase
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed metabase container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 3000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: metabase/metabase:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 3000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://metabase.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
