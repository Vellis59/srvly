metadata:
  name: "Iceshrimp.NET"
  description: |
    Decentralized social networking platform for the Fediverse. Mastodon-compatible with unique features and performance improvements.
  category: communication
  subcategory: social
  tags: [Social, Fediverse, Mastodon]
  version: "latest"
  homepage: https://iceshrimp.net
  icon: https://www.google.com/s2/favicons?domain=iceshrimp.net&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/iceshrimp/iceshrimp:latest
    name: iceshrimpnet
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/iceshrimpnet/data:/data
    env: []
agent_install:
  network: srvly-iceshrimpnet
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed iceshrimpnet container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/iceshrimp/iceshrimp:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://iceshrimp.net
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
