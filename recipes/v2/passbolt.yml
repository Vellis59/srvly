metadata:
  name: "Passbolt"
  description: |
    Passbolt is a self-hosted application for password managers. Install it on your server for full control over your data.
  category: security
  subcategory: password-manager
  tags: [Passwords, Security]
  version: "latest"
  homepage: https://www.passbolt.com/
  icon: https://www.google.com/s2/favicons?domain=www.passbolt.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/passbolt/passbolt_api:latest
    name: passbolt
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/passbolt/data:/data
    env: []
agent_install:
  network: srvly-passbolt
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed passbolt container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/passbolt/passbolt_api:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://www.passbolt.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
