metadata:
  name: "AdventureLog"
  description: |
    Travel tracker and trip planner. Log adventures on a world map, plan trips collaboratively with 3D map views and itinerary planning.
  category: productivity
  subcategory: finance
  tags: [Travel, Maps, Planning]
  version: "latest"
  homepage: https://adventurelog.app
  icon: https://www.google.com/s2/favicons?domain=adventurelog.app&sz=64
  license: GPL-3.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/seanmorley15/adventurelog-frontend:latest
    name: adventurelog
    port: "8000:8000"
    volumes:
      - /opt/srvly/apps/adventurelog/data:/data
    env: []
agent_install:
  network: srvly-adventurelog
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed adventurelog container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/seanmorley15/adventurelog-frontend:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://adventurelog.app
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
