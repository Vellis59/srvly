metadata:
  name: "Wallos"
  description: |
    Wallos is a simple, self-hosted subscription expense tracking application.
    It tracks recurring subscriptions, displays upcoming payments, shows spending trends, and sends expiration reminders. All data is stored locally in SQLite.
    It is useful for anyone who wants a lightweight, private tool to monitor monthly subscriptions and avoid forgotten renewals.
  category: productivity
  subcategory: finance
  tags: [Subscriptions, Finance, Tracking, Expenses]
  version: "latest"
  homepage: https://github.com/ellite/Wallos
  icon: https://github.com/ellite.png?size=64
  license: GPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8282]
  resources:
    ram: 128
    disk: 1

install:
  docker:
    image: ghcr.io/ellite/wallos:latest
    name: wallos
    port: "8282:80"
    volumes:
      - /opt/srvly/apps/wallos/db:/var/www/html/db
      - /opt/srvly/apps/wallos/logos:/var/www/html/logos

agent_install:
  network: srvly-wallos
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed wallos container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Fetch the rendered HTML and verify that asset URLs are relative or point to the public URL, not localhost."

healthcheck:
  type: http
  port: 8282
  path: /
  expected: [200, 301, 302]
  timeout: 60

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/ellite/wallos:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8282
    description: "Host port for the Wallos web UI"

links:
  - label: GitHub
    url: https://github.com/ellite/Wallos
  - label: Docker Hub
    url: https://github.com/ellite/Wallos/pkgs/container/wallos

notes: |
  Wallos uses SQLite for storage. Database and logo files are persisted in Docker volumes.
