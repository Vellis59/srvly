metadata:
  name: "Frappe Helpdesk"
  description: |
    Frappe Helpdesk is a self-hosted application for ticketing. Install it on your server for full control over your data.
  category: productivity
  subcategory: project-management
  tags: [Tickets, Support]
  version: "latest"
  homepage: https://frappe.io/helpdesk
  icon: https://www.google.com/s2/favicons?domain=frappe.io&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/frappe/helpdesk:latest
    name: frappe-helpdesk
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/frappe-helpdesk/data:/data
    env: []
agent_install:
  network: srvly-frappe-helpdesk
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed frappe-helpdesk container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/frappe/helpdesk:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://frappe.io/helpdesk
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
