metadata:
  name: "Agenta"
  description: |
    LLMOps platform for prompt management, evaluation, and observability. Build and monitor production-grade LLM applications with collaborative tools.
  category: ai-llm
  subcategory: agents
  tags: [AI, LLM, Prompts]
  version: "latest"
  homepage: https://agenta.ai/
  icon: https://www.google.com/s2/favicons?domain=agenta.ai&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/agenta-ai/agenta-web:latest
    name: agenta
    port: "3000:3000"
    volumes:
      - /opt/srvly/apps/agenta/data:/data
    env: []
agent_install:
  network: srvly-agenta
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed agenta container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 3000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/agenta-ai/agenta-web:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 3000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://agenta.ai/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
