metadata:
  name: "Listmonk"
  description: |
    Listmonk is a self-hosted newsletter and mailing list manager with a modern UI and high-performance email delivery engine.
    It supports multiple lists, custom templates, scheduled campaigns, subscriber import/export, and built-in bounce handling.
    It is a solid replacement for Mailchimp or Sendy when you want full control and privacy over your email communications.
  category: communication
  subcategory: email
  tags: [Newsletter, Email, Mailing List, Marketing]
  version: "latest"
  homepage: https://listmonk.app
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/listmonk.svg
  license: AGPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: true
    mysql: false
    redis: false
    mongodb: false
  ports: [9000]
  resources:
    ram: 256
    disk: 2

install:
  docker:
    image: listmonk/listmonk:latest
    name: listmonk
    port: "9000:9000"
    volumes:
      - /opt/srvly/apps/listmonk/data:/data
      - /opt/srvly/apps/listmonk/uploads:/uploads
    env:
      - key: LISTMONK_db__host
        value: listmonk-postgres
        description: "PostgreSQL host"
      - key: LISTMONK_db__port
        value: "5432"
        description: "PostgreSQL port"
      - key: LISTMONK_db__database
        value: listmonk
        description: "PostgreSQL database name"
      - key: LISTMONK_db__user
        value: listmonk
        description: "PostgreSQL user"
      - key: LISTMONK_db__password
        value: "***"
        description: "PostgreSQL password"

agent_install:
  network: srvly-listmonk
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed listmonk or listmonk-postgres containers before retrying."
  prerequisites:
    - type: postgres
      name: listmonk-postgres
      image: postgres:16-alpine
      container: listmonk-postgres
      database: listmonk
      user: listmonk
      password: generate
      volume: /opt/srvly/apps/listmonk/postgres:/var/lib/postgresql/data
      port: 5432
      env:
        POSTGRES_DB: listmonk
        POSTGRES_USER: listmonk
        POSTGRES_PASSWORD: $GENERATED_PASSWORD
  app_env:
    LISTMONK_db__host: "listmonk-postgres"
    LISTMONK_db__port: "5432"
    LISTMONK_db__database: "listmonk"
    LISTMONK_db__user: "listmonk"
    LISTMONK_db__password: "***"
  post_install:
    - "Create the Docker network before both containers and attach Postgres and the app to it."
    - "Start Postgres first and wait until it accepts connections before starting the app."
    - "Run the listmonk installation wizard after first start if the app does not auto-migrate."
    - "Fetch the rendered HTML and verify that asset URLs are relative or point to the public URL, not localhost."

healthcheck:
  type: http
  port: 9000
  path: /health
  expected: [200]
  timeout: 90

params:
  image:
    type: string
    title: Docker image
    default: listmonk/listmonk:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 9000
    description: "Host port for the Listmonk web UI"

links:
  - label: Website
    url: https://listmonk.app
  - label: GitHub
    url: https://github.com/knadh/listmonk
  - label: Documentation
    url: https://listmonk.app/docs

notes: |
  Listmonk stores uploaded assets and data in persistent volumes. The first-run wizard helps configure the admin account.
