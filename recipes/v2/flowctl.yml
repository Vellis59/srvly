metadata:
  name: "flowctl"
  description: |
    flowctl is a self-hosted application for automation. Install it on your server for full control over your data.
  category: automation-iot
  subcategory: workflows
  tags: [Automation, Workflows]
  version: "latest"
  homepage: https://flowctl.net
  icon: https://www.google.com/s2/favicons?domain=flowctl.net&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/cvhariharan/flowctl:latest
    name: flowctl
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/flowctl/data:/data
    env: []
agent_install:
  network: srvly-flowctl
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed flowctl container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/cvhariharan/flowctl:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://flowctl.net
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
