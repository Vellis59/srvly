metadata:
  name: "Actual"
  description: |
    Actual is a self-hosted web application for money, budgeting & management. Install it on your server for full control over your data and privacy.
  category: productivity
  subcategory: finance
  tags: [Finance, Budget, Money]
  version: "latest"
  homepage: https://actualbudget.org
  icon: https://www.google.com/s2/favicons?domain=actualbudget.org&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [5006]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: actualbudget/actual-server:latest
    name: actual
    port: "5006:5006"
    volumes:
      - /opt/srvly/apps/actual/data:/data
    env: []
agent_install:
  network: srvly-actual
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed actual container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 5006
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: actualbudget/actual-server:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 5006
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://actualbudget.org
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
