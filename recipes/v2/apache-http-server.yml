metadata:
  name: "Apache HTTP Server"
  description: |
    Apache HTTP Server is a self-hosted web application for web servers. Install it on your server for full control over your data and privacy.
  category: dev-infra
  subcategory: reverse-proxy
  tags: [Web Server, HTTP, Proxy]
  version: "latest"
  homepage: https://httpd.apache.org/
  icon: https://www.google.com/s2/favicons?domain=httpd.apache.org&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [80]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: httpd:latest
    name: apache-http-server
    port: "80:80"
    volumes:
      - /opt/srvly/apps/apache-http-server/data:/data
    env: []
agent_install:
  network: srvly-apache-http-server
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed apache-http-server container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 80
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: httpd:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 80
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://httpd.apache.org/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
