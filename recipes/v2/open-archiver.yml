metadata:
  name: "Open Archiver"
  description: |
    Open Archiver is a self-hosted application for archiving and digital preservation (dp). Install it on your server for full control over your data.
  category: storage-backup
  subcategory: backup
  tags: [Archiving, Backup]
  version: "latest"
  homepage: https://openarchiver.com/
  icon: https://www.google.com/s2/favicons?domain=openarchiver.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/logiclabs-ou/openarchiver:latest
    name: open-archiver
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/open-archiver/data:/data
    env: []
agent_install:
  network: srvly-open-archiver
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed open-archiver container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/logiclabs-ou/openarchiver:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://openarchiver.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
