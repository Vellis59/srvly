metadata:
  name: "draw.io"
  description: |
    Powerful diagramming and flowchart web application. Create diagrams, flowcharts, wireframes, and more. Also known as diagrams.net.
  category: productivity
  subcategory: notes-wiki
  tags: [Diagrams, Flowcharts, Drawing]
  version: "latest"
  homepage: https://draw.io
  icon: https://www.google.com/s2/favicons?domain=draw.io&sz=64
  license: Apache-2.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/jgraph/drawio:latest
    name: drawio
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/drawio/data:/data
    env: []
agent_install:
  network: srvly-drawio
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed drawio container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/jgraph/drawio:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://draw.io
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
