metadata:
  name: "Gotify"
  description: |
    Gotify is a self-hosted push notification service with a simple REST API and web-based UI for sending and receiving real-time messages.
    It supports user authentication, plugins, and has mobile apps for Android and iOS.
    It is a lightweight and reliable way to send push notifications from your applications to your devices.
  category: communication
  subcategory: notifications
  tags: [Notifications, Push, Messaging, Alerts]
  version: "latest"
  homepage: https://gotify.net
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=G
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8089]
  resources:
    ram: 128
    disk: 1

install:
  docker:
    image: ghcr.io/gotify/server:latest
    name: gotify
    port: "8089:80"
    volumes:
      - /opt/srvly/apps/gotify/data:/app/data

agent_install:
  network: srvly-gotify
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed gotify container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8089
  path: /health
  expected: [200]
  timeout: 30

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/gotify/server:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 8089
    description: "Host port"
links:
  - label: Website
    url: https://gotify.net
  - label: GitHub
    url: https://github.com/gotify/server
  - label: Documentation
    url: https://gotify.net/docs
notes: |
  Gotify uses SQLite by default. Default admin credentials: admin/admin. Change them after first login.
