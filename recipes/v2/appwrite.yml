metadata:
  name: "Appwrite"
  description: |
    Appwrite is an open-source backend-as-a-service platform that provides authentication, databases, storage, functions, messaging, and APIs for web and mobile apps.
    It includes a built-in admin console, real-time capabilities, file storage, serverless functions, and user management with multiple auth providers.
    It is a comprehensive Firebase alternative that can be self-hosted for complete backend ownership.
  category: dev-infra
  subcategory: api-backend
  tags: [Backend, BaaS, API, Auth, Firebase Alternative]
  version: "latest"
  homepage: https://appwrite.io
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/appwrite.svg
  license: BSD-3-Clause
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8082]
  resources:
    ram: 1024
    disk: 5

install:
  docker:
    image: appwrite/appwrite:latest
    name: appwrite
    port: "8082:80"
    volumes:
      - /opt/srvly/apps/appwrite/config:/storage/config
      - /opt/srvly/apps/appwrite/uploads:/storage/uploads
      - /opt/srvly/apps/appwrite/cache:/storage/cache
    env:
      - key: _APP_SERVER
        value: "$PUBLIC_HOST"
        description: "Public hostname"
      - key: _APP_OPENSSL_KEY_V1
        value: "***"
        description: "OpenSSL encryption key"

agent_install:
  network: srvly-appwrite
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed appwrite container before retrying."
  prerequisites: []
  app_env:
    _APP_SERVER: "$PUBLIC_HOST"
    _APP_OPENSSL_KEY_V1: "***"
  post_install:
    - "Set _APP_SERVER to the final public hostname before deployment."
    - "Generate an OpenSSL key (openssl rand -base64 32) before deployment."
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8082
  path: /v1/health
  expected: [200]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: appwrite/appwrite:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8082
    description: "Host port for the Appwrite web UI"

links:
  - label: Website
    url: https://appwrite.io
  - label: GitHub
    url: https://github.com/appwrite/appwrite
  - label: Documentation
    url: https://appwrite.io/docs

notes: |
  Appwrite provisions its own MariaDB, Redis, and InfluxDB as sub-containers on first startup. It requires the _APP_OPENSSL_KEY_V1 for encryption.
