metadata:
  name: "Kestra"
  description: |
    Event-driven workflow orchestration platform. Create, schedule, and monitor workflows in code. Supports ETL, data pipelines, and task automation.
  category: automation-iot
  subcategory: workflows
  tags: [Workflow, Orchestration, ETL]
  version: "latest"
  homepage: https://kestra.io
  icon: https://www.google.com/s2/favicons?domain=kestra.io&sz=64
  license: Apache-2.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/kestra-io/kestra:latest
    name: kestra
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/kestra/data:/data
    env: []
agent_install:
  network: srvly-kestra
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed kestra container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/kestra-io/kestra:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://kestra.io
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
