metadata:
  name: "Jellyfin"
  description: |
    Jellyfin is a free and open-source media server that organizes, streams, and transcodes movies, TV shows, music, and photos to any device.
    It supports hardware-accelerated transcoding, user profiles, parental controls, plugins, and integration with many media apps.
    It is the leading self-hosted alternative to Plex and Emby for complete media ownership.
  category: media
  subcategory: video
  tags: [Media Server, Streaming, Video, Music, TV]
  version: "latest"
  homepage: https://jellyfin.org
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/jellyfin.svg
  license: GPL-2.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8096]
  resources:
    ram: 1024
    disk: 10

install:
  docker:
    image: jellyfin/jellyfin:latest
    name: jellyfin
    port: "8096:8096"
    volumes:
      - /opt/srvly/apps/jellyfin/config:/config
      - /opt/srvly/apps/jellyfin/cache:/cache
      - /opt/srvly/apps/jellyfin/media:/media

agent_install:
  network: srvly-jellyfin
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed jellyfin container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Access the web UI to complete the initial setup wizard."
    - "Place media files in the /media volume mounted from /opt/srvly/apps/jellyfin/media."

healthcheck:
  type: http
  port: 8096
  path: /health
  expected: [200]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: jellyfin/jellyfin:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8096
    description: "Host port for the Jellyfin web UI"

links:
  - label: Website
    url: https://jellyfin.org
  - label: GitHub
    url: https://github.com/jellyfin/jellyfin
  - label: Documentation
    url: https://jellyfin.org/docs

notes: |
  Media files should be placed in the /media directory inside the container, mapped from /opt/srvly/apps/jellyfin/media on the host.
