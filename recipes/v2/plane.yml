metadata:
  name: "Plane"
  description: |
    Open-source project management tool for issues, epics, and product roadmaps. Modern alternative to JIRA, Linear, and Height.
  category: productivity
  subcategory: project-management
  tags: [Project Management, Issues]
  version: "latest"
  homepage: https://plane.so
  icon: https://www.google.com/s2/favicons?domain=plane.so&sz=64
  license: AGPL-3.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [80]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/makeplane/plane:latest
    name: plane
    port: "80:80"
    volumes:
      - /opt/srvly/apps/plane/data:/data
    env: []
agent_install:
  network: srvly-plane
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed plane container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 80
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/makeplane/plane:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 80
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://plane.so
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
