metadata:
  name: "GitLab"
  description: |
    GitLab is a self-hosted web application for software development - project management. Install it on your server for full control over your data and privacy.
  category: dev-infra
  subcategory: git-code
  tags: [Dev, Git, Code]
  version: "latest"
  homepage: https://about.gitlab.com
  icon: https://www.google.com/s2/favicons?domain=about.gitlab.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [80]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/gitlabhq/gitlab-ce:latest
    name: gitlab
    port: "80:80"
    volumes:
      - /opt/srvly/apps/gitlab/data:/data
    env: []
agent_install:
  network: srvly-gitlab
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed gitlab container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 80
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/gitlabhq/gitlab-ce:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 80
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://about.gitlab.com
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
