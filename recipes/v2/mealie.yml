metadata:
  name: "Mealie"
  description: |
    Mealie is a self-hosted recipe manager and meal planner with a clean web interface.
    It supports recipe import from URLs, automatic nutrition parsing, meal planning, shopping lists, cookbooks, and multi-user access.
    It is a practical tool for anyone who wants to organize, scale, and share recipes from their own server.
  category: productivity
  subcategory: notes-wiki
  tags: [Recipes, Cooking, Meal Planning, Food]
  version: "latest"
  homepage: https://mealie.io
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/mealie.svg
  license: AGPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: true
    mysql: false
    redis: false
    mongodb: false
  ports: [9925]
  resources:
    ram: 512
    disk: 2

install:
  docker:
    image: ghcr.io/mealie-recipes/mealie:latest
    name: mealie
    port: "9925:9000"
    volumes:
      - /opt/srvly/apps/mealie/data:/app/data
    env:
      - key: ALLOW_SIGNUP
        value: "true"
        description: "Allow user registration"
      - key: PUID
        value: "1000"
        description: "User ID"
      - key: PGID
        value: "1000"
        description: "Group ID"
      - key: TZ
        value: "Europe/Paris"
        description: "Timezone"
      - key: DB_ENGINE
        value: "postgres"
        description: "Database engine"
      - key: POSTGRES_SERVER
        value: "mealie-postgres"
        description: "PostgreSQL host"
      - key: POSTGRES_PORT
        value: "5432"
        description: "PostgreSQL port"
      - key: POSTGRES_DB
        value: "mealie"
        description: "PostgreSQL database"
      - key: POSTGRES_USER
        value: "mealie"
        description: "PostgreSQL user"
      - key: POSTGRES_PASSWORD
        value: "***"
        description: "PostgreSQL password"

agent_install:
  network: srvly-mealie
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed mealie or mealie-postgres containers before retrying."
  prerequisites:
    - type: postgres
      name: mealie-postgres
      image: postgres:16-alpine
      container: mealie-postgres
      database: mealie
      user: mealie
      password: generate
      volume: /opt/srvly/apps/mealie/postgres:/var/lib/postgresql/data
      port: 5432
      env:
        POSTGRES_DB: mealie
        POSTGRES_USER: mealie
        POSTGRES_PASSWORD: $GENERATED_PASSWORD
  app_env:
    ALLOW_SIGNUP: "true"
    PUID: "1000"
    PGID: "1000"
    TZ: "Europe/Paris"
    DB_ENGINE: "postgres"
    POSTGRES_SERVER: "mealie-postgres"
    POSTGRES_PORT: "5432"
    POSTGRES_DB: "mealie"
    POSTGRES_USER: "mealie"
    POSTGRES_PASSWORD: "***"
  post_install:
    - "Create the Docker network before both containers and attach Postgres and the app to it."
    - "Start Postgres first and wait until it accepts connections before starting the app."
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Fetch the rendered HTML and verify that asset URLs are relative or point to the public URL, not localhost."

healthcheck:
  type: http
  port: 9925
  path: /api/health
  expected: [200]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/mealie-recipes/mealie:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 9925
    description: "Host port for the Mealie web UI"

links:
  - label: Website
    url: https://mealie.io
  - label: GitHub
    url: https://github.com/mealie-recipes/mealie
  - label: Documentation
    url: https://docs.mealie.io

notes: |
  The first user to register becomes the admin. Disable ALLOW_SIGNUP after setup for private instances.
