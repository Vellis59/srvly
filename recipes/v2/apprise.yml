metadata:
  name: "Apprise"
  description: |
    Push notification server supporting 100+ services. Send alerts via Telegram, Slack, Discord, email, and more through a unified API.
  category: automation-iot
  subcategory: workflows
  tags: [Notifications, Alerts]
  version: "latest"
  homepage: https://github.com/caronc/apprise
  icon: https://www.google.com/s2/favicons?domain=github.com&sz=64
  license: BSD-2-Clause
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/caronc/apprise:latest
    name: apprise
    port: "8000:8000"
    volumes:
      - /opt/srvly/apps/apprise/data:/data
    env: []
agent_install:
  network: srvly-apprise
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed apprise container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/caronc/apprise:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://github.com/caronc/apprise
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
