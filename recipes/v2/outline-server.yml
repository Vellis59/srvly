metadata:
  name: "Outline Server"
  description: |
    Outline Server is a self-hosted web application for proxy. Install it on your server for full control over your data and privacy.
  category: dev-infra
  subcategory: reverse-proxy
  tags: [Proxy, Reverse, Network]
  version: "latest"
  homepage: https://getoutline.org/
  icon: https://www.google.com/s2/favicons?domain=getoutline.org&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/outlinewiki/outline:latest
    name: outline-server
    port: "3000:3000"
    volumes:
      - /opt/srvly/apps/outline-server/data:/data
    env: []
agent_install:
  network: srvly-outline-server
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed outline-server container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 3000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/outlinewiki/outline:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 3000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://getoutline.org/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
