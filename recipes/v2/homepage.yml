metadata:
  name: "Homepage"
  description: |
    Modern application dashboard with service widgets, quick links, weather, and system status. Highly customizable.
  category: dev-infra
  subcategory: server-management
  tags: [Dashboard, Startpage]
  version: "latest"
  homepage: https://gethomepage.dev/
  icon: https://www.google.com/s2/favicons?domain=gethomepage.dev&sz=64
  license: GPL-3.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/gethomepage/homepage:latest
    name: homepage
    port: "3000:3000"
    volumes:
      - /opt/srvly/apps/homepage/data:/data
    env: []
agent_install:
  network: srvly-homepage
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed homepage container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 3000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/gethomepage/homepage:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 3000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://gethomepage.dev/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
