metadata:
  name: "Homepage"
  description: |
    Homepage is a highly customizable application dashboard for self-hosted services, bookmarks, widgets, and infrastructure status.
    It supports service cards, Docker and Kubernetes integrations, search providers, and many third-party widgets for common homelab tools.
    It is well suited as the landing page for a personal server, family portal, or operations dashboard.
  category: productivity
  subcategory: notes-wiki
  tags: [Dashboard, Homepage, Bookmarks, Homelab]
  version: "latest"
  homepage: https://gethomepage.dev
  icon: https://raw.githubusercontent.com/gethomepage/homepage/main/public/homepage.ico
  license: GPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3002]
  resources:
    ram: 256
    disk: 1

install:
  docker:
    image: ghcr.io/gethomepage/homepage:latest
    name: homepage
    port: "3002:3000"
    volumes:
      - /opt/srvly/apps/homepage/config:/app/config
    env:
      - key: HOMEPAGE_ALLOWED_HOSTS
        value: "$PUBLIC_HOST"
        description: "Allowed host/domain for the Homepage web UI"

agent_install:
  network: srvly-homepage
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed homepage container before retrying."
  prerequisites: []
  app_env:
    HOMEPAGE_ALLOWED_HOSTS: "$PUBLIC_HOST"
  post_install:
    - "Set HOMEPAGE_ALLOWED_HOSTS to the final public hostname before deployment."
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Fetch the rendered HTML and verify that asset URLs are relative or point to the public URL, not localhost."

healthcheck:
  type: http
  port: 3002
  path: /
  expected: [200, 301, 302]
  timeout: 90

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/gethomepage/homepage:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 3002
    description: "Host port for the Homepage dashboard"

links:
  - label: Website
    url: https://gethomepage.dev
  - label: GitHub
    url: https://github.com/gethomepage/homepage
  - label: Documentation
    url: https://gethomepage.dev/latest/

notes: |
  Docker socket integration is intentionally not enabled by default because it grants broad host visibility and the deploy endpoint treats volume sources as directories.
