metadata:
  name: "Gramps Web"
  description: |
    Gramps Web is a self-hosted application for genealogy. Install it on your server for full control over your data.
  category: other
  subcategory: 
  tags: [Other]
  version: "latest"
  homepage: https://www.grampsweb.org/
  icon: https://www.google.com/s2/favicons?domain=www.grampsweb.org&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/gramps-project/gramps-web-api:latest
    name: gramps-web
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/gramps-web/data:/data
    env: []
agent_install:
  network: srvly-gramps-web
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed gramps-web container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/gramps-project/gramps-web-api:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://www.grampsweb.org/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
