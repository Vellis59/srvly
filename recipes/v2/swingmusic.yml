metadata:
  name: "SwingMusic"
  description: |
    SwingMusic is a self-hosted application for media streaming - audio streaming. Install it on your server for full control over your data.
  category: media
  subcategory: media-management
  tags: [Media, Streaming]
  version: "latest"
  homepage: https://swingmusic.vercel.app/
  icon: https://www.google.com/s2/favicons?domain=swingmusic.vercel.app&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8096]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/swingmx/swingmusic:latest
    name: swingmusic
    port: "8096:8096"
    volumes:
      - /opt/srvly/apps/swingmusic/data:/data
    env: []
agent_install:
  network: srvly-swingmusic
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed swingmusic container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8096
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/swingmx/swingmusic:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8096
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://swingmusic.vercel.app/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
