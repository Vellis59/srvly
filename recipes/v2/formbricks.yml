metadata:
  name: "Formbricks"
  description: |
    Formbricks is an open-source experience management platform for building surveys, forms, and feedback widgets.
    It supports multiple question types, targeting rules, custom styling, API integration, and analytics on responses.
    It is a privacy-first alternative to Typeform, SurveyMonkey, and Google Forms that you can self-host.
  category: productivity
  subcategory: forms-surveys
  tags: [Forms, Surveys, Feedback, Analytics]
  version: "latest"
  homepage: https://formbricks.com
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/formbricks.svg
  license: AGPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: true
    mysql: false
    redis: false
    mongodb: false
  ports: [8063]
  resources:
    ram: 512
    disk: 2

install:
  docker:
    image: ghcr.io/formbricks/formbricks:latest
    name: formbricks
    port: "8063:3000"
    env:
      - key: DATABASE_URL
        value: "postgres://formbricks:***@formbricks-postgres:5432/formbricks"
      - key: NEXTAUTH_SECRET
        value: "***"
      - key: NEXTAUTH_URL
        value: "$PUBLIC_BASE_URL"
      - key: WEBAPP_URL
        value: "$PUBLIC_BASE_URL"

agent_install:
  network: srvly-formbricks
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed formbricks or formbricks-postgres containers before retrying."
  prerequisites:
    - type: postgres
      name: formbricks-postgres
      image: postgres:16-alpine
      container: formbricks-postgres
      database: formbricks
      user: formbricks
      password: generate
      volume: /opt/srvly/apps/formbricks/postgres:/var/lib/postgresql/data
      port: 5432
      env:
        POSTGRES_DB: formbricks
        POSTGRES_USER: formbricks
        POSTGRES_PASSWORD: $GENERATED_PASSWORD
  app_env:
    DATABASE_URL: "postgres://formbricks:***@formbricks-postgres:5432/formbricks"
    NEXTAUTH_SECRET: "***"
    NEXTAUTH_URL: "$PUBLIC_BASE_URL"
    WEBAPP_URL: "$PUBLIC_BASE_URL"
  post_install:
    - "Create the Docker network before both containers and attach Postgres and the app to it."
    - "Start Postgres first and wait until it accepts connections before starting the app."
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8063
  path: /api/health
  expected: [200]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/formbricks/formbricks:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8063
    description: "Host port for the Formbricks web UI"
links:
  - label: Website
    url: https://formbricks.com
  - label: GitHub
    url: https://github.com/formbricks/formbricks
  - label: Documentation
    url: https://formbricks.com/docs
notes: |
  Formbricks requires PostgreSQL and a NEXTAUTH_SECRET for authentication.
