metadata:
  name: "AliasVault"
  description: |
    AliasVault is a self-hosted application for password managers. Install it on your server for full control over your data.
  category: security
  subcategory: password-manager
  tags: [Passwords, Security]
  version: "latest"
  homepage: https://www.aliasvault.net
  icon: https://www.google.com/s2/favicons?domain=www.aliasvault.net&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/aliasvault/aliasvault:latest
    name: aliasvault
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/aliasvault/data:/data
    env: []
agent_install:
  network: srvly-aliasvault
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed aliasvault container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/aliasvault/aliasvault:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://www.aliasvault.net
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
