metadata:
  name: "form.io"
  description: |
    Enterprise form management platform. Build complex forms with drag-and-drop and integrate with APIs.
  category: dev-infra
  subcategory: api-backend
  tags: [Forms, API, Enterprise]
  version: "latest"
  homepage: https://form.io
  icon: https://www.google.com/s2/favicons?domain=form.io&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3001]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/formio/formio:latest
    name: formio
    port: "3001:3001"
    volumes:
      - /opt/srvly/apps/formio/data:/data
    env: []
agent_install:
  network: srvly-formio
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed formio container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 3001
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/formio/formio:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 3001
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://form.io
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
