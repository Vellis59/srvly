metadata:
  name: "Grafana"
  description: |
    Grafana is a leading open-source observability and data visualization platform supporting metrics, logs, and traces dashboards.
    It connects to dozens of data sources including Prometheus, InfluxDB, PostgreSQL, Loki, Elasticsearch, and many more.
    It is essential infrastructure for any serious monitoring setup.
  category: dev-infra
  subcategory: monitoring
  tags: [Monitoring, Dashboards, Metrics, Observability]
  version: "latest"
  homepage: https://grafana.com
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/grafana.svg
  license: AGPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3006]
  resources:
    ram: 512
    disk: 2

install:
  docker:
    image: grafana/grafana:latest
    name: grafana
    port: "3006:3000"
    volumes:
      - /opt/srvly/apps/grafana/data:/var/lib/grafana

agent_install:
  network: srvly-grafana
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed grafana container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Default credentials: admin / admin (change on first login)."
    - "Fetch the rendered HTML and verify that asset URLs are relative or point to the public URL, not localhost."

healthcheck:
  type: http
  port: 3006
  path: /api/health
  expected: [200]
  timeout: 90

params:
  image:
    type: string
    title: Docker image
    default: grafana/grafana:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 3006
    description: "Host port for the Grafana web UI"

links:
  - label: Website
    url: https://grafana.com
  - label: GitHub
    url: https://github.com/grafana/grafana
  - label: Documentation
    url: https://grafana.com/docs

notes: |
  Grafana uses SQLite by default. For production use with multiple users, configure PostgreSQL as the backend database.
