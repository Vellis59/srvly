metadata:
  name: "Grafana"
  description: |
    Industry-standard analytics and monitoring platform. Create dashboards for metrics, logs, and traces from any data source.
  category: dev-infra
  subcategory: monitoring
  tags: [Monitoring, Dashboards, Metrics]
  version: "latest"
  homepage: https://grafana.com/
  icon: https://www.google.com/s2/favicons?domain=grafana.com&sz=64
  license: AGPL-3.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: grafana/grafana:latest
    name: grafana
    port: "3000:3000"
    volumes:
      - /opt/srvly/apps/grafana/data:/data
    env: []
agent_install:
  network: srvly-grafana
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed grafana container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 3000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: grafana/grafana:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 3000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://grafana.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
