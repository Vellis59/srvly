metadata:
  name: "AnonAddy"
  description: |
    Anonymous email forwarding service. Create unlimited email aliases with GPG encryption, custom domains, and catch-all aliases.
  category: communication
  subcategory: email
  tags: [Email, Privacy, Aliases]
  version: "latest"
  homepage: https://anonaddy.com
  icon: https://www.google.com/s2/favicons?domain=anonaddy.com&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/anonaddy/anonaddy:latest
    name: anonaddy
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/anonaddy/data:/data
    env: []
agent_install:
  network: srvly-anonaddy
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed anonaddy container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/anonaddy/anonaddy:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://anonaddy.com
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
