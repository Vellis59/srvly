metadata:
  name: "KrakenD"
  description: |
    KrakenD is a high-performance API gateway built on top of Lura that aggregates multiple microservices into a single, unified API endpoint.
    It supports rate limiting, circuit breakers, authentication, request/response transformations, caching, and detailed metrics with minimal resource consumption.
    It is the leading open-source API gateway for microservices architectures with enterprise-grade performance.
  category: dev-infra
  subcategory: api-backend
  tags: [API Gateway, Microservices, Proxy, Performance]
  version: "latest"
  homepage: https://www.krakend.io
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/krakend.svg
  license: Apache-2.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 128
    disk: 1

install:
  docker:
    image: krakend:latest
    name: krakend
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/krakend/config:/etc/krakend

agent_install:
  network: srvly-krakend
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed krakend container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8080
  path: /__health
  expected: [200]
  timeout: 30

params:
  image:
    type: string
    title: Docker image
    default: krakend:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port"
links:
  - label: Website
    url: https://www.krakend.io
  - label: GitHub
    url: https://github.com/krakend/krakend-ce
  - label: Documentation
    url: https://www.krakend.io/docs
notes: |
  KrakenD requires a krakend.json configuration file in the /etc/krakend volume.
