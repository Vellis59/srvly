metadata:
  name: "Snikket"
  description: |
    Snikket is a self-hosted application for communication - xmpp - servers. Install it on your server for full control over your data.
  category: communication
  subcategory: chat
  tags: [Communication, Chat]
  version: "latest"
  homepage: https://snikket.org/
  icon: https://www.google.com/s2/favicons?domain=snikket.org&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/snikket-im/snikket-server:latest
    name: snikket
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/snikket/data:/data
    env: []
agent_install:
  network: srvly-snikket
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed snikket container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/snikket-im/snikket-server:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://snikket.org/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
