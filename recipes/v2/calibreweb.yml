metadata:
  name: "Calibre-Web"
  description: |
    Calibre-Web is a web frontend for browsing, reading, and managing Calibre ebook libraries.
    It supports EPUB, PDF, MOBI, and other ebook formats with built-in reader, user management, metadata editing, and OPDS feeds.
    It is the standard way to serve and read a personal ebook collection from any browser.
  category: media
  subcategory: books
  tags: [Ebooks, Reading, Library, Calibre]
  version: "latest"
  homepage: https://github.com/janeczku/calibre-web
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/calibre-web.svg
  license: GPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8089]
  resources:
    ram: 256
    disk: 2

install:
  docker:
    image: lscr.io/linuxserver/calibre-web:latest
    name: calibreweb
    port: "8089:8083"
    volumes:
      - /opt/srvly/apps/calibreweb/config:/config
      - /opt/srvly/apps/calibreweb/books:/books
    env:
      - key: PUID
        value: "1000"
        description: "User ID"
      - key: PGID
        value: "1000"
        description: "Group ID"
      - key: TZ
        value: "Europe/Paris"
        description: "Timezone"
      - key: DOCKER_MODS
        value: "linuxserver/mods:universal-calibre"
        description: "Enable Calibre ebook conversion"

agent_install:
  network: srvly-calibreweb
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed calibreweb container before retrying."
  prerequisites: []
  app_env:
    PUID: "1000"
    PGID: "1000"
    TZ: "Europe/Paris"
    DOCKER_MODS: "linuxserver/mods:universal-calibre"
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Place Calibre library files in the /books volume, or point Calibre-Web to an existing Calibre library path."

healthcheck:
  type: http
  port: 8089
  path: /
  expected: [200, 301, 302]
  timeout: 90

params:
  image:
    type: string
    title: Docker image
    default: lscr.io/linuxserver/calibre-web:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8089
    description: "Host port for the Calibre-Web UI"

links:
  - label: GitHub
    url: https://github.com/janeczku/calibre-web
  - label: Documentation
    url: https://github.com/linuxserver/docker-calibre-web

notes: |
  Calibre-Web needs a Calibre library to operate. Point it to your existing library or create one from the admin panel.
