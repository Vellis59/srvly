metadata:
  name: "Artalk"
  description: |
    Self-hosted comment system for websites and blogs. Lightweight, Markdown support, email notifications, and spam detection.
  category: communication
  subcategory: social
  tags: [Comments, Blog, Discussion]
  version: "latest"
  homepage: https://artalk.js.org/
  icon: https://www.google.com/s2/favicons?domain=artalk.js.org&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/artalk/artalk:latest
    name: artalk
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/artalk/data:/data
    env: []
agent_install:
  network: srvly-artalk
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed artalk container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/artalk/artalk:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://artalk.js.org/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
