metadata:
  name: "INGInious"
  description: |
    INGInious is a self-hosted application for learning and courses. Install it on your server for full control over your data.
  category: productivity
  subcategory: crm-erp
  tags: [Learning, Courses]
  version: "latest"
  homepage: https://inginious.org/?lang=en
  icon: https://www.google.com/s2/favicons?domain=inginious.org&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/inginious/inginious:latest
    name: inginious
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/inginious/data:/data
    env: []
agent_install:
  network: srvly-inginious
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed inginious container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/inginious/inginious:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://inginious.org/?lang=en
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
