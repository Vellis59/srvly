metadata:
  name: "Forgejo"
  description: |
    Self-hosted lightweight software forge. Fork of Gitea with federation, privacy focus, and scaling. Git hosting with issues, PRs, and CI/CD.
  category: dev-infra
  subcategory: git-code
  tags: [Git, Forge, DevOps]
  version: "latest"
  homepage: https://forgejo.org
  icon: https://www.google.com/s2/favicons?domain=forgejo.org&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: codeberg.org/forgejo/forgejo:latest
    name: forgejo
    port: "3000:3000"
    volumes:
      - /opt/srvly/apps/forgejo/data:/data
    env: []
agent_install:
  network: srvly-forgejo
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed forgejo container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 3000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: codeberg.org/forgejo/forgejo:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 3000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://forgejo.org
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
