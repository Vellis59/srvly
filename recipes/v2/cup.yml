metadata:
  name: "Cup"
  description: |
    Cup is a self-hosted API platform for managing, testing, and documenting your REST APIs with a collaborative interface.
    It provides API request building, collections, environment variables, automated tests, and team collaboration features.
    It is a lightweight alternative to Postman or Insomnia for API development teams.
  category: dev-infra
  subcategory: api-backend
  tags: [API, Development, Testing, Documentation]
  version: "latest"
  homepage: https://cup.software
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=C
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3090]
  resources:
    ram: 256
    disk: 1

install:
  docker:
    image: ghcr.io/sergi0g/cup:latest
    name: cup
    port: "3090:3000"
    volumes:
      - /opt/srvly/apps/cup/data:/data

agent_install:
  network: srvly-cup
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed cup container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 3090
  path: /
  expected: [200, 301, 302]
  timeout: 30

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/sergi0g/cup:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 3090
    description: "Host port"
links:
  - label: GitHub
    url: https://github.com/sergi0g/cup
  - label: Documentation
    url: https://github.com/sergi0g/cup#readme
notes: |
  Cup provides API management features with persistent data storage.
