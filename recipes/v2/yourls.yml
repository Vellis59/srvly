metadata:
  name: "YOURLS"
  description: |
    YOURLS is a self-hosted URL shortening service that gives you complete control over your shortened links.
    It supports custom keywords, bookmarklets, stats tracking, API access, plugins, and integration with many third-party tools.
    It is one of the oldest and most trusted self-hosted URL shortener projects, with a large plugin ecosystem.
  category: productivity
  subcategory: documents
  tags: [URL Shortener, Links, Analytics, YOURLS]
  version: "latest"
  homepage: https://yourls.org
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/yourls.svg
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: true
    redis: false
    mongodb: false
  ports: [8102]
  resources:
    ram: 256
    disk: 1

install:
  docker:
    image: yourls:latest
    name: yourls
    port: "8102:80"
    volumes:
      - /opt/srvly/apps/yourls/config:/var/www/html/user
    env:
      - key: YOURLS_DB_HOST
        value: yourls-mariadb
        description: "Database host"
      - key: YOURLS_DB_USER
        value: yourls
        description: "Database user"
      - key: YOURLS_DB_PASS
        value: "***"
        description: "Database password"
      - key: YOURLS_DB_NAME
        value: yourls
        description: "Database name"
      - key: YOURLS_SITE
        value: "$PUBLIC_BASE_URL"
        description: "Public URL of the YOURLS instance"
      - key: YOURLS_USER
        value: "admin"
        description: "Admin username"
      - key: YOURLS_PASS
        value: "***"
        description: "Admin password"

agent_install:
  network: srvly-yourls
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed yourls or yourls-mariadb containers before retrying."
  prerequisites:
    - type: mysql
      name: yourls-mariadb
      image: mariadb:11
      container: yourls-mariadb
      database: yourls
      user: yourls
      password: generate
      volume: /opt/srvly/apps/yourls/mariadb:/var/lib/mysql
      port: 3306
      env:
        MYSQL_DATABASE: yourls
        MYSQL_USER: yourls
        MYSQL_PASSWORD: $GENERATED_PASSWORD
        MYSQL_ROOT_PASSWORD: $GENERATED_ROOT_PASSWORD
  app_env:
    YOURLS_DB_HOST: "yourls-mariadb"
    YOURLS_DB_USER: "yourls"
    YOURLS_DB_PASS: "***"
    YOURLS_DB_NAME: "yourls"
    YOURLS_SITE: "$PUBLIC_BASE_URL"
    YOURLS_USER: "admin"
    YOURLS_PASS: "***"
  post_install:
    - "Create the Docker network before both containers and attach MariaDB and the app to it."
    - "Start MariaDB first and wait until it accepts connections before starting the app."
    - "Set YOURLS_SITE to the final public URL before deployment."
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8102
  path: /
  expected: [200, 301, 302]
  timeout: 60

params:
  image:
    type: string
    title: Docker image
    default: yourls:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8102
    description: "Host port for the YOURLS web UI"

links:
  - label: Website
    url: https://yourls.org
  - label: GitHub
    url: https://github.com/YOURLS/YOURLS
  - label: Documentation
    url: https://docs.yourls.org

notes: |
  YOURLS requires MySQL/MariaDB. The admin panel is at /admin with the configured credentials.
