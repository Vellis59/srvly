metadata:
  name: "AnyCable"
  description: |
    High-performance WebSocket server for Ruby applications. Provides real-time capabilities with binary protocol, metrics, and scaling.
  category: communication
  subcategory: chat
  tags: [WebSocket, Real-time, Ruby]
  version: "latest"
  homepage: https://anycable.io/
  icon: https://www.google.com/s2/favicons?domain=anycable.io&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/anycable/anycable-go:latest
    name: anycable
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/anycable/data:/data
    env: []
agent_install:
  network: srvly-anycable
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed anycable container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/anycable/anycable-go:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://anycable.io/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
