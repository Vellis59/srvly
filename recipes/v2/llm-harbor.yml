metadata:
  name: "LLM Harbor"
  description: |
    LLM Harbor is a self-hosted application for generative artificial intelligence (genai). Install it on your server for full control over your data.
  category: ai-llm
  subcategory: chat-assistant
  tags: [AI, LLM, GenAI]
  version: "latest"
  homepage: https://github.com/av/harbor
  icon: https://www.google.com/s2/favicons?domain=github.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/av/harbor:latest
    name: llm-harbor
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/llm-harbor/data:/data
    env: []
agent_install:
  network: srvly-llm-harbor
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed llm-harbor container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/av/harbor:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://github.com/av/harbor
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
