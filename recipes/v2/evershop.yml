metadata:
  name: "Evershop"
  description: |
    Evershop is a modern, self-hosted e-commerce platform built with Node.js and React that provides a complete online store solution.
    It supports product management, categories, shopping cart, checkout, customer accounts, orders, and payment gateway integration.
    It is a lightweight and fast open-source alternative to Shopify for self-hosted online stores.
  category: productivity
  subcategory: documents
  tags: [E-commerce, Store, Shopping, Online Shop]
  version: "latest"
  homepage: https://evershop.io
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=E
  license: GPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: true
    redis: false
    mongodb: false
  ports: [3060]
  resources:
    ram: 512
    disk: 2

install:
  docker:
    image: evershop/evershop:latest
    name: evershop
    port: "3060:3000"
    env:
      - key: DB_HOST
        value: evershop-mariadb
      - key: DB_USER
        value: evershop
      - key: DB_PASSWORD
        value: "***"
      - key: DB_NAME
        value: evershop

agent_install:
  network: srvly-evershop
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed evershop or evershop-mariadb containers before retrying."
  prerequisites:
    - type: mysql
      name: evershop-mariadb
      image: mariadb:11
      container: evershop-mariadb
      database: evershop
      user: evershop
      password: generate
      volume: /opt/srvly/apps/evershop/mariadb:/var/lib/mysql
      port: 3306
      env:
        MYSQL_DATABASE: evershop
        MYSQL_USER: evershop
        MYSQL_PASSWORD: $GENERATED_PASSWORD
        MYSQL_ROOT_PASSWORD: $GENERATED_ROOT_PASSWORD
  app_env:
    DB_HOST: "evershop-mariadb"
    DB_USER: "evershop"
    DB_PASSWORD: "***"
    DB_NAME: "evershop"
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 3060
  path: /
  expected: [200, 301, 302]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: evershop/evershop:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 3000
    description: "Host port"
links:
  - label: Website
    url: https://evershop.io
  - label: GitHub
    url: https://github.com/evershopcommerce/evershop
  - label: Documentation
    url: https://evershop.io/docs
notes: |
  Evershop requires MariaDB/MySQL for product and order data storage.
