metadata:
  name: "IT-Tools by sharevb"
  description: |
    IT-Tools by sharevb is a self-hosted web application for miscellaneous. Install it on your server for full control over your data and privacy.
  category: other
  subcategory: 
  tags: [Other, Miscellaneous]
  version: "latest"
  homepage: https://github.com/sharevb/it-tools
  icon: https://www.google.com/s2/favicons?domain=github.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [80]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/corentinth/it-tools:latest
    name: it-tools-by-sharevb
    port: "80:80"
    volumes:
      - /opt/srvly/apps/it-tools-by-sharevb/data:/data
    env: []
agent_install:
  network: srvly-it-tools-by-sharevb
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed it-tools-by-sharevb container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 80
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/corentinth/it-tools:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 80
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://github.com/sharevb/it-tools
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
