metadata:
  name: "SCM Manager"
  description: |
    SCM Manager is a self-hosted application for software development - project management. Install it on your server for full control over your data.
  category: dev-infra
  subcategory: git-code
  tags: [Dev, Git, Code]
  version: "latest"
  homepage: https://www.scm-manager.org/
  icon: https://www.google.com/s2/favicons?domain=www.scm-manager.org&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/scm-manager/scm-manager:latest
    name: scm-manager
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/scm-manager/data:/data
    env: []
agent_install:
  network: srvly-scm-manager
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed scm-manager container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/scm-manager/scm-manager:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://www.scm-manager.org/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
