metadata:
  name: "PassIt"
  description: |
    Simple password manager with end-to-end encryption. Share passwords securely with team members and groups.
  category: security
  subcategory: password-manager
  tags: [Passwords, Security, Sharing]
  version: "latest"
  homepage: https://passit.io/
  icon: https://www.google.com/s2/favicons?domain=passit.io&sz=64
  license: AGPL-3.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/passit/passit:latest
    name: passit
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/passit/data:/data
    env: []
agent_install:
  network: srvly-passit
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed passit container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/passit/passit:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://passit.io/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
