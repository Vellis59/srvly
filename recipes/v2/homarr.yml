metadata:
  name: "Homarr"
  description: |
    Homarr is a modern, feature-rich dashboard for managing and accessing your self-hosted services from a single interface.
    It supports customizable tiles, icon packs, built-in status monitoring, search, Docker integration, weather widgets, and extensive theming.
    It is one of the most popular dashboard choices for homelabs alongside Homepage and Heimdall.
  category: productivity
  subcategory: notes-wiki
  tags: [Dashboard, Homepage, Homelab, Widgets]
  version: "latest"
  homepage: https://homarr.dev
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/homarr.svg
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [7575]
  resources:
    ram: 256
    disk: 1

install:
  docker:
    image: ghcr.io/ajnart/homarr:latest
    name: homarr
    port: "7575:7575"
    volumes:
      - /opt/srvly/apps/homarr/configs:/app/data/configs
      - /opt/srvly/apps/homarr/icons:/app/public/icons
      - /var/run/docker.sock:/var/run/docker.sock

agent_install:
  network: srvly-homarr
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed homarr container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Access the web UI to configure services and widgets."

healthcheck:
  type: http
  port: 7575
  path: /
  expected: [200, 301, 302]
  timeout: 60

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/ajnart/homarr:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 7575
    description: "Host port for the Homarr dashboard"

links:
  - label: Website
    url: https://homarr.dev
  - label: GitHub
    url: https://github.com/ajnart/homarr
  - label: Documentation
    url: https://homarr.dev/docs

notes: |
  Homarr mounts the Docker socket for container status widgets. Configurations are stored in the configs volume.
