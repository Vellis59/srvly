metadata:
  name: "Homarr"
  description: |
    Sleek dashboard for self-hosted services. Organize apps with widgets, monitor status, and integrate with popular self-hosted tools.
  category: dev-infra
  subcategory: server-management
  tags: [Dashboard, Services]
  version: "latest"
  homepage: https://homarr.dev
  icon: https://www.google.com/s2/favicons?domain=homarr.dev&sz=64
  license: GPL-3.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [7575]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/homarr-labs/homarr:latest
    name: homarr
    port: "7575:7575"
    volumes:
      - /opt/srvly/apps/homarr/data:/data
    env: []
agent_install:
  network: srvly-homarr
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed homarr container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 7575
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/homarr-labs/homarr:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 7575
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://homarr.dev
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
