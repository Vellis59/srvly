metadata:
  name: "GlitchTip"
  description: |
    Error tracking application. Collect errors reported by your apps. Self-hosted alternative to Sentry with similar API compatibility.
  category: dev-infra
  subcategory: monitoring
  tags: [Error Tracking, Monitoring]
  version: "latest"
  homepage: https://glitchtip.com
  icon: https://www.google.com/s2/favicons?domain=glitchtip.com&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/glitchtip/glitchtip:latest
    name: glitchtip
    port: "8000:8000"
    volumes:
      - /opt/srvly/apps/glitchtip/data:/data
    env: []
agent_install:
  network: srvly-glitchtip
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed glitchtip container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/glitchtip/glitchtip:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://glitchtip.com
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
