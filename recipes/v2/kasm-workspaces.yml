metadata:
  name: "Kasm Workspaces"
  description: |
    Containerized streaming platform for delivering browser-based desktops and applications. Stream full desktops and individual apps to any browser.
  category: dev-infra
  subcategory: ide-tools
  tags: [Streaming, Desktop, Containers]
  version: "latest"
  homepage: https://kasmweb.com/
  icon: https://www.google.com/s2/favicons?domain=kasmweb.com&sz=64
  license: GPL-2.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [443]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/kasmweb/workspaces:latest
    name: kasm-workspaces
    port: "443:443"
    volumes:
      - /opt/srvly/apps/kasm-workspaces/data:/data
    env: []
agent_install:
  network: srvly-kasm-workspaces
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed kasm-workspaces container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 443
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/kasmweb/workspaces:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 443
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://kasmweb.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
