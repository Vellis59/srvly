metadata:
  name: "Appsmith"
  description: |
    Open-source platform to build internal tools, admin panels, and dashboards with drag-and-drop UI builder and JavaScript scripting.
  category: dev-infra
  subcategory: api-backend
  tags: [Low-code, Internal Tools]
  version: "latest"
  homepage: https://www.appsmith.com/
  icon: https://www.google.com/s2/favicons?domain=www.appsmith.com&sz=64
  license: Apache-2.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [80]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/appsmithorg/appsmith:latest
    name: appsmith
    port: "80:80"
    volumes:
      - /opt/srvly/apps/appsmith/data:/data
    env: []
agent_install:
  network: srvly-appsmith
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed appsmith container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 80
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/appsmithorg/appsmith:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 80
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://www.appsmith.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
