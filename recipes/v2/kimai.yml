metadata:
  name: "Kimai"
  description: |
    Kimai is a professional open-source time tracking application for freelancers, agencies, and companies.
    It supports timesheets, project and activity management, invoicing export, multi-user, customer management, and plugin extensions.
    It is a reliable self-hosted alternative to Toggl, Clockify, and Harvest for time tracking.
  category: productivity
  subcategory: finance
  tags: [Time Tracking, Timesheet, Invoicing, Productivity]
  version: "latest"
  homepage: https://www.kimai.org
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/kimai.svg
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: true
    redis: false
    mongodb: false
  ports: [8079]
  resources:
    ram: 512
    disk: 2

install:
  docker:
    image: lscr.io/linuxserver/kimai:latest
    name: kimai
    port: "8079:80"
    volumes:
      - /opt/srvly/apps/kimai/config:/config
    env:
      - key: PUID
        value: "1000"
      - key: PGID
        value: "1000"
      - key: TZ
        value: "Europe/Paris"
      - key: DATABASE_URL
        value: "mysql://kimai:***@kimai-mariadb:3306/kimai"

agent_install:
  network: srvly-kimai
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed kimai or kimai-mariadb containers before retrying."
  prerequisites:
    - type: mysql
      name: kimai-mariadb
      image: mariadb:11
      container: kimai-mariadb
      database: kimai
      user: kimai
      password: generate
      volume: /opt/srvly/apps/kimai/mariadb:/var/lib/mysql
      port: 3306
      env:
        MYSQL_DATABASE: kimai
        MYSQL_USER: kimai
        MYSQL_PASSWORD: $GENERATED_PASSWORD
        MYSQL_ROOT_PASSWORD: $GENERATED_ROOT_PASSWORD
  app_env:
    PUID: "1000"
    PGID: "1000"
    TZ: "Europe/Paris"
    DATABASE_URL: "mysql://kimai:***@kimai-mariadb:3306/kimai"
  post_install:
    - "Create the Docker network before both containers and attach MariaDB and the app to it."
    - "Start MariaDB first and wait until it accepts connections before starting the app."
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8079
  path: /
  expected: [200, 301, 302]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: lscr.io/linuxserver/kimai:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 8079
    description: "Host port"
links:
  - label: Website
    url: https://www.kimai.org
  - label: GitHub
    url: https://github.com/kimai/kimai
  - label: Documentation
    url: https://www.kimai.org/documentation
notes: |
  Kimai requires MySQL/MariaDB. The first admin user is created during initial setup through the web UI.
