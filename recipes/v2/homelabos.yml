metadata:
  name: "HomelabOS"
  description: |
    Your own offline-first operating system for your home server. Automated deployment of self-hosted services with a unified dashboard.
  category: dev-infra
  subcategory: server-management
  tags: [Homelab, Server, Management]
  version: "latest"
  homepage: https://homelabos.com
  icon: https://www.google.com/s2/favicons?domain=homelabos.com&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/nicholaswilde/homelabos:latest
    name: homelabos
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/homelabos/data:/data
    env: []
agent_install:
  network: srvly-homelabos
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed homelabos container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/nicholaswilde/homelabos:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://homelabos.com
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
