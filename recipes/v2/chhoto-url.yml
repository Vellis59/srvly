metadata:
  name: "Chhoto URL"
  description: |
    Chhoto URL is a self-hosted application for url shorteners. Install it on your server for full control over your data.
  category: dev-infra
  subcategory: api-backend
  tags: [URL, Shortener, Links]
  version: "latest"
  homepage: https://github.com/SinTan1729/chhoto-url
  icon: https://www.google.com/s2/favicons?domain=github.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/sintan1729/chhoto-url:latest
    name: chhoto-url
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/chhoto-url/data:/data
    env: []
agent_install:
  network: srvly-chhoto-url
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed chhoto-url container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/sintan1729/chhoto-url:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://github.com/SinTan1729/chhoto-url
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
