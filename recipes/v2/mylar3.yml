metadata:
  name: "Mylar3"
  description: |
    Mylar3 is a self-hosted web application for automation. Install it on your server for full control over your data and privacy.
  category: automation-iot
  subcategory: workflows
  tags: [Automation, Workflows]
  version: "latest"
  homepage: https://mylarcomics.com/
  icon: https://www.google.com/s2/favicons?domain=mylarcomics.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8090]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: lscr.io/linuxserver/mylar3:latest
    name: mylar3
    port: "8090:8090"
    volumes:
      - /opt/srvly/apps/mylar3/data:/data
    env: []
agent_install:
  network: srvly-mylar3
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed mylar3 container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8090
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: lscr.io/linuxserver/mylar3:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8090
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://mylarcomics.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
