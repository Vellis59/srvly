metadata:
  name: "Invoice Ninja"
  description: |
    Invoice Ninja is a comprehensive invoicing, expense tracking, and time management platform for freelancers and small businesses.
    It supports recurring invoices, payment gateways, project management, task tracking, expense management, tax reporting, and client portals.
    It is a powerful open-source alternative to FreshBooks and QuickBooks for self-hosted financial management.
  category: productivity
  subcategory: finance
  tags: [Invoicing, Billing, Finance, Accounting]
  version: "latest"
  homepage: https://invoiceninja.com
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/invoiceninja.png
  license: Elastic License 2.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: true
    redis: false
    mongodb: false
  ports: [9000]
  resources:
    ram: 512
    disk: 2

install:
  docker:
    image: invoiceninja/invoiceninja:latest
    name: invoiceninja
    port: "9000:9000"
    volumes:
      - /opt/srvly/apps/invoiceninja/public:/var/www/html/public
      - /opt/srvly/apps/invoiceninja/storage:/var/www/html/storage
    env:
      - key: APP_URL
        value: "$PUBLIC_BASE_URL"
      - key: DB_HOST
        value: "invoiceninja-mariadb"
      - key: DB_DATABASE
        value: "invoiceninja"
      - key: DB_USERNAME
        value: "invoiceninja"
      - key: DB_PASSWORD
        value: "***"
      - key: APP_KEY
        value: "***"

agent_install:
  network: srvly-invoiceninja
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed invoiceninja or invoiceninja-mariadb containers before retrying."
  prerequisites:
    - type: mysql
      name: invoiceninja-mariadb
      image: mariadb:11
      container: invoiceninja-mariadb
      database: invoiceninja
      user: invoiceninja
      password: generate
      volume: /opt/srvly/apps/invoiceninja/mariadb:/var/lib/mysql
      port: 3306
      env:
        MYSQL_DATABASE: invoiceninja
        MYSQL_USER: invoiceninja
        MYSQL_PASSWORD: $GENERATED_PASSWORD
        MYSQL_ROOT_PASSWORD: $GENERATED_ROOT_PASSWORD
  app_env:
    APP_URL: "$PUBLIC_BASE_URL"
    DB_HOST: "invoiceninja-mariadb"
    DB_DATABASE: "invoiceninja"
    DB_USERNAME: "invoiceninja"
    DB_PASSWORD: "***"
    APP_KEY: "***"
  post_install:
    - "Create the Docker network before both containers and attach MariaDB and the app to it."
    - "Start MariaDB first and wait until it accepts connections before starting the app."
    - "Generate APP_KEY (php artisan key:generate) before deployment."
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 9000
  path: /
  expected: [200, 301, 302]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: invoiceninja/invoiceninja:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 9000
    description: "Host port for the Invoice Ninja web UI"

links:
  - label: Website
    url: https://invoiceninja.com
  - label: GitHub
    url: https://github.com/invoiceninja/invoiceninja
  - label: Documentation
    url: https://invoiceninja.github.io

notes: |
  Invoice Ninja requires MariaDB and an APP_KEY. Run the setup wizard through the web UI on first access.
