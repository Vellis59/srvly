metadata:
  name: "ChirpStack"
  description: |
    ChirpStack is an open-source LoRaWAN Network Server for managing IoT devices and sensor networks.
    It provides device management, data downlink, integrations with cloud services, and a web-based administration interface.
    It is the leading open-source LoRaWAN server for IoT infrastructure management.
  category: automation-iot
  subcategory: iot
  tags: [IoT, LoRaWAN, Sensors, Network]
  version: "4"
  homepage: https://www.chirpstack.io
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=C
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: true
    mysql: false
    redis: true
    mongodb: false
  ports: [8076]
  resources:
    ram: 256
    disk: 2

install:
  docker:
    image: chirpstack/chirpstack:4
    name: chirpstack
    port: "8076:8080"
    volumes:
      - /opt/srvly/apps/chirpstack/config:/etc/chirpstack
    env:
      - key: POSTGRES_HOST
        value: chirpstack-postgres
      - key: POSTGRES_USER
        value: chirpstack
      - key: POSTGRES_PASSWORD
        value: "***"
      - key: POSTGRES_DB
        value: chirpstack
      - key: REDIS_HOST
        value: chirpstack-redis

agent_install:
  network: srvly-chirpstack
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed chirpstack, chirpstack-postgres, or chirpstack-redis containers before retrying."
  prerequisites:
    - type: postgres
      name: chirpstack-postgres
      image: postgres:16-alpine
      container: chirpstack-postgres
      database: chirpstack
      user: chirpstack
      password: generate
      volume: /opt/srvly/apps/chirpstack/postgres:/var/lib/postgresql/data
      port: 5432
      env:
        POSTGRES_DB: chirpstack
        POSTGRES_USER: chirpstack
        POSTGRES_PASSWORD: $GENERATED_PASSWORD
    - type: redis
      name: chirpstack-redis
      image: redis:7-alpine
      container: chirpstack-redis
      volume: /opt/srvly/apps/chirpstack/redis:/data
      port: 6379
  app_env:
    POSTGRES_HOST: "chirpstack-postgres"
    POSTGRES_USER: "chirpstack"
    POSTGRES_PASSWORD: "***"
    POSTGRES_DB: "chirpstack"
    REDIS_HOST: "chirpstack-redis"
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8076
  path: /
  expected: [200]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: chirpstack/chirpstack:4
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port"
links:
  - label: Website
    url: https://www.chirpstack.io
  - label: GitHub
    url: https://github.com/chirpstack/chirpstack
  - label: Documentation
    url: https://www.chirpstack.io/docs
notes: |
  ChirpStack requires PostgreSQL and Redis for LoRaWAN network management.
