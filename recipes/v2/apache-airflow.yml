metadata:
  name: "Apache Airflow"
  description: |
    Platform to programmatically author, schedule, and monitor workflows. Industry-standard orchestration with rich UI, DAGs, and extensive integrations.
  category: automation-iot
  subcategory: workflows
  tags: [Workflow, ETL, Automation]
  version: "latest"
  homepage: https://airflow.apache.org/
  icon: https://www.google.com/s2/favicons?domain=airflow.apache.org&sz=64
  license: Apache-2.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: apache/airflow:latest
    name: apache-airflow
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/apache-airflow/data:/data
    env: []
agent_install:
  network: srvly-apache-airflow
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed apache-airflow container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: apache/airflow:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://airflow.apache.org/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
