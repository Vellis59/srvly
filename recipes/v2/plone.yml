metadata:
  name: "Plone"
  description: |
    Enterprise-level content management system with powerful workflow, security, and accessibility features. Used by organizations worldwide.
  category: productivity
  subcategory: cms
  tags: [CMS, Content, Enterprise]
  version: "latest"
  homepage: https://plone.org/
  icon: https://www.google.com/s2/favicons?domain=plone.org&sz=64
  license: GPL-2.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: plone/plone:latest
    name: plone
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/plone/data:/data
    env: []
agent_install:
  network: srvly-plone
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed plone container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: plone/plone:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://plone.org/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
