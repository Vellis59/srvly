metadata:
  name: "docmost Community Edition"
  description: |
    docmost Community Edition is a self-hosted web application for wikis. Install it on your server for full control over your data and privacy.
  category: other
  subcategory: 
  tags: [Other]
  version: "latest"
  homepage: https://docmost.com/
  icon: https://www.google.com/s2/favicons?domain=docmost.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/docmost/docmost:latest
    name: docmost-community-edition
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/docmost-community-edition/data:/data
    env: []
agent_install:
  network: srvly-docmost-community-edition
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed docmost-community-edition container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/docmost/docmost:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://docmost.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
