metadata:
  name: "TileServer GL"
  description: |
    TileServer GL is a self-hosted application for maps and global positioning system (gps). Install it on your server for full control over your data.
  category: productivity
  subcategory: finance
  tags: [Maps, GPS, Travel]
  version: "latest"
  homepage: https://tileserver.readthedocs.io/
  icon: https://www.google.com/s2/favicons?domain=tileserver.readthedocs.io&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/maptiler/tileserver-gl:latest
    name: tileserver-gl
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/tileserver-gl/data:/data
    env: []
agent_install:
  network: srvly-tileserver-gl
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed tileserver-gl container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/maptiler/tileserver-gl:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://tileserver.readthedocs.io/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
