metadata:
  name: "admidio"
  description: |
    admidio is a self-hosted web application for human resources management (hrm). Install it on your server for full control over your data and privacy.
  category: productivity
  subcategory: crm-erp
  tags: [HR, Human Resources]
  version: "latest"
  homepage: https://www.admidio.org/
  icon: https://www.google.com/s2/favicons?domain=www.admidio.org&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: admidio/admidio:latest
    name: admidio
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/admidio/data:/data
    env: []
agent_install:
  network: srvly-admidio
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed admidio container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: admidio/admidio:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://www.admidio.org/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
