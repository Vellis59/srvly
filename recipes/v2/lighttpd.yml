metadata:
  name: "Lighttpd"
  description: |
    Secure, fast, compliant, and flexible web server optimized for high-performance environments. Lightweight alternative to Apache and Nginx.
  category: dev-infra
  subcategory: reverse-proxy
  tags: [Web Server, HTTP, Lightweight]
  version: "latest"
  homepage: https://www.lighttpd.net/
  icon: https://www.google.com/s2/favicons?domain=www.lighttpd.net&sz=64
  license: BSD-3-Clause
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [80]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/lighttpd/lighttpd:latest
    name: lighttpd
    port: "80:80"
    volumes:
      - /opt/srvly/apps/lighttpd/data:/data
    env: []
agent_install:
  network: srvly-lighttpd
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed lighttpd container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 80
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/lighttpd/lighttpd:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 80
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://www.lighttpd.net/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
