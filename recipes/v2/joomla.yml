metadata:
  name: "Joomla"
  description: |
    Joomla is a powerful, flexible content management system for building websites and web applications of all sizes.
    It supports custom content types, multilingual sites, user management, extensions, templates, ACL, and SEO-friendly URLs.
    It is one of the most widely-used CMS platforms in the world alongside WordPress and Drupal.
  category: productivity
  subcategory: documents
  tags: [CMS, Content Management, Websites, Blogging]
  version: "latest"
  homepage: https://www.joomla.org
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/joomla.svg
  license: GPL-2.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: true
    redis: false
    mongodb: false
  ports: [8011]
  resources:
    ram: 512
    disk: 5

install:
  docker:
    image: joomla:latest
    name: joomla
    port: "8011:80"
    volumes:
      - /opt/srvly/apps/joomla/html:/var/www/html

agent_install:
  network: srvly-joomla
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed joomla container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Complete the setup wizard through the web UI, choosing MySQL/MariaDB."

healthcheck:
  type: http
  port: 8011
  path: /
  expected: [200, 301, 302]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: joomla:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 8011
    description: "Host port"
links:
  - label: Website
    url: https://www.joomla.org
  - label: GitHub
    url: https://github.com/joomla/joomla-cms
  - label: Documentation
    url: https://docs.joomla.org
notes: |
  Joomla requires MySQL/MariaDB. Database setup is done through the web UI installation wizard.
