metadata:
  name: "Caddy"
  description: |
    Powerful enterprise-ready web server with automatic HTTPS. Easy Caddyfile config, reverse proxy, file serving, and dynamic sites.
  category: dev-infra
  subcategory: reverse-proxy
  tags: [Web Server, Reverse Proxy, HTTPS]
  version: "latest"
  homepage: https://caddyserver.com/
  icon: https://www.google.com/s2/favicons?domain=caddyserver.com&sz=64
  license: Apache-2.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [80]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: caddy:latest
    name: caddy
    port: "80:80"
    volumes:
      - /opt/srvly/apps/caddy/data:/data
    env: []
agent_install:
  network: srvly-caddy
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed caddy container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 80
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: caddy:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 80
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://caddyserver.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
