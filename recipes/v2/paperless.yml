metadata:
  name: "Paperless-ngx"
  description: |
    Paperless-ngx is a document management system that automatically indexes, tags, and archives scanned documents, PDFs, and emails.
    It features OCR, machine learning classification, customizable workflows, full-text search, and a modern web interface.
    It is the definitive self-hosted tool for going paperless and organizing digital documents.
  category: productivity
  subcategory: documents
  tags: [Documents, OCR, Scanning, Archiving]
  version: "latest"
  homepage: https://docs.paperless-ngx.com
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/paperless-ngx.svg
  license: GPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: true
    mysql: false
    redis: false
    mongodb: false
  ports: [8010]
  resources:
    ram: 1024
    disk: 10

install:
  docker:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    name: paperless
    port: "8010:8000"
    volumes:
      - /opt/srvly/apps/paperless/data:/usr/src/paperless/data
      - /opt/srvly/apps/paperless/media:/usr/src/paperless/media
      - /opt/srvly/apps/paperless/export:/usr/src/paperless/export
      - /opt/srvly/apps/paperless/consume:/usr/src/paperless/consume
    env:
      - key: PAPERLESS_DBHOST
        value: paperless-postgres
        description: "PostgreSQL host"
      - key: PAPERLESS_DBPORT
        value: "5432"
        description: "PostgreSQL port"
      - key: PAPERLESS_DBNAME
        value: paperless
        description: "PostgreSQL database name"
      - key: PAPERLESS_DBUSER
        value: paperless
        description: "PostgreSQL user"
      - key: PAPERLESS_DBPASS
        value: "***"
        description: "PostgreSQL password"
      - key: PAPERLESS_SECRET_KEY
        value: "***"
        description: "Django secret key"

agent_install:
  network: srvly-paperless
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed paperless or paperless-postgres containers before retrying."
  prerequisites:
    - type: postgres
      name: paperless-postgres
      image: postgres:16-alpine
      container: paperless-postgres
      database: paperless
      user: paperless
      password: generate
      volume: /opt/srvly/apps/paperless/postgres:/var/lib/postgresql/data
      port: 5432
      env:
        POSTGRES_DB: paperless
        POSTGRES_USER: paperless
        POSTGRES_PASSWORD: $GENERATED_PASSWORD
  app_env:
    PAPERLESS_DBHOST: "paperless-postgres"
    PAPERLESS_DBPORT: "5432"
    PAPERLESS_DBNAME: "paperless"
    PAPERLESS_DBUSER: "paperless"
    PAPERLESS_DBPASS: "***"
    PAPERLESS_SECRET_KEY: "***"
  post_install:
    - "Create the Docker network before both containers and attach Postgres and the app to it."
    - "Start Postgres first and wait until it accepts connections before starting the app."
    - "Generate a Django SECRET_KEY (openssl rand -base64 32) before deployment."
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Fetch the rendered HTML and verify that asset URLs are relative or point to the public URL, not localhost."

healthcheck:
  type: http
  port: 8010
  path: /
  expected: [200, 301, 302]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/paperless-ngx/paperless-ngx:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8010
    description: "Host port for the Paperless-ngx web UI"

links:
  - label: Website
    url: https://docs.paperless-ngx.com
  - label: GitHub
    url: https://github.com/paperless-ngx/paperless-ngx
  - label: Documentation
    url: https://docs.paperless-ngx.com

notes: |
  Paperless-ngx requires PostgreSQL and a secret key. The initial database migration takes a few minutes on first startup.
