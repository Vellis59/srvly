metadata:
  name: "Geo2tz"
  description: |
    Geo2tz is a self-hosted application for maps and global positioning system (gps). Install it on your server for full control over your data.
  category: productivity
  subcategory: finance
  tags: [Maps, GPS, Travel]
  version: "latest"
  homepage: https://github.com/noandrea/geo2tz
  icon: https://www.google.com/s2/favicons?domain=github.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/noandrea/geo2tz:latest
    name: geo2tz
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/geo2tz/data:/data
    env: []
agent_install:
  network: srvly-geo2tz
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed geo2tz container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/noandrea/geo2tz:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://github.com/noandrea/geo2tz
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
