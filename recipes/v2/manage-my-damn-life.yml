metadata:
  name: "Manage My Damn Life"
  description: |
    Manage My Damn Life is a self-hosted application for calendar & contacts. Install it on your server for full control over your data.
  category: productivity
  subcategory: calendars
  tags: [Calendar, Contacts]
  version: "latest"
  homepage: https://intri.in/manage-my-damn-life/
  icon: https://www.google.com/s2/favicons?domain=intri.in&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/intri-in/manage-my-damn-life-nextjs:latest
    name: manage-my-damn-life
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/manage-my-damn-life/data:/data
    env: []
agent_install:
  network: srvly-manage-my-damn-life
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed manage-my-damn-life container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/intri-in/manage-my-damn-life-nextjs:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://intri.in/manage-my-damn-life/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
