metadata:
  name: "Starbase 80"
  description: |
    Starbase 80 is a self-hosted application for personal dashboards. Install it on your server for full control over your data.
  category: dev-infra
  subcategory: server-management
  tags: [Dashboard, Startpage]
  version: "latest"
  homepage: https://github.com/notclickable-jordan/starbase-80
  icon: https://www.google.com/s2/favicons?domain=github.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/notclickable-jordan/starbase-80:latest
    name: starbase-80
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/starbase-80/data:/data
    env: []
agent_install:
  network: srvly-starbase-80
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed starbase-80 container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/notclickable-jordan/starbase-80:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://github.com/notclickable-jordan/starbase-80
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
