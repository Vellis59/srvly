metadata:
  name: "Note Mark"
  description: |
    Note Mark is a self-hosted application for note-taking & editors. Install it on your server for full control over your data.
  category: productivity
  subcategory: notes-wiki
  tags: [Notes, Wiki, Editors]
  version: "latest"
  homepage: https://notemark.docs.enchantedcode.co.uk/
  icon: https://www.google.com/s2/favicons?domain=notemark.docs.enchantedcode.co.uk&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/enchant97/note-mark:latest
    name: note-mark
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/note-mark/data:/data
    env: []
agent_install:
  network: srvly-note-mark
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed note-mark container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/enchant97/note-mark:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://notemark.docs.enchantedcode.co.uk/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
