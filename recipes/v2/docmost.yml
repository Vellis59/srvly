metadata:
  name: "Docmost"
  description: |
    Collaborative wiki and documentation software. Alternative to Confluence and Notion with real-time editing, comments, and page history.
  category: productivity
  subcategory: notes-wiki
  tags: [Docs, Wiki, Collaboration]
  version: "latest"
  homepage: https://docmost.com/
  icon: https://www.google.com/s2/favicons?domain=docmost.com&sz=64
  license: AGPL-3.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/docmost/docmost:latest
    name: docmost
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/docmost/data:/data
    env: []
agent_install:
  network: srvly-docmost
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed docmost container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/docmost/docmost:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://docmost.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
