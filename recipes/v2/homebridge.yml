metadata:
  name: "Homebridge"
  description: |
    Homebridge is a lightweight home automation server that bridges non-HomeKit devices into Apple HomeKit.
    It supports thousands of plugins for smart lights, switches, sensors, locks, cameras, thermostats, and other IoT devices.
    It is the standard way to integrate non-HomeKit smart home devices with the Apple Home ecosystem.
  category: automation-iot
  subcategory: smart-home
  tags: [HomeKit, Smart Home, Bridge, IoT]
  version: "latest"
  homepage: https://homebridge.io
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/homebridge.svg
  license: Apache-2.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8581]
  resources:
    ram: 512
    disk: 2

install:
  docker:
    image: ghcr.io/homebridge/homebridge:latest
    name: homebridge
    port: "8581:8581"
    volumes:
      - /opt/srvly/apps/homebridge/config:/homebridge

agent_install:
  network: srvly-homebridge
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed homebridge container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8581
  path: /
  expected: [200, 301, 302]
  timeout: 90

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/homebridge/homebridge:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 8581
    description: "Host port"
links:
  - label: Website
    url: https://homebridge.io
  - label: GitHub
    url: https://github.com/homebridge/homebridge
  - label: Documentation
    url: https://github.com/homebridge/homebridge/wiki
notes: |
  Homebridge provides a web UI on port 8581 for plugin and accessory management.
