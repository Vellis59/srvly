metadata:
  name: "Dozzle"
  description: |
    Dozzle is a lightweight, real-time Docker log viewer with a clean web-based interface.
    It shows container logs, supports search and filtering, follows log streams, and works with any Docker daemon. It has no database, no state, and no configuration.
    It is a practical companion for developers and operators who need to inspect container logs quickly from a browser.
  category: dev-infra
  subcategory: monitoring
  tags: [Docker, Logs, Monitoring, Container]
  version: "latest"
  homepage: https://dozzle.dev
  icon: https://github.com/amir20.png?size=64
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8088]
  resources:
    ram: 128
    disk: 1

install:
  docker:
    image: ghcr.io/amir20/dozzle:latest
    name: dozzle
    port: "8088:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

agent_install:
  network: srvly-dozzle
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed dozzle container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Fetch the rendered HTML and verify that asset URLs are relative or point to the public URL, not localhost."
    - "Note: Dozzle mounts the Docker socket for log access."

healthcheck:
  type: http
  port: 8088
  path: /
  expected: [200, 301, 302]
  timeout: 60

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/amir20/dozzle:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8088
    description: "Host port for the Dozzle web UI"

links:
  - label: Website
    url: https://dozzle.dev
  - label: GitHub
    url: https://github.com/amir20/dozzle
  - label: Documentation
    url: https://github.com/amir20/dozzle/wiki

notes: |
  Dozzle requires access to the Docker socket to read container logs. This grants container visibility to anyone with access to Dozzle. Consider adding authentication if exposed publicly.
