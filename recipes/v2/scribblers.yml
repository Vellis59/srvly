metadata:
  name: "Scribble.rs"
  description: |
    Multiplayer drawing and guessing game. Self-hosted Pictionary-style browser game with WebSocket support.
  category: gaming
  subcategory: game-servers
  tags: [Games, Drawing, Multiplayer]
  version: "latest"
  homepage: https://github.com/scribble-rs/scribble.rs
  icon: https://www.google.com/s2/favicons?domain=github.com&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/scribble-rs/scribble.rs:latest
    name: scribblers
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/scribblers/data:/data
    env: []
agent_install:
  network: srvly-scribblers
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed scribblers container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/scribble-rs/scribble.rs:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://github.com/scribble-rs/scribble.rs
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
