metadata:
  name: "Our Shopping List"
  description: |
    Our Shopping List is a self-hosted application for task management & to-do lists. Install it on your server for full control over your data.
  category: productivity
  subcategory: project-management
  tags: [Tasks, Todo, Management]
  version: "latest"
  homepage: https://github.com/nanawel/our-shopping-list
  icon: https://www.google.com/s2/favicons?domain=github.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/nanawel/our-shopping-list:latest
    name: our-shopping-list
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/our-shopping-list/data:/data
    env: []
agent_install:
  network: srvly-our-shopping-list
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed our-shopping-list container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/nanawel/our-shopping-list:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://github.com/nanawel/our-shopping-list
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
