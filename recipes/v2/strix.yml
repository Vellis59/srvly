metadata:
  name: "Strix"
  description: |
    Strix is a self-hosted application for video surveillance. Install it on your server for full control over your data.
  category: security
  subcategory: vpn-tunnel
  tags: [Surveillance, Cameras]
  version: "latest"
  homepage: https://github.com/eduard256/Strix
  icon: https://www.google.com/s2/favicons?domain=github.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/eduard256/strix:latest
    name: strix
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/strix/data:/data
    env: []
agent_install:
  network: srvly-strix
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed strix container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/eduard256/strix:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://github.com/eduard256/Strix
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
