metadata:
  name: "Hoarder"
  description: |
    Hoarder is a self-hosted bookmark and link management service with AI-powered automatic tagging and organization.
    It supports saving bookmarks, screenshots, full-text search, collections, tags, and browser extensions.
    It is a modern alternative to Raindrop.io or Pocket with built-in AI features.
  category: productivity
  subcategory: documents
  tags: [Bookmarks, Links, AI, Organization]
  version: "0.22.0"
  homepage: https://hoarder.app
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=H
  license: AGPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3080]
  resources:
    ram: 512
    disk: 2

install:
  docker:
    image: ghcr.io/hoarder-app/hoarder:0.22.0
    name: hoarder
    port: "3080:3000"
    volumes:
      - /opt/srvly/apps/hoarder/data:/data

agent_install:
  network: srvly-hoarder
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed hoarder container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 3080
  path: /
  expected: [200, 301, 302]
  timeout: 60

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/hoarder-app/hoarder:0.22.0
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 3080
    description: "Host port"
links:
  - label: Website
    url: https://hoarder.app
  - label: GitHub
    url: https://github.com/hoarder-app/hoarder
  - label: Documentation
    url: https://hoarder.app/docs
notes: |
  Hoarder uses SQLite by default. AI tagging requires a configurable API key.
