metadata:
  name: "Apache Solr"
  description: |
    Enterprise-grade search platform built on Apache Lucene with full-text search, faceted search, hit highlighting, and real-time indexing.
  category: dev-infra
  subcategory: database
  tags: [Search, Index, Lucene]
  version: "latest"
  homepage: https://solr.apache.org/
  icon: https://www.google.com/s2/favicons?domain=solr.apache.org&sz=64
  license: Apache-2.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8983]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: solr:latest
    name: apachesolr
    port: "8983:8983"
    volumes:
      - /opt/srvly/apps/apachesolr/data:/data
    env: []
agent_install:
  network: srvly-apachesolr
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed apachesolr container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8983
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: solr:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8983
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://solr.apache.org/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
