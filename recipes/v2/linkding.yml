metadata:
  name: "Linkding"
  description: |
    Linkding is a fast, minimal bookmark manager designed for self-hosting.
    It supports tags, full-text search, browser extensions, import/export workflows, and optional automatic metadata extraction.
    It is a practical replacement for cloud bookmark services when you want simple ownership of saved links.
  category: productivity
  subcategory: notes-wiki
  tags: [Bookmarks, Productivity, Links, Archiving]
  version: "latest"
  homepage: https://github.com/sissbruecker/linkding
  icon: https://github.com/sissbruecker.png?size=64
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [9090]
  resources:
    ram: 256
    disk: 2

install:
  docker:
    image: sissbruecker/linkding:latest
    name: linkding
    port: "9090:9090"
    volumes:
      - /opt/srvly/apps/linkding/data:/etc/linkding/data

agent_install:
  network: srvly-linkding
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed linkding container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Fetch the rendered HTML and verify that asset URLs are relative or point to the public URL, not localhost."

healthcheck:
  type: http
  port: 9090
  path: /
  expected: [200, 301, 302]
  timeout: 60

params:
  image:
    type: string
    title: Docker image
    default: sissbruecker/linkding:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 9090
    description: "Host port for the Linkding web UI"

links:
  - label: GitHub
    url: https://github.com/sissbruecker/linkding
  - label: Documentation
    url: https://linkding.link
  - label: Docker Hub
    url: https://hub.docker.com/r/sissbruecker/linkding

notes: |
  Create the first user from inside the container after deployment if the web UI does not expose an initial setup screen.
