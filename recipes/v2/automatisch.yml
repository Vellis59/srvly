metadata:
  name: "Automatisch"
  description: |
    Automatisch is a business automation platform that connects your apps and services to automate workflows without coding.
    It supports integrations with Twitter, Telegram, GitHub, Slack, Google Sheets, email, webhooks, and many more services.
    It is a self-hosted alternative to Zapier and Make for building custom automation workflows.
  category: automation-iot
  subcategory: workflows
  tags: [Automation, Workflows, No-Code, Integrations]
  version: "latest"
  homepage: https://automatisch.io
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=A
  license: AGPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: true
    mysql: false
    redis: true
    mongodb: false
  ports: [8067]
  resources:
    ram: 512
    disk: 2

install:
  docker:
    image: ghcr.io/automatisch/automatisch:latest
    name: automatisch
    port: "8067:3000"
    volumes:
      - /opt/srvly/apps/automatisch/storage:/storage
    env:
      - key: DATABASE_URL
        value: "postgres://automatisch:***@automatisch-postgres:5432/automatisch"
      - key: REDIS_URL
        value: "redis://automatisch-redis:6379"
      - key: APP_SECRET_KEY
        value: "***"
      - key: APP_URL
        value: "$PUBLIC_BASE_URL"

agent_install:
  network: srvly-automatisch
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed automatisch, automatisch-postgres, or automatisch-redis containers before retrying."
  prerequisites:
    - type: postgres
      name: automatisch-postgres
      image: postgres:16-alpine
      container: automatisch-postgres
      database: automatisch
      user: automatisch
      password: generate
      volume: /opt/srvly/apps/automatisch/postgres:/var/lib/postgresql/data
      port: 5432
      env:
        POSTGRES_DB: automatisch
        POSTGRES_USER: automatisch
        POSTGRES_PASSWORD: $GENERATED_PASSWORD
    - type: redis
      name: automatisch-redis
      image: redis:7-alpine
      container: automatisch-redis
      volume: /opt/srvly/apps/automatisch/redis:/data
      port: 6379
  app_env:
    DATABASE_URL: "postgres://automatisch:***@automatisch-postgres:5432/automatisch"
    REDIS_URL: "redis://automatisch-redis:6379"
    APP_SECRET_KEY: "***"
    APP_URL: "$PUBLIC_BASE_URL"
  post_install:
    - "Create the Docker network before all containers and attach Postgres, Redis, and the app to it."
    - "Start Postgres and Redis first before starting the app."
    - "Set APP_URL to the final public URL."
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8067
  path: /health
  expected: [200]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/automatisch/automatisch:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 8067
    description: "Host port"
links:
  - label: Website
    url: https://automatisch.io
  - label: GitHub
    url: https://github.com/automatisch/automatisch
  - label: Documentation
    url: https://automatisch.io/docs
notes: |
  Automatisch requires PostgreSQL, Redis, and an APP_SECRET_KEY for session encryption.
