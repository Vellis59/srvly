metadata:
  name: "LinkStack"
  description: |
    LinkStack is a self-hosted application for personal dashboards. Install it on your server for full control over your data.
  category: dev-infra
  subcategory: server-management
  tags: [Dashboard, Startpage]
  version: "latest"
  homepage: https://linkstack.org/
  icon: https://www.google.com/s2/favicons?domain=linkstack.org&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/linkstackorg/linkstack:latest
    name: linkstack
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/linkstack/data:/data
    env: []
agent_install:
  network: srvly-linkstack
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed linkstack container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/linkstackorg/linkstack:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://linkstack.org/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
