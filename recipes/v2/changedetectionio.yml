metadata:
  name: "changedetection.io"
  description: |
    changedetection.io is a self-hosted web application for automation. Install it on your server for full control over your data and privacy.
  category: automation-iot
  subcategory: workflows
  tags: [Automation, Workflows]
  version: "latest"
  homepage: https://changedetection.io/
  icon: https://www.google.com/s2/favicons?domain=changedetection.io&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [5000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/dgtlmoon/changedetection.io:latest
    name: changedetectionio
    port: "5000:5000"
    volumes:
      - /opt/srvly/apps/changedetectionio/data:/data
    env: []
agent_install:
  network: srvly-changedetectionio
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed changedetectionio container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 5000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/dgtlmoon/changedetection.io:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 5000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://changedetection.io/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
