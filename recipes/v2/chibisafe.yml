metadata:
  name: "Chibisafe"
  description: |
    Chibisafe is a fast, self-hosted file upload service with a clean interface for sharing files, images, and media.
    It supports drag-and-drop uploads, URL sharing, file management, albums, and API access for integrations.
    It is a lightweight alternative to services like ShareX or Pomf for file hosting.
  category: storage-backup
  subcategory: file-sharing
  tags: [File Upload, Sharing, Media, Storage]
  version: "latest"
  homepage: https://chibisafe.app
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=C
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3074]
  resources:
    ram: 256
    disk: 2

install:
  docker:
    image: chibisafe/chibisafe:latest
    name: chibisafe
    port: "3074:8080"
    volumes:
      - /opt/srvly/apps/chibisafe/uploads:/app/uploads
      - /opt/srvly/apps/chibisafe/data:/app/db

agent_install:
  network: srvly-chibisafe
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed chibisafe container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 3074
  path: /
  expected: [200, 301, 302]
  timeout: 30

params:
  image:
    type: string
    title: Docker image
    default: chibisafe/chibisafe:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 3074
    description: "Host port"
links:
  - label: Website
    url: https://chibisafe.app
  - label: GitHub
    url: https://github.com/chibisafe/chibisafe
  - label: Documentation
    url: https://chibisafe.app/docs
notes: |
  Chibisafe stores uploaded files in the uploads volume and metadata in a database.
