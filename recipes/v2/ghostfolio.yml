metadata:
  name: "Ghostfolio"
  description: |
    Ghostfolio is a self-hosted web application for money, budgeting & management. Install it on your server for full control over your data and privacy.
  category: productivity
  subcategory: finance
  tags: [Finance, Budget, Money]
  version: "latest"
  homepage: https://ghostfol.io/
  icon: https://www.google.com/s2/favicons?domain=ghostfol.io&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [2368]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/bitnami/ghost:latest
    name: ghostfolio
    port: "2368:2368"
    volumes:
      - /opt/srvly/apps/ghostfolio/data:/data
    env: []
agent_install:
  network: srvly-ghostfolio
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed ghostfolio container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 2368
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/bitnami/ghost:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 2368
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://ghostfol.io/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
