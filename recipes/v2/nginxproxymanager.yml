metadata:
  name: "Nginx Proxy Manager"
  description: |
    Manage Nginx proxy hosts with a simple web interface. Features SSL certificates via Let's Encrypt, access lists, and forwarding.
  category: dev-infra
  subcategory: reverse-proxy
  tags: [Proxy, Nginx, SSL]
  version: "latest"
  homepage: https://nginxproxymanager.com/
  icon: https://www.google.com/s2/favicons?domain=nginxproxymanager.com&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [81]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/nginx-proxy-manager/nginx-proxy-manager:latest
    name: nginxproxymanager
    port: "81:81"
    volumes:
      - /opt/srvly/apps/nginxproxymanager/data:/data
    env: []
agent_install:
  network: srvly-nginxproxymanager
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed nginxproxymanager container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 81
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/nginx-proxy-manager/nginx-proxy-manager:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 81
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://nginxproxymanager.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
