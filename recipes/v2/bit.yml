metadata:
  name: "bit"
  description: |
    bit is a self-hosted web application for url shorteners. Install it on your server for full control over your data and privacy.
  category: dev-infra
  subcategory: api-backend
  tags: [URL, Shortener, Links]
  version: "latest"
  homepage: https://github.com/sjdonado/bit
  icon: https://www.google.com/s2/favicons?domain=github.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [5000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/daya0576/beaverhabits:latest
    name: bit
    port: "5000:5000"
    volumes:
      - /opt/srvly/apps/bit/data:/data
    env: []
agent_install:
  network: srvly-bit
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed bit container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 5000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/daya0576/beaverhabits:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 5000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://github.com/sjdonado/bit
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
