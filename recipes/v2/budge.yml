metadata:
  name: "Budge"
  description: |
    Budge is a personal finance and budgeting application for tracking expenses, income, and financial goals.
    It provides categories, recurring transactions, reports, charts, and account management with a clean interface.
    It is a lightweight self-hosted alternative to commercial budgeting apps like YNAB or Mint.
  category: productivity
  subcategory: finance
  tags: [Budget, Finance, Expenses, Tracking]
  version: "latest"
  homepage: https://budget.app
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=B
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8094]
  resources:
    ram: 256
    disk: 2

install:
  docker:
    image: lscr.io/linuxserver/budge:latest
    name: budge
    port: "8094:80"
    volumes:
      - /opt/srvly/apps/budge/config:/config
    env:
      - key: PUID
        value: "1000"
      - key: PGID
        value: "1000"
      - key: TZ
        value: "Europe/Paris"

agent_install:
  network: srvly-budge
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed budge container before retrying."
  prerequisites: []
  app_env:
    PUID: "1000"
    PGID: "1000"
    TZ: "Europe/Paris"
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8094
  path: /
  expected: [200, 301, 302]
  timeout: 60

params:
  image:
    type: string
    title: Docker image
    default: lscr.io/linuxserver/budge:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 8094
    description: "Host port"
links:
  - label: GitHub
    url: https://github.com/linuxserver/budge
  - label: Documentation
    url: https://github.com/linuxserver/budge#readme
notes: |
  Budge uses SQLite by default. All financial data is stored in the config volume.
