metadata:
  name: "PhotoPrism"
  description: |
    PhotoPrism is a self-hosted photo management application powered by AI for tagging, searching, and organizing large photo libraries.
    It automatically detects faces, objects, locations, and colors, and supports albums, editing, sharing, and map views.
    It is a leading option for self-hosting personal photo collections with smart organization.
  category: media
  subcategory: photos
  tags: [Photos, AI, Gallery, Photo Management]
  version: "latest"
  homepage: https://photoprism.app
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/photoprism.svg
  license: AGPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: true
    redis: false
    mongodb: false
  ports: [2342]
  resources:
    ram: 1024
    disk: 10

install:
  docker:
    image: photoprism/photoprism:latest
    name: photoprism
    port: "2342:2342"
    volumes:
      - /opt/srvly/apps/photoprism/storage:/photoprism/storage
      - /opt/srvly/apps/photoprism/originals:/photoprism/originals
    env:
      - key: PHOTOPRISM_ADMIN_PASSWORD
        value: "***"
        description: "Initial admin password"
      - key: PHOTOPRISM_DATABASE_DRIVER
        value: "mysql"
        description: "Database driver"
      - key: PHOTOPRISM_DATABASE_SERVER
        value: "photoprism-mariadb:3306"
        description: "Database server"
      - key: PHOTOPRISM_DATABASE_NAME
        value: "photoprism"
        description: "Database name"
      - key: PHOTOPRISM_DATABASE_USER
        value: "photoprism"
        description: "Database user"
      - key: PHOTOPRISM_DATABASE_PASSWORD
        value: "***"
        description: "Database password"
      - key: PHOTOPRISM_SITE_URL
        value: "$PUBLIC_BASE_URL"
        description: "Public URL"

agent_install:
  network: srvly-photoprism
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed photoprism or photoprism-mariadb containers before retrying."
  prerequisites:
    - type: mysql
      name: photoprism-mariadb
      image: mariadb:11
      container: photoprism-mariadb
      database: photoprism
      user: photoprism
      password: generate
      volume: /opt/srvly/apps/photoprism/mariadb:/var/lib/mysql
      port: 3306
      env:
        MYSQL_DATABASE: photoprism
        MYSQL_USER: photoprism
        MYSQL_PASSWORD: $GENERATED_PASSWORD
        MYSQL_ROOT_PASSWORD: $GENERATED_ROOT_PASSWORD
  app_env:
    PHOTOPRISM_ADMIN_PASSWORD: "***"
    PHOTOPRISM_DATABASE_DRIVER: "mysql"
    PHOTOPRISM_DATABASE_SERVER: "photoprism-mariadb:3306"
    PHOTOPRISM_DATABASE_NAME: "photoprism"
    PHOTOPRISM_DATABASE_USER: "photoprism"
    PHOTOPRISM_DATABASE_PASSWORD: "***"
    PHOTOPRISM_SITE_URL: "$PUBLIC_BASE_URL"
  post_install:
    - "Create the Docker network before both containers and attach MariaDB and the app to it."
    - "Start MariaDB first and wait until it accepts connections before starting the app."
    - "Set PHOTOPRISM_SITE_URL to the final public URL."
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Fetch the rendered HTML and verify that asset URLs are relative or point to the public URL, not localhost."

healthcheck:
  type: http
  port: 2342
  path: /api/v1/status
  expected: [200]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: photoprism/photoprism:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 2342
    description: "Host port for the PhotoPrism web UI"

links:
  - label: Website
    url: https://photoprism.app
  - label: GitHub
    url: https://github.com/photoprism/photoprism
  - label: Documentation
    url: https://docs.photoprism.app

notes: |
  PhotoPrism requires MariaDB. Place your photos in the originals volume mounted from /opt/srvly/apps/photoprism/originals.
