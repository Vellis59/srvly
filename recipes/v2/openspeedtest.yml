metadata:
  name: "OpenSpeedTest"
  description: |
    Self-hosted broadband speed test server. HTML5-based accurate speed measurements without Flash or Java.
  category: dev-infra
  subcategory: monitoring
  tags: [Speed, Network, Test]
  version: "latest"
  homepage: https://openspeedtest.com/
  icon: https://www.google.com/s2/favicons?domain=openspeedtest.com&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/openspeedtest/openspeedtest:latest
    name: openspeedtest
    port: "3000:3000"
    volumes:
      - /opt/srvly/apps/openspeedtest/data:/data
    env: []
agent_install:
  network: srvly-openspeedtest
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed openspeedtest container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 3000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/openspeedtest/openspeedtest:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 3000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://openspeedtest.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
