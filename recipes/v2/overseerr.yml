metadata:
  name: "Overseerr"
  description: |
    Overseerr is a media request management platform for use with Plex, Jellyfin, and Sonarr/Radarr.
    It allows users to browse and request movies and TV shows, receive notifications, and manage requests with approval workflows.
    It is a polished frontend for media libraries that bridges the gap between users and the *arr automation stack.
  category: media
  subcategory: media-management
  tags: [Media Requests, Plex, Jellyfin, Discovery]
  version: "latest"
  homepage: https://overseerr.dev
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/overseerr.svg
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [5055]
  resources:
    ram: 512
    disk: 2

install:
  docker:
    image: lscr.io/linuxserver/overseerr:latest
    name: overseerr
    port: "5055:5055"
    volumes:
      - /opt/srvly/apps/overseerr/config:/config
    env:
      - key: PUID
        value: "1000"
        description: "User ID"
      - key: PGID
        value: "1000"
        description: "Group ID"
      - key: TZ
        value: "Europe/Paris"
        description: "Timezone"

agent_install:
  network: srvly-overseerr
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed overseerr container before retrying."
  prerequisites: []
  app_env:
    PUID: "1000"
    PGID: "1000"
    TZ: "Europe/Paris"
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Access the web UI to complete the initial setup wizard."

healthcheck:
  type: http
  port: 5055
  path: /api/v1/status
  expected: [200]
  timeout: 90

params:
  image:
    type: string
    title: Docker image
    default: lscr.io/linuxserver/overseerr:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 5055
    description: "Host port for the Overseerr web UI"

links:
  - label: Website
    url: https://overseerr.dev
  - label: GitHub
    url: https://github.com/sct/overseerr
  - label: Documentation
    url: https://docs.overseerr.dev

notes: |
  Overseerr uses SQLite. Connect it to your Jellyfin/Plex server and Sonarr/Radarr instances during setup.
