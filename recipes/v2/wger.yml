metadata:
  name: "wger"
  description: |
    wger is a self-hosted application for health and fitness. Install it on your server for full control over your data.
  category: productivity
  subcategory: finance
  tags: [Health, Fitness]
  version: "latest"
  homepage: https://wger.de/
  icon: https://www.google.com/s2/favicons?domain=wger.de&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/wger-project/wger:latest
    name: wger
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/wger/data:/data
    env: []
agent_install:
  network: srvly-wger
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed wger container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/wger-project/wger:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://wger.de/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
