metadata:
  name: "MediaCMS"
  description: |
    MediaCMS is a modern, open-source media management and sharing platform for video, audio, and image content.
    It supports media uploading, transcoding, streaming, categorization, commenting, user management, and REST API access.
    It is a self-hosted alternative to YouTube, Vimeo, or Wistia for private media hosting.
  category: media
  subcategory: video
  tags: [Media, Video, Streaming, CMS]
  version: "latest"
  homepage: https://mediacms.io
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=M
  license: AGPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3085]
  resources:
    ram: 1024
    disk: 10

install:
  docker:
    image: mediacms/mediacms:latest
    name: mediacms
    port: "3085:80"
    volumes:
      - /opt/srvly/apps/mediacms/media:/home/mediacms/media
      - /opt/srvly/apps/mediacms/db:/home/mediacms/db

agent_install:
  network: srvly-mediacms
  preflight:
    - "Check that the host port is free."
    - "Remove any failed mediacms container."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering."

healthcheck:
  type: http
  port: 3085
  path: /
  expected: [200, 301, 302]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: mediacms/mediacms:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 3085
    description: "Host port"
links:
  - label: Website
    url: https://mediacms.io
  - label: GitHub
    url: https://github.com/mediacms-io/mediacms
  - label: Documentation
    url: https://mediacms.io/docs
notes: |
  MediaCMS uses SQLite by default. For production, configure PostgreSQL, Redis, and Celery.
