metadata:
  name: "File Browser"
  description: |
    File Browser provides a web-based file manager that can browse, upload, download, rename, edit, and share files from a configured server directory.
    It includes user management, permissions, temporary share links, and a simple interface that works well for personal servers and small teams.
    It is a lightweight way to expose a controlled file management UI without deploying a full cloud storage suite.
  category: storage-backup
  subcategory: file-sharing
  tags: [File Manager, File Sharing, Storage, Web UI]
  version: "latest"
  homepage: https://filebrowser.org
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/filebrowser.svg
  license: Apache-2.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8084]
  resources:
    ram: 128
    disk: 1

install:
  docker:
    image: filebrowser/filebrowser:latest
    name: filebrowser
    port: "8084:80"
    volumes:
      - /opt/srvly/apps/filebrowser/files:/srv
      - /opt/srvly/apps/filebrowser/database:/database
      - /opt/srvly/apps/filebrowser/config:/config

agent_install:
  network: srvly-filebrowser
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed filebrowser container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Fetch the rendered HTML and verify that asset URLs are relative or point to the public URL, not localhost."
    - "Tell the user to change the default admin credentials immediately if the image exposes them."

healthcheck:
  type: http
  port: 8084
  path: /
  expected: [200, 301, 302]
  timeout: 60

params:
  image:
    type: string
    title: Docker image
    default: filebrowser/filebrowser:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8084
    description: "Host port for the File Browser web UI"

links:
  - label: Website
    url: https://filebrowser.org
  - label: GitHub
    url: https://github.com/filebrowser/filebrowser
  - label: Documentation
    url: https://filebrowser.org/installation

notes: |
  The default file root is the persistent /srv volume mapped from /opt/srvly/apps/filebrowser/files on the host.
