metadata:
  name: "Hister"
  description: |
    Hister is a self-hosted application for search engines. Install it on your server for full control over your data.
  category: dev-infra
  subcategory: database
  tags: [Search, Index, Engine]
  version: "latest"
  homepage: https://hister.org/
  icon: https://www.google.com/s2/favicons?domain=hister.org&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/asciimoo/hister:latest
    name: hister
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/hister/data:/data
    env: []
agent_install:
  network: srvly-hister
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed hister container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/asciimoo/hister:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://hister.org/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
