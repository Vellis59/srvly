metadata:
  name: "Fonoster"
  description: |
    Fonoster is a self-hosted Voice over IP (VoIP) platform for building communication applications with programmable voice and messaging.
    It provides SIP trunking, call routing, IVR, text-to-speech, and integration with telephony networks through a REST API.
    It is an open-source alternative to Twilio for self-hosted telephony and communication services.
  category: communication
  subcategory: voice
  tags: [VoIP, Telephony, SIP, Voice]
  version: "0.15.15"
  homepage: https://fonoster.com
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=F
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: true
    mongodb: false
  ports: [5020]
  resources:
    ram: 512
    disk: 2

install:
  docker:
    image: fonoster/dashboard:0.15.15
    name: fonoster
    port: "5020:3000"
    env:
      - key: REDIS_HOST
        value: fonoster-redis
      - key: REDIS_PORT
        value: "6379"

agent_install:
  network: srvly-fonoster
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed fonoster or fonoster-redis containers before retrying."
  prerequisites:
    - type: redis
      name: fonoster-redis
      image: redis:7-alpine
      container: fonoster-redis
      volume: /opt/srvly/apps/fonoster/redis:/data
      port: 6379
  app_env:
    REDIS_HOST: "fonoster-redis"
    REDIS_PORT: "6379"
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 5020
  path: /
  expected: [200, 301, 302]
  timeout: 60

params:
  image:
    type: string
    title: Docker image
    default: fonoster/dashboard:0.15.15
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 5000
    description: "Host port"
links:
  - label: Website
    url: https://fonoster.com
  - label: GitHub
    url: https://github.com/fonoster/fonoster
  - label: Documentation
    url: https://fonoster.com/docs
notes: |
  Fonoster requires Redis for session and call state management.
