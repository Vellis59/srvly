metadata:
  name: "LetterFeed"
  description: |
    LetterFeed is a self-hosted RSS feed reader and newsletter aggregator with a clean, modern reading interface.
    It supports feed management, categories, search, bookmarking, and email newsletter integration.
    It is a lightweight alternative to Feedly for personal news aggregation.
  category: communication
  subcategory: rss
  tags: [RSS, News, Feeds, Newsletter]
  version: "latest"
  homepage: https://letterfeed.app
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=L
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3087]
  resources:
    ram: 256
    disk: 1

install:
  docker:
    image: ghcr.io/leonmuscoden/letterfeed-backend:latest
    name: letterfeed
    port: "3087:8000"
    volumes:
      - /opt/srvly/apps/letterfeed/data:/data

agent_install:
  network: srvly-letterfeed
  preflight:
    - "Check that the host port is free."
    - "Remove any failed letterfeed container."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering."

healthcheck:
  type: http
  port: 3087
  path: /
  expected: [200, 301, 302]
  timeout: 30

params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/leonmuscoden/letterfeed-backend:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 3087
    description: "Host port"
links:
  - label: GitHub
    url: https://github.com/leonmuscoden/letterfeed
notes: |
  LetterFeed stores feeds and articles in an embedded database.
