metadata:
  name: "Rocket.Chat"
  description: |
    Open-source team communication platform with messaging, video conferencing, file sharing, and integrations. Alternative to Slack and Mattermost.
  category: communication
  subcategory: chat
  tags: [Chat, Team, Communication]
  version: "latest"
  homepage: https://rocket.chat/
  icon: https://www.google.com/s2/favicons?domain=rocket.chat&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/rocketchat/rocket.chat:latest
    name: rocketchat
    port: "3000:3000"
    volumes:
      - /opt/srvly/apps/rocketchat/data:/data
    env: []
agent_install:
  network: srvly-rocketchat
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed rocketchat container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 3000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/rocketchat/rocket.chat:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 3000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://rocket.chat/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
