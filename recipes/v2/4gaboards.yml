metadata:
  name: "4ga Boards"
  description: |
    A modern, open-source project management platform inspired by Trello.
    Features Kanban-style boards, drag-and-drop task management, custom lists,
    cards with attachments, user avatars, and project backgrounds. Perfect for
    teams looking for a self-hosted alternative to commercial PM tools.
  category: productivity
  subcategory: project-management
  tags: [Project Management, Kanban, Productivity, Collaboration, Task Management]
  version: "3.3.6"
  homepage: https://4gaboards.com
  icon: https://raw.githubusercontent.com/RARgames/4gaBoards/main/client/public/favicon.ico
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: true
    mysql: false
    redis: false
    mongodb: false
  ports: [1337]
  resources:
    ram: 256
    disk: 2

install:
  docker:
    image: ghcr.io/rargames/4gaboards:3.3.6
    name: 4gaboards
    port: "1337:1337"
    volumes:
      - /opt/srvly/apps/4gaboards/user-avatars:/app/public/user-avatars
      - /opt/srvly/apps/4gaboards/project-backgrounds:/app/public/project-backgrounds
      - /opt/srvly/apps/4gaboards/attachments:/app/public/attachments
    env:
      - key: DATABASE_URL
        value: "postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME?sslmode=disable"
        description: "URL de connexion PostgreSQL (remplie automatiquement par l'agent)"
      - key: NODE_ENV
        value: production
        description: "Environnement"
      - key: BASE_URL
        value: "$PUBLIC_BASE_URL"
        description: "Public URL used by Sails.js to generate frontend asset URLs"

agent_install:
  network: srvly-4gaboards
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed 4gaboards or 4gaboards-postgres containers before retrying."
  prerequisites:
    - type: postgres
      name: 4gaboards-postgres
      image: postgres:16-alpine
      container: 4gaboards-postgres
      database: 4gaboards
      user: 4gaboards
      password: generate
      volume: /opt/srvly/apps/4gaboards/postgres:/var/lib/postgresql/data
      port: 5432
      env:
        POSTGRES_DB: 4gaboards
        POSTGRES_USER: 4gaboards
        POSTGRES_PASSWORD: $GENERATED_PASSWORD
  app_env:
    DATABASE_URL: "postgresql://4gaboards:$GENERATED_PASSWORD@4gaboards-postgres:5432/4gaboards?sslmode=disable"
    NODE_ENV: production
    BASE_URL: "$PUBLIC_BASE_URL"
  post_install:
    - "Create the Docker network before both containers and attach Postgres and the app to it."
    - "Start Postgres first and wait until it accepts connections before starting the app."
    - "Set BASE_URL to the final public URL before deployment (https://domain when a domain is configured, otherwise http://server-ip:host-port)."
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "After the HTTP status check passes, fetch the rendered HTML and verify that asset URLs are generated for the public URL, not localhost."

healthcheck:
  type: http
  port: 1337
  path: /
  expected: [200, 301, 302]
  timeout: 60

params:
  image:
    type: string
    title: Image Docker
    default: ghcr.io/rargames/4gaboards:3.3.6
  port:
    type: integer
    title: Port HTTP
    default: 1337
    description: "Port de l'interface web"

links:
  - label: Website
    url: https://4gaboards.com
  - label: Documentation
    url: https://docs.4gaboards.com
  - label: GitHub
    url: https://github.com/RARgames/4gaboards
  - label: Docker Hub
    url: https://ghcr.io/rargames/4gaboards

notes: |
  Default admin credentials: demo / demo
  CHANGE THE PASSWORD AFTER FIRST LOGIN.
  Requires PostgreSQL - the agent will spin one up automatically.
  After installation, access the web UI on the configured port.
