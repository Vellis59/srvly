metadata:
  name: "Cloudlog"
  description: |
    Cloudlog is a self-hosted application for miscellaneous. Install it on your server for full control over your data.
  category: other
  subcategory: 
  tags: [Other, Miscellaneous]
  version: "latest"
  homepage: https://magicbug.co.uk/cloudlog/
  icon: https://www.google.com/s2/favicons?domain=magicbug.co.uk&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/magicbug/cloudlog:latest
    name: cloudlog
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/cloudlog/data:/data
    env: []
agent_install:
  network: srvly-cloudlog
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed cloudlog container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/magicbug/cloudlog:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://magicbug.co.uk/cloudlog/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
