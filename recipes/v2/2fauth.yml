metadata:
  name: "2FAuth"
  description: |
    A web-based application to manage your two-factor authentication (2FA) accounts.
    Store and organize your TOTP tokens securely in one place, generate time-based
    one-time passwords directly from your browser, and access them from any device
    with a simple, clean interface. Works without a mobile phone.
  category: security
  subcategory: auth-sso
  tags: [Security, Authentication, Password, 2FA]
  version: "5.3.0"
  homepage: https://github.com/Bubka/2FAuth
  icon: https://raw.githubusercontent.com/Bubka/2FAuth/master/public/logo.svg
  license: AGPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8000]
  resources:
    ram: 128
    disk: 1

install:
  docker:
    image: 2fauth/2fauth:5.3.0
    name: 2fauth
    port: "8000:8000"
    volumes:
      - /opt/srvly/apps/2fauth/data:/2fauth
    env:
      - key: APP_KEY
        value: "$GENERATED_APP_KEY"
        description: "Application encryption key (generate with: openssl rand -base64 32)"
      - key: SITE_NAME
        value: "2FAuth"
        description: "Site name displayed in the UI"

agent_install:
  network: srvly-2fauth
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed 2fauth container before retrying."
  prerequisites: []
  app_env:
    APP_KEY: $GENERATED_APP_KEY
    SITE_NAME: "2FAuth"
  post_install:
    - "Generate APP_KEY with openssl rand -base64 32 before deployment."
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8000
  path: /
  expected: [200, 302]
  timeout: 30

params:
  image:
    type: string
    title: Image Docker
    default: 2fauth/2fauth:5.3.0
  port:
    type: integer
    title: Port HTTP
    default: 8000
    description: "Web interface port"

links:
  - label: GitHub
    url: https://github.com/Bubka/2FAuth
  - label: Documentation
    url: https://docs.2fauth.app
  - label: Docker Hub
    url: https://hub.docker.com/r/2fauth/2fauth

notes: |
  After installation, access the web UI on the configured port.
  The first account you create will be the admin.
  An APP_KEY is required — generate one with: openssl rand -base64 32
