metadata:
  name: "Sync-in"
  description: |
    Sync-in is a self-hosted application for file transfer & synchronization. Install it on your server for full control over your data.
  category: storage-backup
  subcategory: file-sharing
  tags: [Files, Sharing]
  version: "latest"
  homepage: https://sync-in.com
  icon: https://www.google.com/s2/favicons?domain=sync-in.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/sync-in/server:latest
    name: sync-in
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/sync-in/data:/data
    env: []
agent_install:
  network: srvly-sync-in
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed sync-in container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/sync-in/server:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://sync-in.com
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
