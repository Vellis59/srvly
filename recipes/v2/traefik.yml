metadata:
  name: "Traefik"
  description: |
    Modern reverse proxy and load balancer with automatic HTTPS, Docker discovery, and dynamic configuration for microservices.
  category: dev-infra
  subcategory: reverse-proxy
  tags: [Proxy, Load Balancer]
  version: "latest"
  homepage: https://traefik.io/
  icon: https://www.google.com/s2/favicons?domain=traefik.io&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/traefik/traefik:latest
    name: traefik
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/traefik/data:/data
    env: []
agent_install:
  network: srvly-traefik
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed traefik container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/traefik/traefik:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://traefik.io/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
