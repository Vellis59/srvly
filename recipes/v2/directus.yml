metadata:
  name: "Directus"
  description: |
    Directus is a headless CMS and backend platform that wraps any SQL database with a powerful REST and GraphQL API and a no-code admin app.
    It supports content modeling, role-based access, file management, webhooks, flows automation, and dashboards.
    It is a versatile backend solution for building data-driven applications and content management systems.
  category: dev-infra
  subcategory: api-backend
  tags: [CMS, API, Backend, Headless, Database]
  version: "latest"
  homepage: https://directus.io
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/directus.svg
  license: GPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: true
    mysql: false
    redis: false
    mongodb: false
  ports: [8055]
  resources:
    ram: 512
    disk: 2

install:
  docker:
    image: directus/directus:latest
    name: directus
    port: "8055:8055"
    volumes:
      - /opt/srvly/apps/directus/uploads:/directus/uploads
      - /opt/srvly/apps/directus/extensions:/directus/extensions
    env:
      - key: DB_CLIENT
        value: "pg"
      - key: DB_HOST
        value: "directus-postgres"
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: "directus"
      - key: DB_USER
        value: "directus"
      - key: DB_PASSWORD
        value: "***"
      - key: KEY
        value: "***"
        description: "App key"
      - key: SECRET
        value: "***"
        description: "App secret"

agent_install:
  network: srvly-directus
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed directus or directus-postgres containers before retrying."
  prerequisites:
    - type: postgres
      name: directus-postgres
      image: postgres:16-alpine
      container: directus-postgres
      database: directus
      user: directus
      password: generate
      volume: /opt/srvly/apps/directus/postgres:/var/lib/postgresql/data
      port: 5432
      env:
        POSTGRES_DB: directus
        POSTGRES_USER: directus
        POSTGRES_PASSWORD: $GENERATED_PASSWORD
  app_env:
    DB_CLIENT: "pg"
    DB_HOST: "directus-postgres"
    DB_PORT: "5432"
    DB_DATABASE: "directus"
    DB_USER: "directus"
    DB_PASSWORD: "***"
    KEY: "***"
    SECRET: "***"
  post_install:
    - "Create the Docker network before both containers and attach Postgres and the app to it."
    - "Start Postgres first and wait until it accepts connections before starting the app."
    - "Generate KEY and SECRET (openssl rand -base64 32) before deployment."
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8055
  path: /server/health
  expected: [200]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: directus/directus:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8055
    description: "Host port for the Directus web UI"

links:
  - label: Website
    url: https://directus.io
  - label: GitHub
    url: https://github.com/directus/directus
  - label: Documentation
    url: https://docs.directus.io

notes: |
  Directus requires PostgreSQL and a KEY/SECRET pair for authentication. The first admin user is created via the web UI or CLI.
