metadata:
  name: "GoToSocial"
  description: |
    Fast ActivityPub social network server for the Fediverse. Lightweight Mastodon-compatible alternative for small communities and individuals.
  category: communication
  subcategory: social
  tags: [Social, Fediverse, ActivityPub]
  version: "latest"
  homepage: https://docs.gotosocial.org/
  icon: https://www.google.com/s2/favicons?domain=docs.gotosocial.org&sz=64
  license: AGPL-3.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/superseriousbusiness/gotosocial:latest
    name: gotosocial
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/gotosocial/data:/data
    env: []
agent_install:
  network: srvly-gotosocial
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed gotosocial container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/superseriousbusiness/gotosocial:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://docs.gotosocial.org/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
