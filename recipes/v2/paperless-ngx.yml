metadata:
  name: "Paperless-ngx"
  description: |
    Paperless-ngx is a self-hosted web application for document management. Install it on your server for full control over your data and privacy.
  category: productivity
  subcategory: documents
  tags: [Documents, PDF]
  version: "latest"
  homepage: https://docs.paperless-ngx.com/
  icon: https://www.google.com/s2/favicons?domain=docs.paperless-ngx.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    name: paperless-ngx
    port: "8000:8000"
    volumes:
      - /opt/srvly/apps/paperless-ngx/data:/data
    env: []
agent_install:
  network: srvly-paperless-ngx
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed paperless-ngx container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/paperless-ngx/paperless-ngx:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://docs.paperless-ngx.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
