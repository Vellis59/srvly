metadata:
  name: "Casdoor"
  description: |
    Casdoor is a comprehensive identity and access management platform with SSO, OAuth 2.0, OIDC, SAML, and LDAP support.
    It provides user management, role-based access control, multi-factor authentication, social logins, and a management UI.
    It is a powerful self-hosted alternative to Auth0 or Okta for application authentication.
  category: security
  subcategory: auth-sso
  tags: [Authentication, SSO, OAuth, Identity]
  version: "latest"
  homepage: https://casdoor.org
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=C
  license: Apache-2.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: true
    redis: false
    mongodb: false
  ports: [8030]
  resources:
    ram: 256
    disk: 1

install:
  docker:
    image: casbin/casdoor:latest
    name: casdoor
    port: "8030:8000"
    volumes:
      - /opt/srvly/apps/casdoor/config:/conf
    env:
      - key: drivers
        value: mysql
      - key: dataSourceName
        value: "casdoor:***@tcp(casdoor-mariadb:3306)/casdoor"

agent_install:
  network: srvly-casdoor
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed casdoor or casdoor-mariadb containers before retrying."
  prerequisites:
    - type: mysql
      name: casdoor-mariadb
      image: mariadb:11
      container: casdoor-mariadb
      database: casdoor
      user: casdoor
      password: generate
      volume: /opt/srvly/apps/casdoor/mariadb:/var/lib/mysql
      port: 3306
      env:
        MYSQL_DATABASE: casdoor
        MYSQL_USER: casdoor
        MYSQL_PASSWORD: $GENERATED_PASSWORD
        MYSQL_ROOT_PASSWORD: $GENERATED_ROOT_PASSWORD
  app_env:
    drivers: "mysql"
    dataSourceName: "casdoor:***@tcp(casdoor-mariadb:3306)/casdoor"
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8030
  path: /health
  expected: [200]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: casbin/casdoor:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 8000
    description: "Host port"
links:
  - label: Website
    url: https://casdoor.org
  - label: GitHub
    url: https://github.com/casdoor/casdoor
  - label: Documentation
    url: https://casdoor.org/docs
notes: |
  Casdoor requires MySQL/MariaDB for storing user and configuration data.
