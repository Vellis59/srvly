metadata:
  name: "Cloudflare Tunnel"
  description: |
    Cloudflare Tunnel (cloudflared) is a secure tunneling daemon that creates an encrypted tunnel from your server to Cloudflare's edge network.
    It exposes local services without opening firewall ports, supports load balancing, access policies, and automatic SSL/TLS.
    It is the standard way to securely expose self-hosted services through Cloudflare without opening inbound ports.
  category: dev-infra
  subcategory: server-management
  tags: [Tunnel, Proxy, Cloudflare, Security]
  version: "latest"
  homepage: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/cloudflare.svg
  license: Apache-2.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: []
  resources:
    ram: 128
    disk: 1

install:
  docker:
    image: cloudflare/cloudflared:latest
    name: cloudflared
    env:
      - key: TUNNEL_TOKEN
        value: "***"
        description: "Cloudflare Tunnel token from Zero Trust dashboard"

agent_install:
  network: srvly-cloudflared
  preflight:
    - "Ensure a Cloudflare Tunnel token is available before deployment."
    - "Remove any failed cloudflared container before retrying."
  prerequisites: []
  app_env:
    TUNNEL_TOKEN: "***"
  post_install:
    - "Run the healthcheck to confirm the tunnel is running."
    - "No HTTP healthcheck is available; verify via Cloudflare Zero Trust dashboard."

healthcheck:
  type: http
  port: 0
  path: /
  expected: [200]
  timeout: 30

params:
  image:
    type: string
    title: Docker image
    default: cloudflare/cloudflared:latest
    description: "Docker image to deploy"

links:
  - label: Website
    url: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks
  - label: GitHub
    url: https://github.com/cloudflare/cloudflared
  - label: Documentation
    url: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks

notes: |
  Cloudflare Tunnel requires a tunnel token from the Cloudflare Zero Trust dashboard. The tunnel does not expose any ports locally.
