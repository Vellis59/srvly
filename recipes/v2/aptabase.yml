metadata:
  name: "Aptabase"
  description: |
    Privacy-first analytics for mobile and desktop apps. Lightweight, GDPR-compliant, and self-hosted with zero external dependencies.
  category: productivity
  subcategory: reporting
  tags: [Analytics, Privacy, Apps]
  version: "latest"
  homepage: https://aptabase.com/
  icon: https://www.google.com/s2/favicons?domain=aptabase.com&sz=64
  license: AGPL-3.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/aptabase/aptabase:latest
    name: aptabase
    port: "3000:3000"
    volumes:
      - /opt/srvly/apps/aptabase/data:/data
    env: []
agent_install:
  network: srvly-aptabase
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed aptabase container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 3000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/aptabase/aptabase:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 3000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://aptabase.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
