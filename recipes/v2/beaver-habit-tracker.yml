metadata:
  name: "Beaver Habit Tracker"
  description: |
    Beaver Habit Tracker is a self-hosted web application for time tracking. Install it on your server for full control over your data and privacy.
  category: productivity
  subcategory: project-management
  tags: [Time, Tracking]
  version: "latest"
  homepage: https://github.com/daya0576/beaverhabits
  icon: https://www.google.com/s2/favicons?domain=github.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [5000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/daya0576/beaverhabits:latest
    name: beaver-habit-tracker
    port: "5000:5000"
    volumes:
      - /opt/srvly/apps/beaver-habit-tracker/data:/data
    env: []
agent_install:
  network: srvly-beaver-habit-tracker
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed beaver-habit-tracker container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 5000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/daya0576/beaverhabits:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 5000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://github.com/daya0576/beaverhabits
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
