metadata:
  name: "Plausible"
  description: |
    Plausible is a lightweight, privacy-first web analytics tool that does not use cookies and is fully compliant with privacy regulations.
    It provides clean, focused dashboards with page views, unique visitors, bounce rate, visit duration, and referral tracking.
    It is a simple and elegant alternative to Google Analytics that respects visitor privacy.
  category: dev-infra
  subcategory: monitoring
  tags: [Analytics, Privacy, Web, Dashboard]
  version: "latest"
  homepage: https://plausible.io
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/plausible.svg
  license: AGPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: true
    mysql: false
    redis: false
    mongodb: false
  ports: [8101]
  resources:
    ram: 512
    disk: 5

install:
  docker:
    image: plausible/analytics:latest
    name: plausible
    port: "8101:8000"
    volumes:
      - /opt/srvly/apps/plausible/data:/var/lib/plausible/data
    env:
      - key: DATABASE_URL
        value: "postgres://plausible:***@plausible-postgres:5432/plausible"
        description: "PostgreSQL connection string"
      - key: SECRET_KEY_BASE
        value: "***"
        description: "Elixir secret key base"
      - key: BASE_URL
        value: "$PUBLIC_BASE_URL"
        description: "Public URL"

agent_install:
  network: srvly-plausible
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed plausible or plausible-postgres containers before retrying."
  prerequisites:
    - type: postgres
      name: plausible-postgres
      image: postgres:16-alpine
      container: plausible-postgres
      database: plausible
      user: plausible
      password: generate
      volume: /opt/srvly/apps/plausible/postgres:/var/lib/postgresql/data
      port: 5432
      env:
        POSTGRES_DB: plausible
        POSTGRES_USER: plausible
        POSTGRES_PASSWORD: $GENERATED_PASSWORD
  app_env:
    DATABASE_URL: "postgres://plausible:***@plausible-postgres:5432/plausible"
    SECRET_KEY_BASE: "***"
    BASE_URL: "$PUBLIC_BASE_URL"
  post_install:
    - "Create the Docker network before both containers and attach Postgres and the app to it."
    - "Start Postgres first and wait until it accepts connections before starting the app."
    - "Generate a SECRET_KEY_BASE (openssl rand -base64 48) before deployment."
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8101
  path: /api/health
  expected: [200]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: plausible/analytics:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8101
    description: "Host port for the Plausible web UI"

links:
  - label: Website
    url: https://plausible.io
  - label: GitHub
    url: https://github.com/plausible/analytics
  - label: Documentation
    url: https://plausible.io/docs

notes: |
  Plausible requires PostgreSQL and a SECRET_KEY_BASE for session signing. Run database migrations on first startup.
