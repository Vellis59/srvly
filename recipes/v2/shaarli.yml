metadata:
  name: "Shaarli"
  description: |
    Shaarli is a minimalist, self-hosted bookmark manager and link sharing service.
    It supports tags, search, RSS feeds, private and public bookmarks, import/export, and a REST API. It stores everything in a simple SQLite database.
    It is a lightweight and time-tested tool for saving and organizing web links.
  category: productivity
  subcategory: notes-wiki
  tags: [Bookmarks, Links, Sharing, Archiving]
  version: "latest"
  homepage: https://shaarli.readthedocs.io
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/shaarli.svg
  license: AGPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8092]
  resources:
    ram: 128
    disk: 1

install:
  docker:
    image: shaarli/shaarli:latest
    name: shaarli
    port: "8092:80"
    volumes:
      - /opt/srvly/apps/shaarli/data:/var/www/shaarli/data
      - /opt/srvly/apps/shaarli/cache:/var/www/shaarli/cache

agent_install:
  network: srvly-shaarli
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed shaarli container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
    - "Fetch the rendered HTML and verify that asset URLs are relative or point to the public URL, not localhost."

healthcheck:
  type: http
  port: 8092
  path: /
  expected: [200, 301, 302]
  timeout: 30

params:
  image:
    type: string
    title: Docker image
    default: shaarli/shaarli:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8092
    description: "Host port for the Shaarli web UI"

links:
  - label: Website
    url: https://shaarli.readthedocs.io
  - label: GitHub
    url: https://github.com/shaarli/Shaarli
  - label: Documentation
    url: https://shaarli.readthedocs.io

notes: |
  Shaarli uses SQLite. The first user to register becomes the admin.
