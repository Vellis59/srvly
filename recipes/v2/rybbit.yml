metadata:
  name: "Rybbit"
  description: |
    Rybbit is a self-hosted application for analytics. Install it on your server for full control over your data.
  category: productivity
  subcategory: reporting
  tags: [Analytics, Reporting]
  version: "latest"
  homepage: https://rybbit.com/
  icon: https://www.google.com/s2/favicons?domain=rybbit.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/rybbit-io/rybbit:latest
    name: rybbit
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/rybbit/data:/data
    env: []
agent_install:
  network: srvly-rybbit
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed rybbit container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/rybbit-io/rybbit:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://rybbit.com/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
