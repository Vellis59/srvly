metadata:
  name: "Taiga"
  description: |
    Agile project management with Kanban and Scrum. Features user stories, sprints, backlog, and burndown charts.
  category: productivity
  subcategory: project-management
  tags: [Agile, Scrum, Kanban]
  version: "latest"
  homepage: https://www.taiga.io/
  icon: https://www.google.com/s2/favicons?domain=www.taiga.io&sz=64
  license: MPL-2.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/taigaio/taiga-back:latest
    name: taiga
    port: "8000:8000"
    volumes:
      - /opt/srvly/apps/taiga/data:/data
    env: []
agent_install:
  network: srvly-taiga
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed taiga container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/taigaio/taiga-back:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://www.taiga.io/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
