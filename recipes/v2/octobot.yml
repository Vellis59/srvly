metadata:
  name: "OctoBot"
  description: |
    OctoBot is a self-hosted application for money, budgeting & management. Install it on your server for full control over your data.
  category: productivity
  subcategory: finance
  tags: [Finance, Budget, Money]
  version: "latest"
  homepage: https://www.octobot.cloud/
  icon: https://www.google.com/s2/favicons?domain=www.octobot.cloud&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/drakkar-software/octobot:latest
    name: octobot
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/octobot/data:/data
    env: []
agent_install:
  network: srvly-octobot
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed octobot container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/drakkar-software/octobot:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://www.octobot.cloud/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
