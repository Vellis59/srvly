metadata:
  name: "Frigate"
  description: |
    AI-powered video surveillance system. Monitor security cameras with locally processed object detection, facial recognition, and motion detection.
  category: security
  subcategory: vpn-tunnel
  tags: [Surveillance, AI, Cameras]
  version: "latest"
  homepage: https://frigate.video/
  icon: https://www.google.com/s2/favicons?domain=frigate.video&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [5000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/blakeblackshear/frigate:latest
    name: frigate
    port: "5000:5000"
    volumes:
      - /opt/srvly/apps/frigate/data:/data
    env: []
agent_install:
  network: srvly-frigate
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed frigate container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 5000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/blakeblackshear/frigate:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 5000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://frigate.video/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
