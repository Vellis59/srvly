metadata:
  name: "BigCapital"
  description: |
    BigCapital is an open-source accounting and financial management platform for small and medium businesses.
    It supports double-entry accounting, invoicing, bill payments, bank reconciliation, financial reports, and multi-currency operations.
    It is a modern self-hosted alternative to QuickBooks and Wave for business accounting.
  category: productivity
  subcategory: finance
  tags: [Accounting, Finance, Invoicing, Business]
  version: "latest"
  homepage: https://bigcapital.app
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=B
  license: AGPL-3.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: true
    redis: true
    mongodb: false
  ports: [8095]
  resources:
    ram: 1024
    disk: 5

install:
  docker:
    image: bigcapitalhq/webapp:latest
    name: bigcapital
    port: "8095:80"
    env:
      - key: DB_HOST
        value: bigcapital-mariadb
      - key: DB_USER
        value: bigcapital
      - key: DB_PASSWORD
        value: "***"
      - key: DB_DATABASE
        value: bigcapital
      - key: REDIS_HOST
        value: bigcapital-redis

agent_install:
  network: srvly-bigcapital
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed bigcapital, bigcapital-mariadb, or bigcapital-redis containers before retrying."
  prerequisites:
    - type: mysql
      name: bigcapital-mariadb
      image: mariadb:11
      container: bigcapital-mariadb
      database: bigcapital
      user: bigcapital
      password: generate
      volume: /opt/srvly/apps/bigcapital/mariadb:/var/lib/mysql
      port: 3306
      env:
        MYSQL_DATABASE: bigcapital
        MYSQL_USER: bigcapital
        MYSQL_PASSWORD: $GENERATED_PASSWORD
        MYSQL_ROOT_PASSWORD: $GENERATED_ROOT_PASSWORD
    - type: redis
      name: bigcapital-redis
      image: redis:7-alpine
      container: bigcapital-redis
      volume: /opt/srvly/apps/bigcapital/redis:/data
      port: 6379
  app_env:
    DB_HOST: "bigcapital-mariadb"
    DB_USER: "bigcapital"
    DB_PASSWORD: "***"
    DB_DATABASE: "bigcapital"
    REDIS_HOST: "bigcapital-redis"
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8095
  path: /
  expected: [200, 301, 302]
  timeout: 120

params:
  image:
    type: string
    title: Docker image
    default: bigcapitalhq/webapp:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 8095
    description: "Host port"
links:
  - label: Website
    url: https://bigcapital.app
  - label: GitHub
    url: https://github.com/bigcapitalhq/bigcapital
  - label: Documentation
    url: https://docs.bigcapital.app
notes: |
  BigCapital requires MariaDB and Redis.
