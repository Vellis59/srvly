metadata:
  name: "Apache Solr"
  description: |
    Apache Solr is a self-hosted web application for search engines. Install it on your server for full control over your data and privacy.
  category: dev-infra
  subcategory: database
  tags: [Search, Index, Engine]
  version: "latest"
  homepage: https://lucene.apache.org/solr/
  icon: https://www.google.com/s2/favicons?domain=lucene.apache.org&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8983]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: solr:latest
    name: apache-solr
    port: "8983:8983"
    volumes:
      - /opt/srvly/apps/apache-solr/data:/data
    env: []
agent_install:
  network: srvly-apache-solr
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed apache-solr container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8983
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: solr:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8983
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://lucene.apache.org/solr/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
