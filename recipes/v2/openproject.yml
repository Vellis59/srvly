metadata:
  name: "OpenProject"
  description: |
    Comprehensive project management with Gantt charts, time tracking, agile boards, and team collaboration. Enterprise-grade.
  category: productivity
  subcategory: project-management
  tags: [Project Management, Gantt]
  version: "latest"
  homepage: https://www.openproject.org
  icon: https://www.google.com/s2/favicons?domain=www.openproject.org&sz=64
  license: GPL-3.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/opf/openproject:latest
    name: openproject
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/openproject/data:/data
    env: []
agent_install:
  network: srvly-openproject
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed openproject container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/opf/openproject:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://www.openproject.org
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
