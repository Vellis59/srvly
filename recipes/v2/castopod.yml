metadata:
  name: "Castopod"
  description: |
    Open-source podcast hosting platform. Manage episodes, analytics, and distribution with Fediverse integration for social podcasting.
  category: media
  subcategory: podcasts
  tags: [Podcast, Audio, Hosting]
  version: "latest"
  homepage: https://castopod.org
  icon: https://www.google.com/s2/favicons?domain=castopod.org&sz=64
  license: AGPL-3.0
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8080]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/castopod/castopod:latest
    name: castopod
    port: "8080:8080"
    volumes:
      - /opt/srvly/apps/castopod/data:/data
    env: []
agent_install:
  network: srvly-castopod
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed castopod container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 8080
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/castopod/castopod:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 8080
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://castopod.org
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
