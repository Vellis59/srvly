metadata:
  name: "socks5-proxy-server"
  description: |
    socks5-proxy-server is a self-hosted application for proxy. Install it on your server for full control over your data.
  category: dev-infra
  subcategory: reverse-proxy
  tags: [Proxy, Reverse, Network]
  version: "latest"
  homepage: https://github.com/nskondratev/socks5-proxy-server
  icon: https://www.google.com/s2/favicons?domain=github.com&sz=64
  license: Open Source
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [80]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/nskondratev/socks5-proxy-server:latest
    name: socks5-proxy-server
    port: "80:80"
    volumes:
      - /opt/srvly/apps/socks5-proxy-server/data:/data
    env: []
agent_install:
  network: srvly-socks5-proxy-server
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed socks5-proxy-server container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 80
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/nskondratev/socks5-proxy-server:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 80
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://github.com/nskondratev/socks5-proxy-server
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
