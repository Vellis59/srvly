metadata:
  name: "AFFiNE"
  description: |
    All-in-one workspace for docs, whiteboards, and knowledge management. Open-source alternative to Notion and Miro with local-first architecture.
  category: productivity
  subcategory: notes-wiki
  tags: [Docs, Wiki, Whiteboard]
  version: "latest"
  homepage: https://affine.pro/
  icon: https://www.google.com/s2/favicons?domain=affine.pro&sz=64
  license: MIT
  verified: false
prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3000]
  resources:
    ram: 256
    disk: 1
install:
  docker:
    image: ghcr.io/toeverything/affine-self-hosted:latest
    name: affine
    port: "3000:3000"
    volumes:
      - /opt/srvly/apps/affine/data:/data
    env: []
agent_install:
  network: srvly-affine
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed affine container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."
healthcheck:
  type: http
  port: 3000
  path: /
  expected: [200, 301, 302]
  timeout: 60
params:
  image:
    type: string
    title: Docker image
    default: ghcr.io/toeverything/affine-self-hosted:latest
    description: "Docker image to deploy"
  port:
    type: integer
    title: HTTP port
    default: 3000
    description: "Host port for the web UI"
links:
  - label: Website
    url: https://affine.pro/
notes: |
  Auto-generated recipe. Verify ports and volumes before production use.
