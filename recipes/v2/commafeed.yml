metadata:
  name: "CommaFeed"
  description: |
    CommaFeed is a lightweight, self-hosted RSS feed reader with a clean interface for aggregating and reading news from multiple sources.
    It supports feed organization, search, tagging, keyboard navigation, and mobile-friendly responsive design.
    It is a simple and efficient open-source alternative to Feedly or Inoreader for RSS feed management.
  category: communication
  subcategory: rss
  tags: [RSS, Feeds, News, Reader]
  version: "latest"
  homepage: https://www.commafeed.com
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=C
  license: Apache-2.0
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [8093]
  resources:
    ram: 256
    disk: 1

install:
  docker:
    image: athou/commafeed:latest-h2
    name: commafeed
    port: "8093:8082"
    volumes:
      - /opt/srvly/apps/commafeed/data:/commafeed/data

agent_install:
  network: srvly-commafeed
  preflight:
    - "Check that the selected host port is free before deploying."
    - "Remove any failed commafeed container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering the installation as successful."

healthcheck:
  type: http
  port: 8093
  path: /
  expected: [200, 301, 302]
  timeout: 60

params:
  image:
    type: string
    title: Docker image
    default: athou/commafeed:latest-h2
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 8082
    description: "Host port"
links:
  - label: Website
    url: https://www.commafeed.com
  - label: GitHub
    url: https://github.com/Athou/commafeed
  - label: Documentation
    url: https://github.com/Athou/commafeed#readme
notes: |
  CommaFeed uses an embedded H2 database by default. For production, configure PostgreSQL.
