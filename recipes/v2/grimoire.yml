metadata:
  name: "Grimoire"
  description: |
    Grimoire is a self-hosted book and reading management system for cataloging, organizing, and tracking reading progress.
    It supports book databases, reading lists, tags, reviews, reading goals, and import/export capabilities.
    It is a practical tool for avid readers who want a digital catalog of their reading.
  category: media
  subcategory: books
  tags: [Books, Reading, Library, Catalog]
  version: "latest"
  homepage: https://grimoire.app
  icon: https://placehold.co/64x64/1a73e8/ffffff?text=G
  license: MIT
  verified: false

prerequisites:
  databases:
    postgres: false
    mysql: false
    redis: false
    mongodb: false
  ports: [3076]
  resources:
    ram: 256
    disk: 1

install:
  docker:
    image: goniszewski/grimoire:latest
    name: grimoire
    port: "3076:3000"
    volumes:
      - /opt/srvly/apps/grimoire/data:/app/data

agent_install:
  network: srvly-grimoire
  preflight:
    - "Check the host port is free."
    - "Remove any failed grimoire container before retrying."
  prerequisites: []
  app_env: {}
  post_install:
    - "Run the HTTP healthcheck before registering."

healthcheck:
  type: http
  port: 3076
  path: /
  expected: [200, 301, 302]
  timeout: 60

params:
  image:
    type: string
    title: Docker image
    default: goniszewski/grimoire:latest
    description: "Docker image"
  port:
    type: integer
    title: HTTP port
    default: 3076
    description: "Host port"
links:
  - label: GitHub
    url: https://github.com/goniszewski/grimoire
notes: |
  Grimoire stores all book data in an embedded SQLite database.
