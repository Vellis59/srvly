metadata:
  name: Airsonic Advanced
  version: latest
  description: Airsonic Advanced is a more modern implementation of the Airsonic fork
    with several key performance and feature enhancements. It's a free, web-based
    media streamer providing ubiquitous access to your music. Use it to share your
    music with friends, or to listen to your own music while at work. You can stream
    to multiple players simultaneously, for instance to one player in your kitchen
    and another in your living room. It supports very large music collections and
    works with any audio or video format that can stream over HTTP.
  category: music-streaming
  tags:
  - Music Streaming
  - Media Server
  - Self-hosted
  - Airsonic
  - Audio
  - Video
  - Podcast
  - Sonos
  - Chromecast
  - DLNA
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: airsonicadvanced/airsonic-advanced:gitcommit-68d11bfbfe051b0acaca2770c3c1f47f8d59201c
  port:
    type: integer
    title: Port HTTP
    default: 4040
links:
- label: GitHub
  url: https://github.com/airsonic-advanced/airsonic-advanced
- label: Documentation
  url: https://github.com/airsonic-advanced/airsonic-advanced#readme
- label: Demo
  url: https://airsonic.github.io/
instructions: null
install:
- docker:
    image: $IMAGE
    name: airsonic-advanced
    port: $PORT:4040
    volumes:
    - /var/playlists
    - /var/podcasts
    - /var/airsonic
    - /var/music
    extra_ports:
    - 4041:4041
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
