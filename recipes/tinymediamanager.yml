metadata:
  name: TinyMediaManager
  version: latest
  description: TinyMediaManager is a media management tool designed to organize and
    manage your movie and TV show collections. It automatically fetches metadata from
    various sources, downloads artwork, and helps keep your media library well-organized
    with proper naming conventions and metadata files for media servers like Plex,
    Emby, and Jellyfin.
  category: media-manager
  tags:
  - Media Manager
  - Movies
  - TV Shows
  - Metadata
  - Plex
  - Emby
  - Jellyfin
  os_support:
  - ubuntu-22.04
  - ubuntu-24.04
  - debian-12
  dependencies:
  - docker
params:
  image:
    type: string
    title: Image Docker
    default: tinymediamanager/tinymediamanager:5.2.11
  port:
    type: integer
    title: Port HTTP
    default: 4000
links:
- label: Website
  url: https://www.tinymediamanager.org/
- label: Documentation
  url: https://www.tinymediamanager.org/docs/
- label: GitHub
  url: https://github.com/tinyMediaManager/tinyMediaManager
- label: Docker Hub
  url: https://hub.docker.com/r/tinymediamanager/tinymediamanager
instructions: null
install:
- docker:
    image: $IMAGE
    name: tinymediamanager
    port: $PORT:4000
    volumes:
    - /data
    - /media/movies
    - /media/tv_shows
    extra_ports: []
verify:
- http_get:
    url: http://localhost:$PORT
    expect:
    - 200
    - 301
    - 302
output:
  url: http://{{ server_ip }}:$PORT
  type: webapp
  notes: null
