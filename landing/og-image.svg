<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Decorative grid dots -->
  <g fill="#1e293b" opacity="0.5">
    <circle cx="100" cy="100" r="2"/><circle cx="300" cy="100" r="2"/>
    <circle cx="500" cy="100" r="2"/><circle cx="700" cy="100" r="2"/>
    <circle cx="900" cy="100" r="2"/><circle cx="1100" cy="100" r="2"/>
    <circle cx="100" cy="300" r="2"/><circle cx="300" cy="300" r="2"/>
    <circle cx="500" cy="300" r="2"/><circle cx="700" cy="300" r="2"/>
    <circle cx="900" cy="300" r="2"/><circle cx="1100" cy="300" r="2"/>
    <circle cx="100" cy="530" r="2"/><circle cx="300" cy="530" r="2"/>
    <circle cx="500" cy="530" r="2"/><circle cx="700" cy="530" r="2"/>
    <circle cx="900" cy="530" r="2"/><circle cx="1100" cy="530" r="2"/>
  </g>
  <!-- Border line top -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#34d399" stroke-width="3"/>
  <!-- Logo area -->
  <rect x="540" y="140" width="120" height="120" rx="24" fill="#34d399"/>
  <text x="600" y="228" font-family="system-ui,sans-serif" font-size="72" font-weight="700" fill="#0f172a" text-anchor="middle">♜</text>
  <!-- Title -->
  <text x="600" y="320" font-family="system-ui,sans-serif" font-size="72" font-weight="700" fill="url(#titleGrad)" text-anchor="middle" letter-spacing="-1">srvly</text>
  <!-- Subtitle -->
  <text x="600" y="380" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">AI-Powered VPS Management Platform</text>
  <!-- Badge -->
  <rect x="460" y="420" width="280" height="36" rx="18" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="600" y="444" font-family="system-ui,sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">⚡ 1668+ Apps · Open Source MIT</text>
  <!-- Bottom border -->
  <line x1="0" y1="627" x2="1200" y2="627" stroke="#34d399" stroke-width="3"/>
</svg>
